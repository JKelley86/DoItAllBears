<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Shelf — Audiobook Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #17110c;
    --wood: #241a13;
    --wood-light: #33251a;
    --plank-line: rgba(0,0,0,0.35);
    --parchment: #ece3d1;
    --parchment-dim: #cabd9e;
    --gold: #c9a24b;
    --gold-bright: #e6c479;
    --cloth-red: #7f3527;
    --shadow-deep: rgba(0,0,0,0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--parchment);
    font-family: 'Libre Franklin', sans-serif;
    min-height: 100vh;
  }

  h1, h2, .display {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .site-head {
    padding: 2.75rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 1px solid rgba(201,162,75,0.18);
  }

  .site-head h1 {
    font-size: clamp(1.9rem, 4vw, 2.6rem);
    margin: 0 0 0.35rem;
    color: var(--parchment);
  }

  .site-head p {
    margin: 0;
    color: var(--parchment-dim);
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ---------- SHELF VIEW ---------- */

  .shelf {
    display: flex;
    flex-wrap: wrap;
    gap: 2.25rem 1.75rem;
    align-items: flex-end;
    padding: 1.5rem 1.5rem 0.75rem;
    background:
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 214px,
        var(--plank-line) 214px,
        var(--plank-line) 216px,
        transparent 216px,
        transparent 238px
      ),
      linear-gradient(180deg, var(--wood-light), var(--wood));
    border-radius: 10px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.45), 0 12px 30px var(--shadow-deep);
  }

  .book-spine {
    width: 148px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-align: left;
    color: inherit;
    font: inherit;
    transition: transform 0.2s ease;
  }

  .book-spine:hover, .book-spine:focus-visible {
    transform: translateY(-8px);
    outline: none;
  }

  .book-spine:focus-visible .book-cover {
    box-shadow: 0 0 0 3px var(--gold-bright), 0 18px 24px rgba(0,0,0,0.55);
  }

  .book-cover {
    width: 100%;
    height: 210px;
    object-fit: cover;
    border-radius: 3px;
    box-shadow: 0 14px 22px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.4);
    display: block;
    background: var(--wood-light);
  }

  .book-cover.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 0.85rem;
    color: var(--parchment-dim);
    text-align: center;
    padding: 0.75rem;
  }

  .book-meta {
    margin-top: 0.6rem;
    font-size: 0.82rem;
    line-height: 1.3;
  }

  .book-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--parchment);
    display: block;
  }

  .book-author {
    color: var(--parchment-dim);
    font-size: 0.78rem;
  }

  .empty-state {
    text-align: center;
    color: var(--parchment-dim);
    padding: 3rem 1rem;
    line-height: 1.7;
  }

  .empty-state code {
    background: rgba(201,162,75,0.15);
    color: var(--gold-bright);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }

  /* ---------- READER VIEW ---------- */

  .back-btn {
    background: none;
    border: none;
    color: var(--gold-bright);
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.5rem 0;
    margin-bottom: 1.5rem;
  }

  .back-btn:hover { text-decoration: underline; }

  .reader-header {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
  }

  .reader-header img {
    width: 70px;
    border-radius: 4px;
    box-shadow: 0 10px 18px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.4);
  }

  .reader-header h2 {
    margin: 0 0 0.15rem;
    font-size: 1.5rem;
  }

  .reader-header p {
    margin: 0;
    color: var(--parchment-dim);
    font-size: 0.85rem;
  }

  .mode-tabs {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
  }

  .mode-tabs button {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    border: 1px solid rgba(201,162,75,0.4);
    background: transparent;
    color: var(--parchment-dim);
    cursor: pointer;
  }

  .mode-tabs button.active {
    background: var(--gold);
    color: #241a13;
    border-color: var(--gold);
  }

  .reader-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 2rem;
    align-items: start;
  }

  @media (max-width: 720px) {
    .reader-layout {
      grid-template-columns: 1fr;
    }
  }

  /* Chapter list, shared between modes */
  .chapter-list {
    background: rgba(236,227,209,0.06);
    border: 1px solid rgba(201,162,75,0.2);
    border-radius: 10px;
    max-height: 520px;
    overflow-y: auto;
  }

  .chapter-list button {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-bottom: 1px solid rgba(201,162,75,0.1);
    color: var(--parchment-dim);
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.85rem;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
  }

  .chapter-list button:last-child { border-bottom: none; }

  .chapter-list button.active {
    background: rgba(201,162,75,0.15);
    color: var(--gold-bright);
    font-weight: 600;
  }

  /* ---------- LISTEN PANEL ---------- */

  .control-panel {
    background: var(--parchment);
    color: #241a13;
    border-radius: 10px;
    padding: 2rem 2.25rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 0.72rem;
    color: var(--cloth-red);
    font-weight: 600;
    margin: 0 0 0.6rem;
  }

  .ribbon-track {
    position: relative;
    height: 10px;
    background: #d9cbaa;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 0.5rem;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.25);
  }

  .ribbon-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 0%;
    background: linear-gradient(90deg, var(--cloth-red), var(--gold));
    border-radius: 5px 0 0 5px;
  }

  .ribbon-handle {
    position: absolute;
    top: 50%;
    left: 0%;
    width: 16px;
    height: 22px;
    background: var(--gold);
    transform: translate(-50%, -50%);
    clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%);
    box-shadow: 0 3px 6px rgba(0,0,0,0.35);
    pointer-events: none;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #6b5c46;
    margin-bottom: 1.5rem;
    font-variant-numeric: tabular-nums;
  }

  .transport {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .transport button {
    border: none;
    background: none;
    cursor: pointer;
    color: #241a13;
    font-family: 'Libre Franklin', sans-serif;
    font-weight: 600;
  }

  #btn-back15, #btn-fwd15, #btn-prev-chapter, #btn-next-chapter {
    font-size: 0.8rem;
    color: #6b5c46;
  }

  #btn-playpause {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--cloth-red);
    color: var(--parchment);
    font-size: 0;
    position: relative;
    box-shadow: 0 8px 16px rgba(127,53,39,0.4);
    flex-shrink: 0;
  }

  #btn-playpause::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    border-style: solid;
    border-width: 9px 0 9px 15px;
    border-color: transparent transparent transparent var(--parchment);
    transform: translate(-40%, -50%);
  }

  #btn-playpause.is-playing::before {
    border-style: none;
    width: 14px;
    height: 16px;
    border-left: 5px solid var(--parchment);
    border-right: 5px solid var(--parchment);
    transform: translate(-50%, -50%);
  }

  .speed-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    font-size: 0.85rem;
    color: #6b5c46;
  }

  .speed-row select {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.85rem;
    padding: 0.3rem 0.5rem;
    border-radius: 5px;
    border: 1px solid #d9cbaa;
    background: #fff;
    color: #241a13;
  }

  .load-note {
    text-align: center;
    font-size: 0.8rem;
    color: #8a7a5e;
    margin-top: 1rem;
  }

  /* ---------- READ PANEL ---------- */

  .read-panel {
    background: var(--parchment);
    color: #241a13;
    border-radius: 10px;
    padding: 2.25rem 2.5rem;
    max-height: 640px;
    overflow-y: auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    line-height: 1.75;
  }

  .read-panel p {
    margin: 0 0 1.1rem;
  }

  .read-chapter-heading {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.25rem;
    margin: 2rem 0 1rem;
    color: var(--cloth-red);
    scroll-margin-top: 1rem;
  }

  .read-chapter-heading:first-child { margin-top: 0; }

  [hidden] { display: none !important; }
</style>
</head>
<body>

<header class="site-head">
  <h1>The Shelf</h1>
  <p>Your audiobook library</p>
</header>

<main>
  <section id="shelf-view">
    <div class="shelf" id="shelf"></div>
    <p class="empty-state" id="empty-state" hidden>
      No books on the shelf yet. Add a folder under <code>audiobooks/</code> with
      chapter audio and a cover image, then list it in <code>books.json</code>.
    </p>
  </section>

  <section class="reader-view" id="reader-view" hidden>
    <button class="back-btn" id="back-btn">&larr; Back to shelf</button>

    <div class="reader-header">
      <img id="reader-cover" alt="">
      <div>
        <h2 id="reader-title"></h2>
        <p id="reader-author"></p>
      </div>
      <div class="mode-tabs">
        <button id="tab-listen" class="active">Listen</button>
        <button id="tab-read">Read</button>
      </div>
    </div>

    <div class="reader-layout">
      <div class="chapter-list" id="chapter-list"></div>

      <div id="listen-panel">
        <div class="control-panel">
          <p class="eyebrow" id="now-playing-label">Now reading</p>

          <div class="ribbon-track" id="ribbon-track">
            <div class="ribbon-fill" id="ribbon-fill"></div>
            <div class="ribbon-handle" id="ribbon-handle"></div>
          </div>
          <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-duration">0:00</span>
          </div>

          <div class="transport">
            <button id="btn-prev-chapter" aria-label="Previous chapter">&#10094;&#10094;</button>
            <button id="btn-back15" aria-label="Back 15 seconds">-15s</button>
            <button id="btn-playpause" aria-label="Play"></button>
            <button id="btn-fwd15" aria-label="Forward 15 seconds">+15s</button>
            <button id="btn-next-chapter" aria-label="Next chapter">&#10095;&#10095;</button>
          </div>

          <div class="speed-row">
            <label for="speed-select">Speed</label>
            <select id="speed-select">
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="1.75">1.75x</option>
              <option value="2">2x</option>
            </select>
          </div>
        </div>
        <p class="load-note" id="load-note" hidden></p>
      </div>

      <div id="read-panel" class="read-panel" hidden></div>
    </div>
  </section>
</main>

<audio id="audio-el" preload="metadata"></audio>

<script>
  const shelfView = document.getElementById('shelf-view');
  const readerView = document.getElementById('reader-view');
  const shelfEl = document.getElementById('shelf');
  const emptyState = document.getElementById('empty-state');
  const backBtn = document.getElementById('back-btn');

  const readerCover = document.getElementById('reader-cover');
  const readerTitle = document.getElementById('reader-title');
  const readerAuthor = document.getElementById('reader-author');

  const tabListen = document.getElementById('tab-listen');
  const tabRead = document.getElementById('tab-read');
  const listenPanel = document.getElementById('listen-panel');
  const readPanel = document.getElementById('read-panel');
  const chapterListEl = document.getElementById('chapter-list');
  const nowPlayingLabel = document.getElementById('now-playing-label');
  const loadNote = document.getElementById('load-note');

  const audio = document.getElementById('audio-el');
  const ribbonTrack = document.getElementById('ribbon-track');
  const ribbonFill = document.getElementById('ribbon-fill');
  const ribbonHandle = document.getElementById('ribbon-handle');
  const timeCurrent = document.getElementById('time-current');
  const timeDuration = document.getElementById('time-duration');

  const playPauseBtn = document.getElementById('btn-playpause');
  const back15Btn = document.getElementById('btn-back15');
  const fwd15Btn = document.getElementById('btn-fwd15');
  const prevChapterBtn = document.getElementById('btn-prev-chapter');
  const nextChapterBtn = document.getElementById('btn-next-chapter');
  const speedSelect = document.getElementById('speed-select');

  let currentBook = null;
  let chapters = [];        // [{title, file, duration, char_start}]
  let currentChapterIndex = 0;
  let bookText = '';
  let suppressAutoplayOnLoad = false;

  function formatTime(seconds) {
    if (!isFinite(seconds) || isNaN(seconds)) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function positionKey(folder) {
    return `audiobook-position:${folder}`;
  }

  function savePosition() {
    if (!currentBook) return;
    localStorage.setItem(positionKey(currentBook.folder), JSON.stringify({
      chapterIndex: currentChapterIndex,
      time: audio.currentTime || 0
    }));
  }

  function loadSavedPosition(folder) {
    try {
      const raw = localStorage.getItem(positionKey(folder));
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  // ---------------- Shelf ----------------

  async function loadLibrary() {
    let books = [];
    try {
      const res = await fetch('books.json', { cache: 'no-store' });
      if (res.ok) books = await res.json();
    } catch (e) {
      books = [];
    }

    if (!books.length) {
      emptyState.hidden = false;
      return;
    }

    shelfEl.innerHTML = '';
    books.forEach(book => {
      const btn = document.createElement('button');
      btn.className = 'book-spine';
      btn.setAttribute('aria-label', `Open ${book.title}`);

      const img = document.createElement('img');
      img.className = 'book-cover';
      img.alt = `${book.title} cover`;
      img.src = `${book.folder}/${book.cover || 'coverphoto.jpg'}`;
      img.onerror = () => { img.replaceWith(makePlaceholderCover(book.title)); };

      const meta = document.createElement('div');
      meta.className = 'book-meta';
      meta.innerHTML = `<span class="book-title">${book.title}</span><span class="book-author">${book.author || ''}</span>`;

      btn.appendChild(img);
      btn.appendChild(meta);
      btn.addEventListener('click', () => openBook(book));
      shelfEl.appendChild(btn);
    });
  }

  function makePlaceholderCover(title) {
    const div = document.createElement('div');
    div.className = 'book-cover placeholder';
    div.textContent = title;
    return div;
  }

  // ---------------- Opening a book ----------------

  async function openBook(book) {
    currentBook = book;
    shelfView.hidden = true;
    readerView.hidden = false;

    readerTitle.textContent = book.title;
    readerAuthor.textContent = book.author || '';
    const coverSrc = `${book.folder}/${book.cover || 'coverphoto.jpg'}`;
    readerCover.src = coverSrc;
    readerCover.onerror = () => { readerCover.style.visibility = 'hidden'; };

    chapters = [];
    bookText = '';
    currentChapterIndex = 0;
    loadNote.hidden = true;

    // Chapter manifest (new format). Falls back to a single legacy file
    // if chapters.json isn't there yet (older books not yet regenerated).
    try {
      const res = await fetch(`${book.folder}/chapters.json`, { cache: 'no-store' });
      if (res.ok) {
        chapters = await res.json();
      }
    } catch (e) { /* ignore */ }

    if (!chapters.length && book.audio) {
      chapters = [{ title: book.title, file: book.audio, duration: null, char_start: 0 }];
    }

    if (!chapters.length) {
      loadNote.hidden = false;
      loadNote.textContent = "This book doesn't have any audio yet.";
    }

    // Book text, for Read mode
    try {
      const res = await fetch(`${book.folder}/book.txt`, { cache: 'no-store' });
      if (res.ok) bookText = await res.text();
    } catch (e) { /* ignore */ }

    tabRead.hidden = !bookText;

    const saved = loadSavedPosition(book.folder);
    const startChapter = saved && saved.chapterIndex < chapters.length ? saved.chapterIndex : 0;
    const startTime = saved ? saved.time : 0;

    renderChapterList();
    setActiveTab('listen');
    loadChapter(startChapter, { seekTo: startTime, autoplay: false });
    renderReadPanel();
  }

  backBtn.addEventListener('click', () => {
    audio.pause();
    savePosition();
    readerView.hidden = true;
    shelfView.hidden = false;
  });

  // ---------------- Chapter list (shared by both modes) ----------------

  function renderChapterList() {
    chapterListEl.innerHTML = '';
    if (chapters.length <= 1) {
      chapterListEl.hidden = true;
      return;
    }
    chapterListEl.hidden = false;
    chapters.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.textContent = ch.title;
      btn.className = i === currentChapterIndex ? 'active' : '';
      btn.addEventListener('click', () => {
        if (readPanel.hidden) {
          loadChapter(i, { seekTo: 0, autoplay: !audio.paused });
        } else {
          scrollReadPanelToChapter(i);
        }
      });
      chapterListEl.appendChild(btn);
    });
  }

  function highlightActiveChapterButton() {
    [...chapterListEl.children].forEach((btn, i) => {
      btn.classList.toggle('active', i === currentChapterIndex);
    });
  }

  // ---------------- Listen mode ----------------

  function loadChapter(index, { seekTo = 0, autoplay = false } = {}) {
    if (index < 0 || index >= chapters.length) return;
    currentChapterIndex = index;
    const chapter = chapters[index];

    nowPlayingLabel.textContent = chapters.length > 1 ? chapter.title : 'Now reading';
    audio.src = `${currentBook.folder}/${chapter.file}`;
    suppressAutoplayOnLoad = !autoplay;

    audio.addEventListener('loadedmetadata', function onMeta() {
      if (seekTo > 0 && seekTo < audio.duration) {
        audio.currentTime = seekTo;
      }
      timeDuration.textContent = formatTime(audio.duration);
      if (autoplay) audio.play();
      audio.removeEventListener('loadedmetadata', onMeta);
    });

    highlightActiveChapterButton();
    setupMediaSession();
  }

  audio.addEventListener('ended', () => {
    if (currentChapterIndex + 1 < chapters.length) {
      loadChapter(currentChapterIndex + 1, { seekTo: 0, autoplay: true });
    }
  });

  playPauseBtn.addEventListener('click', () => {
    if (audio.paused) audio.play(); else audio.pause();
  });

  audio.addEventListener('play', () => playPauseBtn.classList.add('is-playing'));
  audio.addEventListener('pause', () => { playPauseBtn.classList.remove('is-playing'); savePosition(); });

  back15Btn.addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
  fwd15Btn.addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + 15); });

  prevChapterBtn.addEventListener('click', () => {
    if (currentChapterIndex > 0) loadChapter(currentChapterIndex - 1, { seekTo: 0, autoplay: !audio.paused });
  });
  nextChapterBtn.addEventListener('click', () => {
    if (currentChapterIndex + 1 < chapters.length) loadChapter(currentChapterIndex + 1, { seekTo: 0, autoplay: !audio.paused });
  });

  speedSelect.addEventListener('change', () => {
    audio.playbackRate = parseFloat(speedSelect.value);
  });

  audio.addEventListener('timeupdate', () => {
    if (!isFinite(audio.duration)) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    ribbonFill.style.width = `${pct}%`;
    ribbonHandle.style.left = `${pct}%`;
    timeCurrent.textContent = formatTime(audio.currentTime);
    timeDuration.textContent = formatTime(audio.duration);
    savePosition();

    if ('mediaSession' in navigator) {
      navigator.mediaSession.setPositionState({
        duration: audio.duration,
        playbackRate: audio.playbackRate,
        position: audio.currentTime
      });
    }
  });

  function seekFromEvent(evt) {
    const rect = ribbonTrack.getBoundingClientRect();
    const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
    const pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    if (isFinite(audio.duration)) audio.currentTime = pct * audio.duration;
  }

  ribbonTrack.addEventListener('click', seekFromEvent);
  let isDragging = false;
  ribbonTrack.addEventListener('mousedown', () => { isDragging = true; });
  window.addEventListener('mousemove', (e) => { if (isDragging) seekFromEvent(e); });
  window.addEventListener('mouseup', () => { isDragging = false; });

  function setupMediaSession() {
    if (!('mediaSession' in navigator) || !currentBook) return;
    const coverSrc = `${currentBook.folder}/${currentBook.cover || 'coverphoto.jpg'}`;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: chapters.length > 1 ? `${currentBook.title} — ${chapters[currentChapterIndex].title}` : currentBook.title,
      artist: currentBook.author || '',
      album: 'The Shelf',
      artwork: [{ src: coverSrc, sizes: '512x512', type: 'image/jpeg' }]
    });
    navigator.mediaSession.setActionHandler('play', () => audio.play());
    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    navigator.mediaSession.setActionHandler('seekbackward', (d) => {
      audio.currentTime = Math.max(0, audio.currentTime - (d.seekOffset || 15));
    });
    navigator.mediaSession.setActionHandler('seekforward', (d) => {
      audio.currentTime = Math.min(audio.duration || Infinity, audio.currentTime + (d.seekOffset || 15));
    });
    navigator.mediaSession.setActionHandler('seekto', (d) => {
      if (d.seekTime !== undefined) audio.currentTime = d.seekTime;
    });
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if (currentChapterIndex > 0) loadChapter(currentChapterIndex - 1, { seekTo: 0, autoplay: true });
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => {
      if (currentChapterIndex + 1 < chapters.length) loadChapter(currentChapterIndex + 1, { seekTo: 0, autoplay: true });
    });
  }

  // ---------------- Read mode ----------------

  function renderReadPanel() {
    readPanel.innerHTML = '';
    if (!bookText) return;

    // Build boundaries from chapters (char_start) so headings can be
    // inserted at the right point and used as scroll targets.
    const boundaries = chapters.length
      ? chapters.map((c, i) => ({ ...c, index: i }))
      : [{ title: currentBook.title, char_start: 0, index: 0 }];

    boundaries.forEach((ch, i) => {
      const start = ch.char_start || 0;
      const end = i + 1 < boundaries.length ? boundaries[i + 1].char_start : bookText.length;
      const sectionText = bookText.slice(start, end);

      if (chapters.length > 1) {
        const heading = document.createElement('h3');
        heading.className = 'read-chapter-heading';
        heading.id = `read-chapter-${i}`;
        heading.textContent = ch.title;
        readPanel.appendChild(heading);
      }

      sectionText.split(/\n\s*\n/).forEach(para => {
        const trimmed = para.trim();
        if (!trimmed) return;
        const p = document.createElement('p');
        p.textContent = trimmed;
        readPanel.appendChild(p);
      });
    });
  }

  function scrollReadPanelToChapter(index) {
    currentChapterIndex = index;
    highlightActiveChapterButton();
    const el = document.getElementById(`read-chapter-${index}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---------------- Tabs ----------------

  function setActiveTab(mode) {
    const isListen = mode === 'listen';
    tabListen.classList.toggle('active', isListen);
    tabRead.classList.toggle('active', !isListen);
    listenPanel.hidden = !isListen;
    readPanel.hidden = isListen;
  }

  tabListen.addEventListener('click', () => setActiveTab('listen'));
  tabRead.addEventListener('click', () => setActiveTab('read'));

  window.addEventListener('beforeunload', savePosition);

  loadLibrary();
</script>

</body>
