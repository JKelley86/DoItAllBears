  mechanics: {
    "Newton's Laws": {
      lesson: {
        title: "Newton's Laws: The Rules Everything Obeys",
        sections: [
          { heading: "First Law: Inertia", body: "An object at rest stays at rest, and an object in motion stays in motion at constant velocity, unless acted upon by an unbalanced force. This is inertia — matter resists changes to its state of motion. A heavy machine part sitting on a conveyor doesn't move until a force acts on it. Once moving, it wants to keep moving. Every machine startup and stop must overcome inertia." },
          { heading: "Second Law: F = ma", body: "Force equals mass times acceleration: F = ma. Double the force, double the acceleration. Double the mass, halve the acceleration for the same force. This is the foundation of all dynamics calculations. A 500kg load needing 2 m/s² of acceleration requires 1,000N of net force — before adding friction. Units: Newtons (N) = kg × m/s²." },
          { heading: "Third Law: Action-Reaction", body: "For every action force, there is an equal and opposite reaction force. When a hydraulic cylinder pushes a load with 5,000N, the load pushes back on the cylinder with 5,000N. When a crane lifts 1,000kg, the frame supports that same force downward. Every force in a system has a reaction — and every mounting bracket, bolt, and frame member must be designed to handle it." },
          { heading: "Newton's Laws in Industry", body: "These three laws govern machine design daily. Conveyor startups must overcome inertia — sudden starts on heavy loads snap shafts and damage gearboxes. Flywheel energy storage works entirely by inertia. Motor torque requirements include inertia torque to accelerate rotating components, not just the running load torque. Knowing which law applies to which part of a problem is the starting point for all mechanical analysis." }
        ],
        takeaways: [
          "First Law: objects resist changes in motion — inertia must be overcome to start or stop",
          "Second Law: F = ma — links force, mass, and acceleration in every dynamic system",
          "Third Law: every force has an equal, opposite reaction — design all mounting for full force",
          "Startup and braking forces are often far larger than steady-state running forces"
        ]
      },
      quiz: {
        questions: [
          { q: "A 200kg machine part needs to accelerate at 3 m/s². What net force is required?", options: ["67N", "203N", "600N", "6000N"], answer: 2, explain: "F = ma = 200kg × 3 m/s² = 600N. This is the net force needed — the actuator must supply more than 600N to also overcome friction and other resistances. Always calculate net force first, then work backward to required actuator force." },
          { q: "A rocket in deep space fires its engine then shuts off. What happens to its motion?", options: ["Gradually slows to a stop", "Continues at constant velocity indefinitely", "Accelerates from residual fuel", "Spins in circles"], answer: 1, explain: "With no unbalanced forces acting on it, the rocket maintains constant velocity per Newton's First Law. This is why spacecraft can travel billions of miles on a brief engine burn — inertia carries them the rest of the way." },
          { q: "A hydraulic cylinder exerts 5,000N on a workpiece. What force does the workpiece exert back on the cylinder?", options: ["0N", "2,500N", "5,000N", "10,000N"], answer: 2, explain: "Newton's Third Law: equal and opposite reaction. The workpiece exerts exactly 5,000N back on the cylinder regardless of its mass or material. This is why cylinder mounting brackets must be designed for the full cylinder force." }
        ]
      }
    },

    "Levers & Torque": {
      lesson: {
        title: "Levers & Torque: Mechanical Advantage at Work",
        sections: [
          { heading: "What Is Torque?", body: "Torque is the rotational equivalent of force — it's what causes rotation around an axis. Torque = Force × perpendicular distance from the axis (T = F × d). Units are Newton-meters (N·m) or foot-pounds (ft·lb). A 100N force applied 0.5 meters from a pivot creates 50 N·m of torque. The same force at 1 meter creates 100 N·m. This is why longer wrenches make tightening easier — more moment arm, more torque for the same effort." },
          { heading: "The Three Classes of Levers", body: "Class 1: fulcrum between effort and load (crowbar, seesaw, scissors). Can multiply force or distance depending on fulcrum placement. Class 2: load between fulcrum and effort (wheelbarrow, nutcracker). Always multiplies force — mechanical advantage greater than 1. Class 3: effort between fulcrum and load (tweezers, shovel, human forearm). Multiplies speed and distance at the cost of requiring more input force than the load." },
          { heading: "Mechanical Advantage", body: "Mechanical advantage (MA) = Load force ÷ Effort force = Effort distance ÷ Load distance. A lever with the fulcrum 10cm from the load and 90cm from effort has MA = 9. Apply 100N of effort to lift 900N — but your end must move 9cm for every 1cm the load moves. Machines never create energy; they redirect and trade force for distance or vice versa." },
          { heading: "Torque in Rotating Machinery", body: "Every rotating machine involves torque. Motor specifications list output torque in N·m — the twisting force it delivers. Gearboxes multiply torque inversely to speed: a 5:1 gearbox takes 100 N·m input and delivers 500 N·m output at one-fifth the speed. Bolts are tightened to specified torque values to achieve the correct clamping force. Structural bolted joints, flange connections, and foundation anchors all depend on correct torque for integrity." }
        ],
        takeaways: [
          "Torque = Force × distance from pivot (T = F × d), measured in N·m or ft·lb",
          "Three lever classes differ by fulcrum, effort, and load position relative to each other",
          "Mechanical advantage trades force for distance — more leverage means less travel",
          "Gearboxes multiply torque while reducing speed by the same ratio"
        ]
      },
      quiz: {
        questions: [
          { q: "A wrench applies 50N of force at 0.3m from a bolt center. What torque is applied?", options: ["0.6 N·m", "15 N·m", "50.3 N·m", "166.7 N·m"], answer: 1, explain: "Torque = Force × distance = 50N × 0.3m = 15 N·m. If the bolt requires 20 N·m, you'd need either 67N of force or a 0.4m wrench. Torque wrenches are calibrated specifically to achieve the required fastener clamping force." },
          { q: "A Class 2 lever has the load 0.5m from the fulcrum and effort applied 2m from the fulcrum. What is the mechanical advantage?", options: ["0.25", "1", "2.5", "4"], answer: 3, explain: "MA = effort distance ÷ load distance = 2.0 ÷ 0.5 = 4. A Class 2 lever always has MA > 1 because effort is always farther from the fulcrum than the load. Apply 250N to lift 1,000N — but push 4cm for every 1cm the load rises." },
          { q: "A motor produces 200 N·m. A 4:1 gearbox is attached. What output torque does the gearbox produce?", options: ["50 N·m", "200 N·m", "400 N·m", "800 N·m"], answer: 3, explain: "Gearbox output torque = input torque × gear ratio = 200 × 4 = 800 N·m. Output speed is divided by 4. Power (Torque × speed) is conserved minus efficiency losses. This is how motors with modest torque drive high-torque applications." }
        ]
      }
    },

    "Forces & Motion": {
      lesson: {
        title: "Forces & Motion: Understanding How Things Move",
        sections: [
          { heading: "Types of Forces", body: "Forces are pushes or pulls that change or tend to change an object's motion. Contact forces require physical contact: friction, normal force, tension, compression, spring force. Non-contact forces act at a distance: gravity, magnetic force, electrostatic force. In mechanical systems you typically deal with applied forces from actuators, reaction forces from supports and bearings, friction from surface contact, and weight from gravity acting on mass." },
          { heading: "Vector Nature of Force", body: "Forces are vectors — they have both magnitude and direction. A 100N force northeast is completely different from 100N straight down. When multiple forces act on an object, they add as vectors, not numbers. A 60N force east plus 80N force north produces a 100N resultant at 53° from east — the Pythagorean theorem applies to perpendicular forces. Always break forces into components before adding them." },
          { heading: "Equilibrium", body: "An object is in static equilibrium when two conditions are met simultaneously: the sum of all forces equals zero (ΣF = 0) AND the sum of all torques equals zero (ΣM = 0). A machine frame sitting still satisfies both — gravity pulls down, the floor pushes up, support forces balance horizontal loads, and no net rotation tendency exists. These two equations let you solve for unknown support reactions in any structure." },
          { heading: "Inclined Planes", body: "When analyzing forces on inclined surfaces, decompose them into components parallel and perpendicular to the surface. A box on a 30° ramp: the perpendicular component of gravity = mg·cos30° = 0.866mg (this is the normal force). The parallel component = mg·sin30° = 0.5mg (this tends to slide the box down). To push it up at constant speed requires force equal to the parallel component plus friction. Every inclined conveyor, ramp, and lift table uses this analysis." }
        ],
        takeaways: [
          "Forces are contact (friction, normal) or non-contact (gravity, magnetic)",
          "Forces are vectors — direction matters, always add component by component",
          "Equilibrium requires ΣF = 0 AND ΣM = 0 simultaneously",
          "Inclined surface analysis: decompose forces parallel and perpendicular to the surface"
        ]
      },
      quiz: {
        questions: [
          { q: "A 50N force acts east and a 50N force acts north on the same object. What is the magnitude of the resultant?", options: ["100N", "50N", "70.7N", "25N"], answer: 2, explain: "For perpendicular forces: R = √(50² + 50²) = √5000 ≈ 70.7N at 45° NE. The Pythagorean theorem applies when forces are at right angles. Simply adding magnitudes only works when forces act in the same direction." },
          { q: "What are the two conditions required for static equilibrium?", options: ["Zero velocity and zero acceleration", "ΣF = 0 AND ΣM = 0", "ΣF = 0 AND constant velocity", "Zero force and zero torque"], answer: 1, explain: "Static equilibrium requires both translational equilibrium (ΣF = 0 — no tendency to translate) and rotational equilibrium (ΣM = 0 — no tendency to rotate). Meeting only one condition is not sufficient." },
          { q: "A box sits on a 30° incline. What is the component of gravity pulling it down the slope if the box weighs 100N?", options: ["86.6N", "100N", "50N", "57.7N"], answer: 2, explain: "Parallel component = Weight × sin(30°) = 100 × 0.5 = 50N. This is the force tending to slide the box down the ramp. The perpendicular component = 100 × cos(30°) = 86.6N, which is the normal force the ramp pushes back with." }
        ]
      }
    },

    "Energy & Work": {
      lesson: {
        title: "Energy & Work: Getting Things Done",
        sections: [
          { heading: "Work Defined", body: "Work is done when a force moves an object through a distance in the direction of the force: W = F × d. Units are Joules (J), where 1J = 1N × 1m. Pushing with 100N over 5 meters does 500J of work. Critically, if the object doesn't move — no work is done, regardless of how much force you apply. A man pushing against a wall all day does zero work in the physics sense." },
          { heading: "Kinetic and Potential Energy", body: "Kinetic energy (KE) is the energy of motion: KE = ½mv². A 1,000kg machine part moving at 2 m/s has KE = ½ × 1000 × 4 = 2,000J. Potential energy (PE) is stored energy due to position: PE = mgh. A 500kg load raised 3 meters stores PE = 500 × 9.81 × 3 = 14,715J. When the load drops, that PE converts to KE — and then to heat, noise, and deformation on impact." },
          { heading: "Conservation of Energy", body: "Energy cannot be created or destroyed — only converted between forms. A swinging pendulum converts PE to KE at the bottom and back to PE at the top, with a little lost to friction each cycle. In machines, input energy = useful work output + losses (heat from friction, sound from vibration, electrical losses). Efficiency = useful work out ÷ total energy in. A motor with 90% efficiency wastes 10% as heat." },
          { heading: "Power", body: "Power is the rate of doing work: P = W/t = F × v. Units are Watts (W) or horsepower (HP), where 1 HP = 746W. A motor lifting 1,000N at 2 m/s delivers P = 1000 × 2 = 2,000W = 2.68 HP. Power ratings determine how fast a machine can do its job — two machines doing the same work differ only in how long it takes them, which comes down to power." }
        ],
        takeaways: [
          "Work = Force × distance (W = Fd) — no movement means no work, regardless of force",
          "KE = ½mv² and PE = mgh — both measured in Joules",
          "Energy is conserved — losses appear as heat, sound, or deformation",
          "Power = Work ÷ time = Force × velocity, measured in Watts or horsepower"
        ]
      },
      quiz: {
        questions: [
          { q: "A 200N force moves a crate 10 meters in the direction of the force. How much work is done?", options: ["20J", "200J", "2000J", "210J"], answer: 2, explain: "W = F × d = 200N × 10m = 2,000J. Work requires both force AND displacement in the direction of that force. If the crate hadn't moved, zero work would have been done regardless of the force applied." },
          { q: "A 500kg load is raised 4 meters. How much potential energy is stored? (g = 9.81 m/s²)", options: ["2000J", "9810J", "19620J", "4905J"], answer: 2, explain: "PE = mgh = 500 × 9.81 × 4 = 19,620J ≈ 19.6kJ. This energy must come from the lifting mechanism — motor, hydraulic cylinder, or otherwise. When dropped, this PE converts to kinetic energy and then to destructive impact energy." },
          { q: "A motor produces 5,000W of output power. A load requires 3,000W of useful work. What is the motor's efficiency?", options: ["60%", "40%", "167%", "80%"], answer: 0, explain: "Efficiency = useful output ÷ total input = 3,000 ÷ 5,000 = 0.60 = 60%. The remaining 40% (2,000W) is lost as heat, friction, and electrical losses. Real industrial motors typically achieve 85-95% efficiency at full load." }
        ]
      }
    },

    "Momentum": {
      lesson: {
        title: "Momentum: The Staying Power of Motion",
        sections: [
          { heading: "What Is Momentum?", body: "Momentum (p) is the product of mass and velocity: p = mv. Units are kg·m/s. A 10kg object moving at 5 m/s has the same momentum as a 50kg object moving at 1 m/s — both have 50 kg·m/s. Momentum captures how difficult it is to stop a moving object. A slow-moving locomotive is far harder to stop than a fast-moving baseball — because mass dominates over velocity in real industrial machinery." },
          { heading: "Conservation of Momentum", body: "In a closed system with no external forces, total momentum is conserved. When two objects collide, total momentum before equals total momentum after. A 1,000kg cart at 3 m/s striking a stationary 500kg cart: after coupling, combined momentum (3,000 kg·m/s) is shared by 1,500kg total mass, so final velocity = 2 m/s. This is exactly how rail car coupling, conveyor merging, and impact tools work in industry." },
          { heading: "Impulse", body: "Impulse = Force × time = change in momentum (J = F·t = Δp). To change an object's momentum, you apply force over time. A large force over a short time or a small force over a long time can produce the same momentum change. This is why crash zones crumple — extending the stopping time reduces peak force. Air bags, cushioned stops on conveyors, and hydraulic shock absorbers all use impulse to spread impact force over time." },
          { heading: "Momentum in Machine Design", body: "Rotating machinery has angular momentum: L = Iω, where I is moment of inertia and ω is angular velocity. A spinning flywheel resists changes in speed — this is why flywheels smooth out power pulses in engines and presses. Sudden stops of high-inertia rotating systems create enormous torque spikes that shear shafts and strip gears. Soft-start drives and controlled deceleration ramps exist specifically to manage angular momentum safely." }
        ],
        takeaways: [
          "Momentum p = mv — mass and velocity both determine how hard an object is to stop",
          "Total momentum is conserved in collisions — what goes in equals what comes out",
          "Impulse = F × t = Δp — extending stop time reduces peak impact force",
          "Rotating systems have angular momentum — sudden stops create shaft-breaking torque spikes"
        ]
      },
      quiz: {
        questions: [
          { q: "A 2kg ball moves at 10 m/s. A 10kg ball moves at 2 m/s. Which has more momentum?", options: ["The 2kg ball", "The 10kg ball", "They have equal momentum", "Cannot be determined"], answer: 2, explain: "Both have p = mv: ball 1 = 2 × 10 = 20 kg·m/s, ball 2 = 10 × 2 = 20 kg·m/s. Equal momentum. This is why a slow heavy object can be just as dangerous to stop as a fast light one." },
          { q: "A 1,000kg cart at 4 m/s collides and couples with a stationary 1,000kg cart. What is their combined velocity after coupling?", options: ["4 m/s", "2 m/s", "0 m/s", "8 m/s"], answer: 1, explain: "Conservation of momentum: 1000 × 4 = 2000 × v_final. v_final = 4000 ÷ 2000 = 2 m/s. Total momentum (4,000 kg·m/s) is conserved — the doubled mass means halved velocity." },
          { q: "Why do crumple zones in vehicles improve safety during crashes?", options: ["They absorb all the momentum", "They extend stopping time, reducing peak force on occupants", "They reduce vehicle mass", "They increase momentum before impact"], answer: 1, explain: "Impulse = F × t = Δp. Momentum change is fixed by the crash. By increasing stopping time (t) through crumpling, peak force (F) is dramatically reduced. The same principle applies to cushioned conveyor stops and hydraulic shock absorbers." }
        ]
      }
    },

    "Friction": {
      lesson: {
        title: "Friction: The Force That Resists Motion",
        sections: [
          { heading: "What Is Friction?", body: "Friction is the force that opposes relative motion between two surfaces in contact. It arises from microscopic surface irregularities interlocking. Friction force = μ × Normal force (F_f = μN), where μ (mu) is the coefficient of friction — a dimensionless number depending on the two materials in contact. A higher μ means more friction. Rubber on concrete has μ ≈ 0.7. Steel on ice has μ ≈ 0.03." },
          { heading: "Static vs Kinetic Friction", body: "Static friction prevents motion from starting — it's always higher than kinetic friction. Kinetic (sliding) friction resists motion once sliding has begun. This is why more force is needed to start a heavy load moving than to keep it moving. On inclined conveyors, the machine must overcome static friction on startup, then only kinetic friction while running — which is why motor current spikes at startup then drops." },
          { heading: "Friction on Inclined Surfaces", body: "On an incline at angle θ, normal force N = mg·cosθ and friction force F_f = μmg·cosθ. The load slides when the gravity component along the slope (mg·sinθ) exceeds maximum static friction (μmg·cosθ). This happens when tanθ > μ_s. A surface with μ = 0.5 will hold a load on slopes up to about 26.6°. This defines the maximum safe angle for gravity-fed chutes and inclined conveyors without drive power." },
          { heading: "Friction in Machinery", body: "Friction is both enemy and ally in machines. As an enemy: friction in bearings, seals, and sliding surfaces wastes energy as heat and causes wear. Lubrication reduces μ dramatically — a properly lubricated bearing has μ ≈ 0.001 versus 0.1 for an unlubricated one. As an ally: friction drives belts on pulleys, grips workpieces in clamps, and lets brakes stop machines. Calculating the required normal force in a clamp or belt tension depends directly on the friction coefficient between surfaces." }
        ],
        takeaways: [
          "Friction force = μ × Normal force — higher normal force means more friction",
          "Static friction (starting) is always higher than kinetic friction (sliding) — causes startup current spikes",
          "A load slides down an incline when tanθ > μ_s — this defines maximum safe chute angle",
          "Lubrication reduces μ by a factor of 100 — critical for bearing life and energy efficiency"
        ]
      },
      quiz: {
        questions: [
          { q: "A 500N crate sits on a floor with μ_s = 0.4. What horizontal force is needed to start it sliding?", options: ["125N", "200N", "500N", "2000N"], answer: 1, explain: "F_f = μN = 0.4 × 500N = 200N. This is the maximum static friction force — you need just over 200N to begin sliding. Once moving, kinetic friction (usually lower μ) keeps it sliding with less force needed." },
          { q: "Why does motor current spike at startup compared to steady-state running?", options: ["Motor windings are cold at startup", "Static friction is higher than kinetic friction — more force needed to start than to maintain motion", "The motor accelerates the load", "Power factor is lower at startup"], answer: 1, explain: "Static friction is always higher than kinetic. Starting a conveyor or machine requires overcoming static friction — which demands more torque and thus more motor current than steady-state running against kinetic friction." },
          { q: "A surface has μ_s = 0.5. At what approximate maximum angle will an object NOT slide down?", options: ["30°", "26.6°", "45°", "60°"], answer: 1, explain: "The object slides when tanθ > μ_s. Maximum angle = arctan(0.5) ≈ 26.6°. At steeper angles, gravity's component along the slope exceeds maximum static friction. This calculation determines safe chute and hopper angles." }
        ]
      }
    },

    "Simple Machines": {
      lesson: {
        title: "Simple Machines: The Building Blocks of All Mechanisms",
        sections: [
          { heading: "The Six Simple Machines", body: "All mechanical systems are combinations of six simple machines: lever (crowbar, wrench), wheel and axle (steering wheel, winch), pulley (block and tackle, crane), inclined plane (ramp, wedge), wedge (axe, chisel, door stop), and screw (bolt, jack, auger). Each provides mechanical advantage — allowing a smaller input force to overcome a larger load force at the expense of moving a greater distance. Every complex machine from a car engine to a crane is built from these six." },
          { heading: "Pulleys and Block & Tackle", body: "A single fixed pulley changes the direction of force but not its magnitude. A single movable pulley provides MA = 2 — you lift with half the force over twice the distance. Block and tackle systems with multiple pulleys multiply MA further: 4 pulleys give MA = 4, meaning you lift 1,000kg with 250kg of force. The trade-off: rope must be pulled 4 meters to raise the load 1 meter. Crane hoisting systems use this principle." },
          { heading: "The Screw: Lever Wrapped Around a Cylinder", body: "A screw converts rotational motion into linear motion. The pitch is the distance the screw advances per revolution. Mechanical advantage = 2πr ÷ pitch, where r is the handle radius. A jack screw with 2mm pitch and a 300mm handle gives MA = 2π × 300 ÷ 2 ≈ 942. This is why a person can lift a car with a scissor jack — enormous mechanical advantage from screw geometry. Ball screws in CNC machines use the same principle for precise positioning." },
          { heading: "Efficiency and Real Machines", body: "Ideal mechanical advantage (IMA) assumes no friction losses. Actual mechanical advantage (AMA) = Load force ÷ Effort force applied in practice. Efficiency = AMA ÷ IMA. A pulley system with IMA = 4 might have AMA = 3.2 due to rope friction and pulley bearing friction — efficiency = 80%. Screws are notoriously low efficiency (20-40%) due to thread friction, but this same friction makes them self-locking — a jack won't back-drive under load, which is a safety feature." }
        ],
        takeaways: [
          "All mechanisms are combinations of 6 simple machines — lever, pulley, screw, wheel/axle, inclined plane, wedge",
          "Pulleys multiply force at the expense of distance — 4-pulley block gives MA = 4",
          "Screw MA = 2πr ÷ pitch — high MA enables enormous force multiplication with small input",
          "Real efficiency < ideal — friction reduces AMA but also provides self-locking in screws and jacks"
        ]
      },
      quiz: {
        questions: [
          { q: "A block and tackle has 4 rope segments supporting the load. What is the ideal mechanical advantage?", options: ["2", "4", "8", "16"], answer: 1, explain: "For a pulley system, IMA = number of rope segments supporting the movable block = 4. You apply one-quarter the load force, but must pull the rope four times as far as the load rises." },
          { q: "A screw jack has a 3mm pitch and a handle radius of 200mm. What is the ideal mechanical advantage?", options: ["67", "419", "600", "1257"], answer: 1, explain: "IMA = 2πr ÷ pitch = 2π × 200 ÷ 3 = 418.9 ≈ 419. This massive mechanical advantage explains why a person can lift tonnes with a small hand crank. One full turn of the handle raises the load just 3mm." },
          { q: "A pulley system has IMA = 5 but AMA = 3.5. What is its efficiency?", options: ["35%", "56%", "70%", "143%"], answer: 2, explain: "Efficiency = AMA ÷ IMA = 3.5 ÷ 5 = 0.70 = 70%. The 30% loss is due to rope friction, pulley bearing friction, and rope stiffness. In real hoisting systems, efficiency is a key specification because it determines required motor power." }
        ]
      }
    },

    "Center of Mass": {
      lesson: {
        title: "Center of Mass: Where Balance Lives",
        sections: [
          { heading: "What Is Center of Mass?", body: "The center of mass (COM) is the single point where an object's entire mass can be considered to act for the purpose of analyzing translational motion and balance. For a uniform object, COM is at the geometric center. For irregular objects or assemblies, COM shifts toward the heavier regions. Gravity acts at the COM — this is the point you must support to keep an object balanced. Engineers call this the centroid for geometric shapes." },
          { heading: "Calculating Center of Mass", body: "For a system of masses: x_COM = (m1×x1 + m2×x2 + ...) ÷ (m1 + m2 + ...). A 10kg mass at x=1m and a 30kg mass at x=3m: x_COM = (10×1 + 30×3) ÷ (10+30) = 100 ÷ 40 = 2.5m from the reference. The COM is three-quarters of the way toward the heavier mass. This calculation determines where to place lifting slings on unbalanced loads, where to locate machine feet, and how to balance rotating parts." },
          { heading: "Stability and Tipping", body: "An object is stable when its COM lies directly above its base of support. Tipping occurs when the COM moves outside the base footprint — gravity then creates a torque that rotates the object further rather than restoring it. A tall, narrow object tips easily because small disturbances move the COM outside the narrow base. Wide, low objects are stable because the COM must travel far horizontally before leaving the base. Forklift stability triangles and vehicle rollover analysis both use this principle." },
          { heading: "COM in Machine Design", body: "Rotating machinery must be dynamically balanced — the COM of each rotating part must lie exactly on the rotation axis. An off-center mass creates centrifugal force = mrω², which produces vibration, bearing loads, and fatigue. Balancing machines measure imbalance and specify where to add or remove material. A crankshaft, turbine rotor, or fan blade out of balance by just a few grams can destroy bearings at high speed. Precision balancing is a specialized trade." }
        ],
        takeaways: [
          "COM is the single point where all mass effectively acts — gravity pulls at the COM",
          "x_COM = Σ(m×x) ÷ Σm — weighted average position of all masses in a system",
          "Tipping occurs when COM moves outside the base of support — wide and low = stable",
          "Rotating parts must be balanced — off-center COM creates destructive centrifugal forces at speed"
        ]
      },
      quiz: {
        questions: [
          { q: "A 20kg mass is at x=0m and a 60kg mass is at x=4m. Where is the center of mass?", options: ["x = 1m", "x = 2m", "x = 3m", "x = 4m"], answer: 2, explain: "x_COM = (20×0 + 60×4) ÷ (20+60) = 240 ÷ 80 = 3m. The COM is three-quarters of the way toward the heavier 60kg mass. Lifting this assembly at x=3m produces no rotation." },
          { q: "A tall filing cabinet is more likely to tip than a low toolbox. Why?", options: ["It weighs more", "Its COM is higher, so less lateral movement is needed to move it outside the base", "It has more surface area", "Tall objects have more friction"], answer: 1, explain: "A higher COM means the COM is closer horizontally to the edge of the base. Less lateral displacement (from a bump, or tilting) is needed to move the COM outside the base footprint and initiate tipping. Low COM = more stable." },
          { q: "A rotating fan blade has its center of mass 2mm off the rotation axis at a radius of 0.002m and mass 0.5kg. At 3000 RPM (314 rad/s), what centrifugal force acts on the bearings?", options: ["31N", "98N", "314N", "985N"], answer: 0, explain: "F = mrω² = 0.5 × 0.002 × 314² = 0.5 × 0.002 × 98,596 ≈ 98.6N ≈ 99N. Even 2mm of imbalance creates nearly 100N of cyclic bearing load at 3000 RPM — multiplied millions of times per hour, this rapidly destroys bearings." }
        ]
      }
    }
  }, // end mechanics

  // ─── PHYSICS — FLUIDS ───────────────────────────────────────────
  fluids: {
    "Water Pressure": {
      lesson: {
        title: "Water Pressure: Force Per Unit Area in Fluids",
        sections: [
          { heading: "What Is Fluid Pressure?", body: "Pressure is force distributed over an area: P = F ÷ A. Units are Pascals (Pa = N/m²), PSI (pounds per square inch), or bar. Fluid pressure acts equally in all directions at a given point — unlike a solid that only pushes where it contacts. Press on water in a sealed container and that pressure transmits to every surface equally. This omnidirectional nature is what makes fluids so useful in hydraulic systems." },
          { heading: "Hydrostatic Pressure: Depth Matters", body: "Pressure in a fluid increases with depth: P = ρgh, where ρ is fluid density (kg/m³), g is 9.81 m/s², and h is depth in meters. Water density is 1,000 kg/m³, so every 1 meter of depth adds 9,810 Pa ≈ 1.42 PSI. At 10 meters underwater, pressure is roughly 2 atmospheres — double the surface. This is why deep tanks, dam bases, and submarine hulls must withstand enormous pressure while the surface is at atmospheric." },
          { heading: "Gauge vs Absolute Pressure", body: "Absolute pressure includes atmospheric pressure (101,325 Pa ≈ 14.7 PSI at sea level). Gauge pressure is relative to atmosphere — it reads zero when open to air. A tire inflated to 35 PSI gauge is actually 49.7 PSI absolute. Most industrial instruments read gauge pressure. Vacuum gauges read negative gauge — below atmospheric. When calculating forces on submerged surfaces, use absolute. When sizing pumps and pipes, typically use gauge." },
          { heading: "Pressure on Submerged Surfaces", body: "Force on a submerged flat surface = P × A. A 2m × 3m tank wall with average water pressure of 10,000 Pa experiences a total force = 10,000 × 6 = 60,000N = 6 tonnes. Pressure increases with depth, so force is not uniform — it's greater near the bottom. Tank designers use integration to find total force and its point of application (center of pressure, always below the centroid). This drives wall thickness requirements for storage tanks." }
        ],
        takeaways: [
          "Pressure P = F/A, measured in Pa, PSI, or bar — acts equally in all directions in fluids",
          "Hydrostatic pressure P = ρgh — increases 9,810 Pa (1.42 PSI) per meter of water depth",
          "Gauge pressure is relative to atmosphere; absolute includes the 14.7 PSI of atmospheric pressure",
          "Force on a submerged surface = average pressure × area — drives tank and dam wall design"
        ]
      },
      quiz: {

          { q: "A pressure gauge on a water line reads 50 PSI. What is the approximate absolute pressure?", options: ["35.3 PSI", "50 PSI", "64.7 PSI", "100 PSI"], answer: 2, explain: "Absolute = Gauge + Atmospheric = 50 + 14.7 = 64.7 PSI. Most pipe and vessel pressure ratings are in gauge (PSIG). When calculating if a vessel will burst, use absolute pressure to account for the full force acting on it." },
          { q: "Water pressure at a given depth pushes on the north wall of a tank. Which direction does it also push?", options: ["Only north", "North and south only", "Horizontally only", "Equally in all directions"], answer: 3, explain: "Fluid pressure is omnidirectional — at any point it acts equally in all directions (up, down, and all horizontal). This is fundamental to fluid behavior and enables Pascal's Law and hydraulic force transmission." }

    "Buoyancy": {

          { heading: "Archimedes' Principle", body: "A body immersed in a fluid experiences an upward buoyant force equal to the weight of the fluid it displaces. F_buoyancy = ρ_fluid × g × V_displaced. A 1 m³ block fully submerged in water (ρ=1,000 kg/m³) experiences 9,810N of buoyant force — equivalent to 1,000kg of upward push. This is exactly the weight of 1m³ of water. Archimedes discovered this around 250 BC; it remains the complete theory of floating and sinking." },
          { heading: "Floating, Sinking, and Neutral Buoyancy", body: "An object floats when buoyant force equals its weight — meaning its average density is less than the fluid's. It sinks when average density exceeds the fluid. It's neutrally buoyant when densities match. A steel ship floats because its hull encloses air — the average density of (steel + air) is less than water. A submarine adjusts buoyancy by flooding or pumping ballast tanks, changing its average density to dive, surface, or hover at depth." },
          { heading: "Partial Submersion", body: "A floating object sinks until the displaced fluid weight equals the object's total weight. A 500kg boat displaces exactly 500kg (0.5 m³) of water when floating. Load it with 200kg of cargo and it sinks deeper until it displaces 700kg of water. This is why ships have load lines (Plimsoll marks) — maximum draft limits ensure enough freeboard remains for safety. Calculate load capacity by finding how much additional displacement is available before waterline becomes dangerous." },

    "Flow Rate": {
      lesson: {
        title: "Flow Rate: How Much Fluid Moves How Fast",
        sections: [
          { heading: "Volumetric and Mass Flow Rate", body: "Volumetric flow rate Q = volume per unit time (m³/s, liters/min, gallons/min). Mass flow rate ṁ = mass per unit time (kg/s). They relate by fluid density: ṁ = ρQ. A water pipe flowing 0.01 m³/s carries 10 kg/s of water. For incompressible fluids like water, volumetric flow is most practical. For gases (compressible), mass flow rate is preferred because volume changes with pressure and temperature." },
          { heading: "The Continuity Equation", body: "For an incompressible fluid in a pipe, mass is conserved: what flows in must flow out. This gives the continuity equation: A₁V₁ = A₂V₂, where A is cross-sectional area and V is flow velocity. A pipe narrowing from 0.1 m² to 0.025 m² (one-quarter area) causes velocity to quadruple. This is why garden hose nozzles increase jet speed — the water has to move faster through the smaller opening to maintain the same flow rate." },
          { heading: "Laminar vs Turbulent Flow", body: "At low velocities, fluid flows in smooth parallel layers — laminar flow. At high velocities or in rough pipes, flow breaks into chaotic swirling — turbulent flow. The Reynolds number (Re = ρVD/μ) predicts the transition: Re < 2,300 is laminar, Re > 4,000 is turbulent. Laminar flow has lower friction losses but is sensitive to disturbances. Turbulent flow mixes fluid better (useful for heat transfer and mixing) but has higher energy losses from friction." },
          { heading: "Flow Rate in Industry", body: "Flow measurement is critical in process industries. Common flow meters: magnetic flowmeters (conductive liquids), vortex meters (steam and gas), Coriolis meters (mass flow and density), orifice plates (differential pressure), and ultrasonic meters (non-invasive, clip-on). Proper pipe sizing prevents excessive velocity — too fast causes erosion, noise, and pressure drop. Water systems typically target 1-3 m/s. High-velocity steam lines can reach 30-50 m/s before erosion becomes unacceptable." }
        ],
        takeaways: [
          "Q = volume/time (m³/s or L/min); mass flow ṁ = ρQ",
          "Continuity: A₁V₁ = A₂V₂ — smaller area means faster velocity for same flow rate",
          "Reynolds number predicts laminar (<2300) vs turbulent (>4000) flow",
          "Flow meter selection depends on fluid type; pipe velocity targets 1-3 m/s for water"
        ]
      },
      quiz: {
        questions: [
          { q: "Water flows through a 0.04 m² pipe at 2 m/s, then enters a 0.01 m² section. What is the velocity in the narrow section?", options: ["0.5 m/s", "2 m/s", "4 m/s", "8 m/s"], answer: 3, explain: "Continuity: A₁V₁ = A₂V₂. 0.04 × 2 = 0.01 × V₂. V₂ = 0.08 ÷ 0.01 = 8 m/s. Cross-sectional area dropped by factor of 4, so velocity increased by factor of 4 to conserve flow rate." },
          { q: "What is the volumetric flow rate in the pipe above (0.04 m² at 2 m/s)?", options: ["0.02 m³/s", "0.08 m³/s", "2 m³/s", "0.08 m/s"], answer: 1, explain: "Q = A × V = 0.04 × 2 = 0.08 m³/s = 80 liters/second. Flow rate is constant throughout — the same 0.08 m³/s passes through both the wide and narrow sections every second." },
          { q: "A Reynolds number of 5,500 indicates what type of flow?", options: ["Laminar", "Transitional", "Turbulent", "Supersonic"], answer: 2, explain: "Re > 4,000 indicates turbulent flow. At Re = 5,500 the flow is fully turbulent — mixing chaotically. This increases friction losses but improves heat transfer. Laminar flow is Re < 2,300; transitional is 2,300 to 4,000." }
        ]

    "Bernoulli's Principle": {
      lesson: {
        title: "Bernoulli's Principle: Speed, Pressure, and Energy in Fluids",
        sections: [
          { heading: "The Core Principle", body: "In a steady, incompressible flow with no friction, the total mechanical energy per unit volume stays constant along a streamline. This is Bernoulli's equation: P + ½ρV² + ρgh = constant. The three terms represent pressure energy, kinetic energy (from velocity), and potential energy (from height). When velocity increases, pressure must decrease to keep the total constant. Fast-moving fluid has lower pressure than slow-moving fluid — this seems counterintuitive but is one of the most important results in fluid mechanics." },
          { heading: "Venturi Effect", body: "When a pipe narrows (venturi section), velocity increases per the continuity equation, so pressure drops per Bernoulli's equation. A venturi meter uses this pressure drop to calculate flow rate. Carburetors use the venturi effect to draw fuel into airflow. Industrial ejectors and vacuum generators use high-velocity steam or air through a venturi throat to create suction — no moving parts, completely reliable. The venturi principle is why water sprayers, paint guns, and aspirators work." },
          { heading: "Lift and Aerodynamics", body: "An airfoil (wing) is shaped so air travels faster over the curved top surface than the flat bottom. Faster air above = lower pressure above. Slower air below = higher pressure below. The pressure difference across the wing creates upward lift force. The same principle creates lift on helicopter blades, propeller thrust, and the magnus effect on spinning balls. Industrial fans and centrifugal pumps use shaped impellers to add energy to fluid using the same aerodynamic principles." },
          { heading: "Bernoulli's Limitations", body: "Bernoulli's equation assumes: steady flow (not changing with time), incompressible fluid (water yes, gas with caution), no friction/viscosity, and flow along a single streamline. Real flows violate these — friction losses mean pressure drops more than Bernoulli predicts. Bernoulli is a best-case, ideal-flow model. Real pipe systems add Darcy-Weisbach friction losses. Real airfoils experience drag. But Bernoulli gives a powerful first approximation for flow measurement, nozzle design, and pump selection." }
        ],
        takeaways: [
          "P + ½ρV² + ρgh = constant — faster flow means lower pressure along a streamline",
          "Venturi effect: narrowing a pipe speeds flow and drops pressure — used in flow meters and ejectors",
          "Airfoils create lift because faster air on top creates lower pressure than slower air below",
          "Bernoulli assumes no friction — real systems add Darcy-Weisbach losses on top"
        ]
      },
      quiz: {
        questions: [
          { q: "In a horizontal pipe, flow speeds up through a narrow section. What happens to pressure?", options: ["Pressure increases", "Pressure decreases", "Pressure stays the same", "Pressure doubles"], answer: 1, explain: "Bernoulli: P + ½ρV² = constant (horizontal, so ρgh cancels). If V increases, ½ρV² increases, so P must decrease to keep the total constant. This is the venturi effect — the foundation of many flow meters and industrial vacuum generators." },
          { q: "A venturi meter measures flow by detecting what?", options: ["Temperature change", "Pipe vibration frequency", "Pressure difference between wide and narrow sections", "Fluid color change"], answer: 2, explain: "The venturi meter has pressure taps at the inlet (wide, slow, high pressure) and throat (narrow, fast, low pressure). The pressure difference ΔP relates directly to flow velocity via Bernoulli's equation: V = √(2ΔP/ρ). Flow rate Q = A × V." },
          { q: "Why does an airplane wing generate lift?", options: ["Wings are tilted upward", "Wing weight pushes air down, reaction pushes wing up", "Air moves faster over the curved top, creating lower pressure than the flat bottom", "Engines push the plane up"], answer: 2, explain: "The curved upper surface forces air to travel a longer path at higher velocity. By Bernoulli's equation, higher velocity = lower pressure. Lower pressure above and higher pressure below creates a net upward pressure force — lift. Angle of attack also contributes in real wings." }
        ]
      }
    },

    "Hydraulics": {
      lesson: {
        title: "Hydraulics: Power Through Pressurized Fluid",
        sections: [
          { heading: "How Hydraulic Systems Work", body: "Hydraulic systems use pressurized liquid (typically oil) to transmit power and create force. A pump converts mechanical energy into fluid pressure energy. That pressurized fluid travels through hoses and valves to actuators (cylinders or motors) that convert pressure back to mechanical force or motion. Oil is nearly incompressible, so force transmits instantly. Hydraulic systems can multiply force enormously and stall under full load without damage — unlike electric motors that overheat when stalled." },
          { heading: "Pascal's Law and Force Multiplication", body: "Pascal's Law: pressure applied to an enclosed fluid transmits equally in all directions. A small piston pressing on fluid creates pressure that acts on a large piston with enormous force. If piston 1 has area 1 cm² and piston 2 has area 100 cm², a 100N push on piston 1 creates pressure P = 100N ÷ 1cm² = 100N/cm², which pushes piston 2 with 100N/cm² × 100cm² = 10,000N. Car brake systems, hydraulic presses, and lift tables all use this multiplication. The trade-off: the large piston moves 100× less distance than the small one." },
          { heading: "Hydraulic Cylinders", body: "A hydraulic cylinder converts fluid pressure to linear force: F = P × A, where P is system pressure and A is piston area. A cylinder with a 50mm bore (area ≈ 19.6 cm²) at 200 bar (2,000 N/cm²) produces: F = 2,000 × 19.6 = 39,200N ≈ 4 tonnes. Extend force uses the full bore area; retract force is less because the rod occupies part of the area. Cylinder sizing starts with required force, then selects bore diameter and system pressure to achieve it." },
          { heading: "Hydraulic Components", body: "Every hydraulic system includes: a reservoir (stores and cools oil), pump (creates flow and pressure), relief valve (limits maximum pressure — safety critical), directional control valves (route fluid to extend or retract cylinders), flow control valves (regulate speed), and filters (remove contamination). Hydraulic oil cleanliness is critical — particles cause valve spool sticking, pump wear, and cylinder seal damage. Most hydraulic failures trace to contamination. Proper filtration and regular oil sampling are essential maintenance practices." }
        ],
        takeaways: [
          "Hydraulics transmit power via pressurized oil — nearly incompressible, stall-tolerant",
          "Pascal's Law: small piston × small area = large piston × large area (pressure constant)",
          "Cylinder force F = P × A — bore size and system pressure determine force output",
          "Contamination causes most hydraulic failures — filtration and oil sampling are critical"
        ]
      },
      quiz: {
        questions: [
          { q: "A hydraulic cylinder has a 60mm bore (area = 28.3 cm²) at 150 bar system pressure. What force does it produce? (150 bar = 1,500 N/cm²)", options: ["4,245N", "28,300N", "42,450N", "150,000N"], answer: 2, explain: "F = P × A = 1,500 N/cm² × 28.3 cm² = 42,450N ≈ 4.3 tonnes. This is the extend force using the full bore area. Retract force would be less because the rod reduces the effective piston area on the retract side." },
          { q: "Piston 1 (area 2 cm²) pushes with 200N. What force does Piston 2 (area 50 cm²) exert?", options: ["200N", "2,500N", "5,000N", "10,000N"], answer: 2, explain: "Pressure = F₁/A₁ = 200/2 = 100 N/cm². Pascal's Law: same pressure acts on Piston 2. F₂ = P × A₂ = 100 × 50 = 5,000N. Force multiplied 25× (ratio of areas). Piston 2 moves 25× less distance than Piston 1." },
          { q: "What is the primary purpose of a relief valve in a hydraulic system?", options: ["Increase flow rate", "Filter oil contamination", "Limit maximum system pressure to protect components", "Control cylinder speed"], answer: 2, explain: "A relief valve opens when system pressure reaches its setpoint, bypassing fluid back to reservoir. Without it, a stalled cylinder or blocked line could build pressure until a hose bursts or a pump is destroyed. The relief valve is the primary pressure safety device in every hydraulic system." }
        ]
      }
    },

    "Surface Tension": {
      lesson: {
        title: "Surface Tension: The Skin on a Fluid",
        sections: [
          { heading: "What Causes Surface Tension?", body: "Molecules in a liquid are attracted to their neighbors equally in all directions. A molecule deep in the liquid is pulled equally from all sides — net force is zero. A molecule at the surface has no liquid neighbors above it, only air. It's pulled sideways and downward — creating an inward net force. This collective inward pull contracts the surface to the smallest possible area, making it behave like a stretched elastic membrane. Water has one of the highest surface tensions of common liquids: 0.072 N/m at room temperature." },
          { heading: "Surface Tension Effects", body: "Surface tension allows small insects to walk on water — their weight is supported by the surface film. A carefully placed steel needle floats on water despite being denser. Water drops on a waxed surface bead up into spheres (minimum surface area for a given volume). Capillary action — water rising in a narrow tube — combines surface tension with adhesion to glass. These effects matter at small scales (insects, microfluidics) but are usually negligible compared to pressure and gravity in industrial pipe flows." },
          { heading: "Surfactants and Reducing Surface Tension", body: "Surfactants (surface-active agents) are molecules with a water-loving end and an oil-loving end. They pack into the surface film, disrupting water-water attraction and dramatically lowering surface tension. Soap reduces water's surface tension from 0.072 to about 0.040 N/m. Detergents work by reducing surface tension so water can penetrate fabrics and wet surfaces that would otherwise bead up. Industrial applications include: emulsifying oils in water, flotation in mineral processing, foam control, and improving wettability in painting and coating." },
          { heading: "Industrial Relevance", body: "In manufacturing processes, surface tension affects: spray painting and coating (droplet formation and spreading), soldering and brazing (solder must wet the joint surface), inkjet printing (drop formation and size), and microfluidic devices (lab-on-a-chip). Foaming in hydraulic and gear oil is a surface tension problem — foam compresses unlike oil, causing spongy actuator response and pump cavitation. Antifoam additives are surfactants that destabilize foam bubbles. Capillary effects matter in heat pipes and porous material processing." }
        ],
        takeaways: [
          "Surface tension arises from unbalanced molecular attraction at the liquid surface",
          "Water's surface tension (0.072 N/m) allows insects to walk on it and needles to float",
          "Surfactants (soaps, detergents) disrupt surface tension — enabling wetting and emulsification",
          "Industrial impacts: spray coating quality, solder wetting, foam in hydraulic oil, microfluidics"
        ]
      },
      quiz: {
        questions: [
          { q: "Why do water droplets form a spherical shape on a waxed surface?", options: ["Gravity pulls them flat", "Spheres minimize surface area for a given volume, reducing surface energy", "Wax repels water molecules apart", "Air pressure pushes them into spheres"], answer: 1, explain: "Surface tension acts to minimize surface area, and a sphere has the lowest surface area for any given volume. On a hydrophobic (wax) surface with no adhesion force spreading the drop, surface tension wins and pulls it into a sphere." },
          { q: "What does adding soap to water do to its surface tension?", options: ["Increases it", "Has no effect", "Decreases it", "Converts it to kinetic energy"], answer: 2, explain: "Soap molecules (surfactants) insert themselves at the water surface and disrupt water-water hydrogen bonding, reducing surface tension from ~0.072 N/m to ~0.040 N/m. This allows water to wet and penetrate surfaces that would otherwise bead up." },
          { q: "Foaming in hydraulic oil is a problem because:", options: ["Foam is more viscous than oil", "Foam compresses — causing spongy actuator response and pump cavitation", "Foam conducts electricity", "Foam increases pressure beyond relief valve setting"], answer: 1, explain: "Unlike liquid oil which is nearly incompressible, foam contains air bubbles that compress under pressure. This makes cylinder movement spongy and unpredictable. In pumps, foam causes cavitation — bubble collapse that damages pump components. Antifoam additives prevent stable foam formation." }
        ]
      }
    },

    "Viscosity": {
      lesson: {
        title: "Viscosity: A Fluid's Resistance to Flow",
        sections: [
          { heading: "What Is Viscosity?", body: "Viscosity is a fluid's internal resistance to flow — its 'thickness.' Honey has high viscosity; water has low viscosity. More precisely, viscosity is the resistance to shear deformation: the force needed to slide one fluid layer past an adjacent layer. Dynamic viscosity (μ) has units of Pascal-seconds (Pa·s) or centipoise (cP). Water at 20°C is about 1 cP. Honey is about 10,000 cP. SAE 30 motor oil is about 100 cP at operating temperature. Temperature dramatically affects viscosity in most fluids." },
          { heading: "Kinematic Viscosity", body: "Kinematic viscosity ν = μ ÷ ρ (dynamic viscosity divided by density). Units are m²/s or centistokes (cSt). Kinematic viscosity is what matters in pipe flow calculations because it captures both the fluid's stickiness and its inertia. Hydraulic oil is specified in centistokes — ISO VG 46 oil has kinematic viscosity of 46 cSt at 40°C. Higher number = thicker oil. Selecting the wrong viscosity grade for a hydraulic system causes pump problems, seal leakage, and poor efficiency." },
          { heading: "Effect of Temperature", body: "Viscosity drops sharply as temperature rises for most liquids — honey pours easily when warm, barely at all when cold. This is why machines run poorly until warmed up and why hydraulic systems use warm-up cycles in cold climates. The Viscosity Index (VI) measures how much viscosity changes with temperature — high VI means viscosity is more stable across temperature ranges. Multigrade oils (like 10W-40) are formulated with VI improvers to behave as thin oil when cold (easier starting) and thick oil when hot (good film strength)." },
          { heading: "Viscosity in Pipe Flow and Machinery", body: "In pipe flow, viscous friction causes pressure drop: higher viscosity = higher pressure drop for the same flow rate. Pump power = flow rate × pressure drop, so viscous fluids require more powerful pumps. In bearings and gears, the oil film separating metal surfaces must maintain enough viscosity to prevent metal contact — too thin (wrong grade or overheated) allows metal-to-metal contact and rapid wear. Too thick wastes energy churning oil and causes overheating. Correct oil viscosity selection is one of the most important lubrication decisions." }
        ],
        takeaways: [
          "Viscosity is resistance to flow — measured in cP (dynamic) or cSt (kinematic)",
          "Kinematic viscosity ν = μ/ρ — used in pipe flow and hydraulic oil specifications",
          "Viscosity drops sharply with temperature — drives warm-up cycles and multigrade oil use",
          "Wrong oil viscosity causes bearing wear (too thin) or energy loss and overheating (too thick)"
        ]
      },
      quiz: {
        questions: [
          { q: "Two oils have the same dynamic viscosity but different densities. Which has higher kinematic viscosity?", options: ["The denser oil", "The less dense oil", "They have equal kinematic viscosity", "Cannot be determined"], answer: 1, explain: "Kinematic viscosity ν = μ/ρ. Same μ, lower ρ gives higher ν. Less dense oil has higher kinematic viscosity. Kinematic viscosity captures how easily the fluid flows under its own weight — light thin fluids can have surprising flow behavior." },
          { q: "A hydraulic system is specified for ISO VG 46 oil. An operator substitutes ISO VG 100. What likely happens?", options: ["System runs more efficiently", "Pump may struggle to draw fluid, especially when cold; seals may leak", "No difference at operating temperature", "System pressure increases beneficially"], answer: 1, explain: "VG 100 is more than twice as thick as VG 46. The pump may cavitate drawing thick cold oil at startup. Higher viscosity increases pressure drop throughout the system, requiring more pump power. Thicker oil may also extrude past seals designed for lower viscosity." },
          { q: "Why do engines use multigrade oils like 10W-40 rather than single-grade oils?", options: ["Multigrade is cheaper", "Single grade causes corrosion", "Multigrade behaves thin when cold (easy starting) and thick when hot (good film strength)", "Multigrade has lower friction at all temperatures"], answer: 2, explain: "Single grade oil would either be too thick to flow properly at cold start (risk of bearing starvation) or too thin to maintain a protective film at operating temperature. VI improver additives in multigrade oils give good viscosity across the full temperature range." }
        ]
      }
    },

    "Pascal's Law": {
      lesson: {
        title: "Pascal's Law: Pressure Transmits Everywhere",
        sections: [
          { heading: "Pascal's Law Stated", body: "Pascal's Law: A pressure change applied to an enclosed fluid at rest is transmitted undiminished to every point in the fluid and to the walls of the container. Discovered by Blaise Pascal in 1647. Press a piston into a sealed fluid container and every square centimeter of fluid and every wall surface feels that exact same pressure increase. This is why hydraulic systems work — a pump pressurizes oil and that pressure acts simultaneously on every piston, cylinder, and actuator connected to that circuit." },
          { heading: "Force Multiplication in Detail", body: "Pascal's Law enables mechanical advantage through fluid: F₁/A₁ = F₂/A₂ = P (pressure is constant throughout). To lift 10,000N with 100N of input force, you need A₂/A₁ = 100. A 1 cm² input piston and 100 cm² output piston achieves this. But energy is conserved: if the small piston moves 100mm, the large piston moves only 1mm. The work done is equal (ignoring friction): 100N × 100mm = 10,000N × 1mm = 10,000 N·mm. You gain force at the cost of distance — the hydraulic lever." },
          { heading: "Connected Vessels and U-Tubes", body: "Connected containers of fluid reach equal pressure at equal heights — regardless of container shape or size. A narrow tube connected to a wide tank: pressure at the bottom is the same in both (P = ρgh). A manometer uses this principle — fluid rises in a tube to a height that represents the pressure at the base. Blood pressure cuffs, industrial pressure gauges using liquid columns, and water towers supplying pressure to homes all rely on the connected vessel principle." },
          { heading: "Applications Throughout Industry", body: "Pascal's Law is the foundation of hydraulic engineering. Every hydraulic jack, press, brake system, and crane uses it. Industrial presses can exert thousands of tonnes of force from a small hydraulic pump. Aircraft flight controls used hydraulic actuation for decades. Automotive brakes work because brake pedal force pressurizes fluid that acts simultaneously on all four wheel cylinders — pressing a pedal with 200N creates thousands of Newtons of clamping force at each brake pad through Pascal multiplication." }
        ],
        takeaways: [
          "Pascal's Law: pressure applied to enclosed fluid transmits undiminished to all points",
          "F₁/A₁ = F₂/A₂ — force multiplies in proportion to piston areas",
          "Energy conserved: more force output means less distance — the hydraulic lever",
          "Applications: hydraulic jacks, presses, brakes, aircraft controls — all Pascal multiplication"
        ]
      },
      quiz: {
        questions: [
          { q: "A sealed hydraulic system has a 5 cm² input piston and a 200 cm² output piston. Input force is 300N. What is the output force?", options: ["300N", "2,500N", "7.5N", "12,000N"], answer: 3, explain: "P = F₁/A₁ = 300/5 = 60 N/cm². Output force = P × A₂ = 60 × 200 = 12,000N. Force multiplied 40× (ratio of piston areas = 200/5 = 40). The output piston moves 40× less distance than the input piston." },
          { q: "In the system above, if the input piston moves 80mm, how far does the output piston move?", options: ["80mm", "2mm", "3,200mm", "160mm"], answer: 1, explain: "Volume conservation: A₁ × d₁ = A₂ × d₂. 5 × 80 = 200 × d₂. d₂ = 400/200 = 2mm. The output piston moves only 2mm despite the input moving 80mm. Force × distance (work) is conserved: 300N × 80mm = 12,000N × 2mm = 24,000 N·mm." },

          { heading: "Equations of Motion Under Gravity", body: "Starting from rest, a freely falling object follows: velocity v = gt, distance fallen d = ½gt², and v² = 2gd. With g = 9.81 m/s²: after 1 second, v = 9.81 m/s and d = 4.9m. After 2 seconds: v = 19.62 m/s and d = 19.6m. Distance increases with the square of time — falling gets faster and covers more distance each second. These same equations apply upward: an object thrown up at 20 m/s reaches maximum height at t = 20/9.81 = 2.04 seconds." },

    "Center of Gravity": {

        sections: [
          { heading: "Center of Gravity vs Center of Mass", body: "Center of gravity (COG) is the point where gravity's total torque on an object is zero — where you could balance it on a single point. For objects on Earth where the gravitational field is essentially uniform, COG and center of mass are the same point. They differ only in very large objects where gravitational field strength varies across the object. In all practical industrial applications, treat COG and center of mass as identical." },
          { heading: "Finding COG Experimentally", body: "For flat irregular shapes, hang the object from any point and draw a vertical plumb line — the COG lies somewhere on that line. Hang from a different point and draw another line. Where the two lines intersect is the COG. For three-dimensional objects the same principle applies in multiple planes. This is how engineers historically located COG on ship hulls, aircraft wings, and vehicle bodies before computer modeling made direct calculation practical." },
          { heading: "COG Height and Stability", body: "COG height above the base determines stability. A low COG makes an object stable — a vehicle with heavy batteries in the floor sits low and resists rollover. A high COG makes an object unstable — a tall crane loaded at the top tips easily. The righting moment (restoring torque when tilted) equals weight multiplied by the horizontal distance from COG to the tipping edge. As tilt increases, this distance shrinks until it reaches zero at the tipping point — then gravity becomes a destabilizing force." },

          { heading: "The Mechanics of Tipping", body: "An object tips when its center of gravity moves outside the boundary of its base of support. At that moment, the gravitational torque about the tipping edge reverses — instead of rotating the object back to upright, gravity now accelerates it toward falling. Before the tipping point, the restoring torque = W × d, where d is the horizontal distance from COG to the tipping edge. As the object tilts, d decreases until it reaches zero — the tipping point. Past this, recovery without external force is impossible." },
          { heading: "Calculating Tipping Load", body: "For a machine on a flat surface, tipping occurs when the overturning moment equals the stabilizing moment. For a 1,000kg cabinet 0.5m wide and 1.5m tall, a horizontal force F at the top tips it when F × 1.5 = 1000 × 9.81 × 0.25 (half the base width). F_tip = 2,452 ÷ 1.5 = 1,635N. Below this it rocks and recovers; above it tips over. This calculation drives anti-tip hardware requirements for tall storage and machinery." },
          { heading: "Forklift Stability Triangle", body: "Forklifts are supported on three effective contact points forming a triangle: the two front drive wheels and the single rear steering axle center point. The combined COG of forklift and load must stay inside this triangle for stability. As the load is raised, the combined COG rises and shifts forward — shrinking the margin before forward tipping. As the forklift turns, lateral COG shift can cause side tipping. Exceeding rated capacity or lifting too high moves the COG outside the triangle." },
          { heading: "Anti-Tip Strategies", body: "Designers manage tipping through: lowering COG (heavy components mounted low, ballast at base), widening the base (outriggers on cranes and aerial lifts, stabilizer legs on machinery), load and height limits (crane load charts, forklift data plates reduce capacity at height), interlocks that prevent unsafe configurations, and physical restraints (wall anchoring of tall cabinets per seismic codes). Every tall piece of industrial equipment requires a formal tipping analysis." }

      lesson: {

        sections: [
          { heading: "What Is Load Distribution?", body: "Load distribution describes how a force or weight spreads through a structure to reach the supports. A load applied at one point doesn't stay there — it travels through beams, columns, walls, and floors to the foundation. Understanding the load path is fundamental to structural design. Every structural element along that path must be sized for the force passing through it. Removing or weakening any element in the load path can cause catastrophic progressive collapse." },
          { heading: "Reactions at Supports", body: "For a beam supported at both ends carrying a load, equilibrium determines the reaction force at each support. For an asymmetric point load P at distance 'a' from the left support on a total span L: Left reaction R_L = P × (L-a)/L, Right reaction R_R = P × a/L. The closer the load to a support, the more that support carries. This is why you position a floor jack as close as possible to the wheel when changing a tire — the jack carries nearly all the load with minimal effort." },
          { heading: "Point Loads vs Distributed Loads", body: "A point load is a concentrated force at a single location — a column on a beam, a machine on a floor. A distributed load spreads over a length or area — the beam's own weight, snow on a roof, fluid pressure on a tank wall. Distributed loads convert to an equivalent point load at their centroid for reaction calculations: a uniform load of w N/m over length L equals total load wL acting at the midpoint L/2. Floors are designed for distributed live loads in kPa, while equipment footings create point loads that require separate concentrated load checks." },
          { heading: "Load Spreading in Practice", body: "Heavy equipment on floors often requires a spreader plate under machine feet to distribute a concentrated point load over a larger floor area, reducing pressure to within the floor's capacity. A 5,000kg machine on four small feet creates enormous local pressure far exceeding concrete capacity. The same machine on a 1m × 1m steel baseplate: pressure = (5000 × 9.81) ÷ 1 = 49kPa — well within a standard 150mm slab rated at 75kPa. Spreading load is one of the most practical and cost-effective structural interventions." }

          { heading: "What Is a Gravitational Field?", body: "A gravitational field is a region of space where a mass experiences a gravitational force. Every mass creates a gravitational field extending infinitely in all directions, weakening with the square of distance. Field strength g at any point is defined as the force per unit mass: g = GM/r², measured in N/kg (equivalent to m/s²). Earth's field strength at the surface is 9.81 N/kg — meaning every kilogram of mass experiences 9.81N of gravitational force pulling toward Earth's center." },

    "Structural Load": {
      lesson: {
        title: "Structural Load: How Buildings and Machines Bear Weight",
        sections: [
          { heading: "Types of Structural Loads", body: "Dead loads are permanent and constant — the self-weight of the structure, permanently attached equipment, fixed piping. Live loads are variable — people, movable equipment, stored materials, vehicles. Environmental loads include wind (lateral force on structures), snow (distributed vertical load on roofs), seismic (dynamic horizontal forces from ground acceleration), and thermal loads (expansion and contraction stresses from temperature changes). Every structure must be designed for the worst credible combination of all applicable load types acting simultaneously." },
          { heading: "Load Combinations and Safety Factors", body: "Structural codes specify load combinations: typically 1.2 × Dead + 1.6 × Live for strength design (LRFD method) or checking that stress under (Dead + Live) stays below allowable stress divided by a safety factor (ASD method). Safety factors of 2-4 are common in mechanical design; buildings use 1.5-2 for steel, 3-5 for concrete in compression. These factors account for material variability, load estimation uncertainty, dynamic effects not captured in static analysis, and the consequences of failure." },
          { heading: "Tension, Compression, Shear, and Bending", body: "Structural members fail in four fundamental ways. Tension: being pulled apart — bolts, cables, and hangers primarily carry tension. Compression: being crushed — columns and struts carry compression; slender members also risk buckling. Shear: parallel forces cutting across a section — welds, pins, and beams near supports experience high shear. Bending: combined tension and compression across a cross-section — beams sag under load, putting the bottom face in tension and top in compression. Most real structural failures involve combined bending and shear." },
          { heading: "Stress and Deflection Limits", body: "Stress = Force ÷ Area (σ = F/A), measured in Pascals or MPa. Structural steel yields at about 250 MPa — below this it springs back; above it permanently deforms. Deflection of beams is as important as stress: a beam strong enough to carry the load but deflecting excessively may damage connected equipment, cause drainage problems, or create an unsafe feel. Maximum allowable deflection is typically L/360 for floors or L/240 for general structures, where L is the span length in the same units." }
        ],
        takeaways: [
          "Dead loads are permanent; live loads vary — design for worst combination plus environmental loads",
          "Safety factors of 1.5-5 applied depending on material, failure consequence, and uncertainty",
          "Four failure modes: tension (pulling apart), compression/buckling, shear (cutting), and bending",
          "Stress = F/A must stay below yield; deflection must stay below L/360 for floors"
        ]

          { heading: "The First Law of Thermodynamics", body: "Energy cannot be created or destroyed — it can only be converted from one form to another. This is one of the most fundamental and well-tested laws in physics. The total energy of an isolated system remains constant. In a machine: electrical energy in = mechanical work out + heat from friction + heat from electrical resistance + sound from vibration. Every last Joule of input energy is accounted for somewhere in the output — nothing disappears, but much of it becomes useless heat." },

          { heading: "Energy Degradation", body: "While total energy is conserved, its quality degrades. High-quality energy (electricity, mechanical) can be fully converted to any other form. Low-quality energy (diffuse heat at low temperature) cannot be fully converted back to useful work — it requires a temperature difference to do work at all. This is why you cannot recover all the heat from friction and use it to run the machine again. Every energy conversion process increases entropy — the universe's disorder. Perpetual motion machines are impossible because they would violate energy conservation or entropy laws." },

          { heading: "The Four Laws", body: "Zeroth Law: if two systems are each in thermal equilibrium with a third, they are in equilibrium with each other — this defines temperature as a meaningful property. First Law: energy is conserved (covered in detail separately). Second Law: heat flows spontaneously from hot to cold, never the reverse; every natural process increases total entropy. Third Law: absolute zero (0 Kelvin = -273.15°C) cannot be reached by any finite number of steps. These four laws govern every heat engine, refrigerator, and thermal system ever built." },
          { heading: "Heat Engines and the Carnot Limit", body: "A heat engine converts heat into work by moving heat from a hot reservoir to a cold reservoir. Maximum theoretical efficiency = 1 - (T_cold/T_hot), where temperatures are in Kelvin. A steam turbine with steam at 600°C (873K) exhausting at 40°C (313K): max efficiency = 1 - 313/873 = 64.2%. No real engine achieves this — friction, heat losses, and irreversibilities reduce it further. A car engine might achieve 25-35% thermal efficiency. The rest is waste heat in the exhaust and coolant." },
          { heading: "Temperature Scales", body: "Celsius (°C): water freezes at 0°C, boils at 100°C. Fahrenheit (°F): water freezes at 32°F, boils at 212°F. Conversion: °F = (°C × 9/5) + 32. Kelvin (K): absolute scale, K = °C + 273.15. Zero Kelvin is absolute zero — no molecular motion. Thermodynamic calculations always use Kelvin. Industrial process temperatures range from cryogenic storage at -196°C (liquid nitrogen) through typical manufacturing at 20-300°C up to steel furnaces at 1,600°C." },

          { heading: "What Is Sound?", body: "Sound is a longitudinal mechanical wave — a series of compressions and rarefactions (pressure variations) propagating through a medium. Unlike light, sound requires a medium to travel through: it cannot travel through a vacuum. Speed of sound depends on the medium's elasticity and density. In air at 20°C: 343 m/s (1,235 km/h). In water: ~1,480 m/s. In steel: ~5,120 m/s. Sound travels much faster in denser, stiffer materials because the molecules transmit vibrations more efficiently." },
          { heading: "Frequency, Wavelength, and Amplitude", body: "Frequency (Hz) is the number of pressure cycles per second — determines pitch. Human hearing range: 20 Hz to 20,000 Hz. Infrasound (<20 Hz) and ultrasound (>20,000 Hz) are beyond normal hearing. Wavelength = speed ÷ frequency. At 343 m/s, a 1,000 Hz tone has wavelength = 0.343m. Amplitude is the pressure variation magnitude — determines loudness. Doubling amplitude does not double perceived loudness; the decibel scale is logarithmic because human hearing is logarithmic." },

          { heading: "What Is Light?", body: "Light is electromagnetic radiation — oscillating electric and magnetic fields propagating through space. Unlike sound, it requires no medium and travels through vacuum at c = 299,792,458 m/s (approximately 3 × 10⁸ m/s). This is the universal speed limit — nothing with mass can reach it. Light exhibits wave-particle duality: it behaves as a wave in interference and diffraction experiments, and as discrete particles (photons) in photoelectric and quantum phenomena. Visible light is only a tiny slice of the full electromagnetic spectrum." },
          { heading: "Reflection and Refraction", body: "Reflection: light bouncing off a surface. Angle of incidence = angle of reflection (measured from the normal to the surface). Mirrors, retroreflectors, and safety tape all use controlled reflection. Refraction: light bending when it crosses a boundary between materials with different refractive indices. Snell's Law: n₁ × sin(θ₁) = n₂ × sin(θ₂). Glass has n ≈ 1.5 — light slows to c/1.5 and bends toward the normal when entering glass. Fiber optic cables use total internal reflection: light stays trapped inside the fiber when angle exceeds the critical angle." },

    "Heat Transfer": {

        sections: [
          { heading: "Three Mechanisms of Heat Transfer", body: "Heat transfers from hot to cold by three mechanisms. Conduction: direct contact — energy passes between molecules in contact. Convection: bulk fluid movement carries heat — hot fluid rises (natural convection) or is pumped (forced convection). Radiation: electromagnetic emission — all objects above absolute zero emit thermal radiation proportional to T⁴ (Stefan-Boltzmann Law). Real engineering problems usually involve combinations of all three — a heat exchanger uses conduction through the wall plus convection on both fluid sides." },
          { heading: "Conduction: Fourier's Law", body: "Heat flow by conduction: Q/t = k × A × ΔT / L, where k is thermal conductivity (W/m·K), A is cross-sectional area, ΔT is temperature difference, and L is thickness. Copper: k = 385 W/m·K. Steel: k = 50. Concrete: k = 1.7. Fiberglass insulation: k = 0.04. A higher k means faster heat flow. Doubling insulation thickness halves heat flow. This equation sizes heat sinks, calculates building heat loss, and determines whether a motor casing can dissipate its internal losses without overheating." },
