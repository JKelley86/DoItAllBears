async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-allow-all": "true"
    },
    body: JSON.stringify({
      model: "claude-opus-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content?.[0]?.text || "";
  const clean = text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function buildLessonPrompt(topicName, sub) {
  return `You are an expert teacher. Create a concise engaging lesson about "${sub}" in "${topicName}".
Return ONLY valid JSON, no markdown fences:
{"title":"string","sections":[{"heading":"string","body":"string"}],"takeaways":["string","string","string","string"]}
Each section.body is plain text (no HTML). Include 3-4 sections, 60-90 words each. Make it practical and genuinely interesting.`;
}

function buildQuizPrompt(topicName, sub) {
  return `Create a 3-question multiple choice quiz about "${sub}" in "${topicName}".
Return ONLY valid JSON, no markdown fences:
{"questions":[{"q":"string","options":["A","B","C","D"],"answer":0,"explain":"string"}]}
"answer" is 0-based index of correct option.`;
}

function buildDeepPrompt(topicName, sub) {
  return `Give an expert deep-dive on "${sub}" in "${topicName}". Real mechanisms, history, nuance.
Return ONLY valid JSON, no markdown fences:
{"title":"string","sections":[{"heading":"string","body":"string"}],"takeaways":["string","string","string","string","string"]}
Include 4-5 sections, 80-110 words each. Cover real science/mechanics beyond basics.`;
}

function buildAskPrompt(q) {
  return `Answer this learning question engagingly: "${q}"
Return ONLY valid JSON, no markdown fences:
{"title":"string","answer":"3-5 paragraphs separated by newlines. No HTML. Clear and interesting."}`;
}

// ─────────────────────────────────────────────
// QUIZ VIEW
// ─────────────────────────────────────────────
function QuizView({ questions, onDone }) {
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [finished, setFinished] = useState(false);

  if (finished || idx >= questions.length) {
    const pct = Math.round((correct / questions.length) * 100);
    return (
      <div style={{...S.card, textAlign:"center"}} className="fade-up">
        <div style={{fontSize:48, marginBottom:12}}>{pct>=80?"🏆":pct>=60?"⭐":"📖"}</div>
        <div style={{fontSize:17, fontWeight:700, color:"#F0F0F8", marginBottom:8}}>
          {pct>=80?"Excellent!":pct>=60?"Good job!":"Keep studying!"}
        </div>
        <div style={{fontSize:40, fontWeight:800, color:"#A594F9", margin:"12px 0"}}>{pct}%</div>
        <div style={{color:"#606078", fontSize:14, marginBottom:20}}>{correct} of {questions.length} correct</div>
        <div style={{display:"flex", gap:10}}>
          <button style={S.secondaryBtn} onClick={() => { setIdx(0); setSelected(null); setCorrect(0); setFinished(false); }}>↺ Retry</button>
          <button style={S.primaryBtn} onClick={onDone}>📖 Back to Lesson</button>
        </div>
      </div>
    );
  }

  const q = questions[idx];
  const answered = selected !== null;

  function pick(i) {
    if (answered) return;
    setSelected(i);
    if (i === q.answer) setCorrect(c => c + 1);
  }

  function next() {
    if (idx + 1 >= questions.length) setFinished(true);
    else { setIdx(i => i + 1); setSelected(null); }
  }

  return (
    <div className="fade-up">
      <div style={S.progressBar}>
        <div style={{height:"100%", borderRadius:2, background:"linear-gradient(90deg,#7B6EF6,#A594F9)", width:`${(idx/questions.length)*100}%`, transition:"width 0.4s"}}/>
      </div>
      <div style={{fontSize:12, color:"#606078", marginBottom:14, fontWeight:600}}>
        Question {idx+1} of {questions.length}
      </div>
      <div style={S.card}>
        <div style={S.quizQ}>{q.q}</div>
        {q.options.map((opt, i) => {
          const state = !answered ? null : i===q.answer ? "correct" : i===selected ? "wrong" : null;
          return (
            <button key={i} style={S.quizOpt(state)} onClick={() => pick(i)}>{opt}</button>
          );
        })}
        {answered && (
          <div style={{marginTop:12, padding:14, background:"#1C1C26", borderRadius:12, fontSize:14, color:"#A0A0B8", lineHeight:1.6}}>
            {q.explain}
          </div>
        )}
        {answered && (
          <button style={{...S.primaryBtn, marginTop:14}} onClick={next}>
            {idx+1 < questions.length ? "Next Question →" : "See Results →"}
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [topic, setTopic] = useState(null);
  const [subtopic, setSubtopic] = useState(null);
  const [mode, setMode] = useState("lesson");
  const [loading, setLoading] = useState(false);
  const [content, setContent] = useState(null);
  const [error, setError] = useState(null);
  const cache = useRef({});
  const [askQ, setAskQ] = useState("");
  const [askResult, setAskResult] = useState(null);
  const [askLoading, setAskLoading] = useState(false);
  const [stats, setStats] = useState(() => {
    try { return JSON.parse(localStorage.getItem("mf3_stats") || "{}"); } catch { return {}; }
  });

  function saveStats(s) { setStats(s); localStorage.setItem("mf3_stats", JSON.stringify(s)); }

  useEffect(() => {
    const today = new Date().toDateString();
    if (stats.lastDate !== today) {
      const yest = new Date(Date.now() - 86400000).toDateString();
      saveStats({...stats, lastDate:today, streak: stats.lastDate===yest ? (stats.streak||0)+1 : 1});
    }
  }, []);

  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const daily = DAILY[dayOfYear % DAILY.length];
  const dailyTopic = TOPICS.find(t => t.id === daily.id);

  async function loadContent(tp, st, md) {
    const key = `${tp.id}__${st}__${md}`;
    if (cache.current[key]) { setContent(cache.current[key]); setError(null); return; }
    setLoading(true); setContent(null); setError(null);
    try {
      let prompt;
      if (md === "lesson") prompt = buildLessonPrompt(tp.name, st);
      else if (md === "quiz") prompt = buildQuizPrompt(tp.name, st);
      else prompt = buildDeepPrompt(tp.name, st);
      const data = await callClaude(prompt);
      cache.current[key] = data;
      setContent(data);
      if (md !== "quiz") {
        const ns = {...stats, lessons:(stats.lessons||0)+1,
          history:[{title:data.title||st, topic:tp.name, icon:tp.icon, mode:md, date:new Date().toLocaleDateString()}, ...(stats.history||[])].slice(0,20)};
        saveStats(ns);
      }
    } catch(e) {
      setError("Couldn't generate this lesson. Check your API key in the file, then retry.");
    }
    setLoading(false);
  }

  function openTopic(tp, st) {
    setTopic(tp); setSubtopic(st || tp.subtopics[0]); setMode("lesson");
    setContent(null); setError(null); setPage("lesson");
    loadContent(tp, st || tp.subtopics[0], "lesson");
  }

  function changeSubtopic(st) { setSubtopic(st); setContent(null); setError(null); loadContent(topic, st, mode); }
  function changeMode(md) { setMode(md); setContent(null); setError(null); loadContent(topic, subtopic, md); }

  async function doAsk() {
    if (!askQ.trim()) return;
    setAskLoading(true); setAskResult(null);
    try { setAskResult(await callClaude(buildAskPrompt(askQ))); }
    catch(e) { setAskResult({title:"Error", answer:"Couldn't get an answer. Please try again."}); }
    setAskLoading(false);
  }

  // ── HOME ──

      <div style={S.page} className="fade-up">

          <div style={{fontSize:20, fontWeight:700, color:"#F0F0F8", lineHeight:1.3, marginBottom:12}}>{daily.sub}</div>

          </div>
          <button style={S.primaryBtn} onClick={() => openTopic(dailyTopic, daily.sub)}>Start Today's Lesson →</button>
        </div>
        <div style={S.sectionTitle}>Browse Topics</div>
        <div style={S.topicGrid}>
          {TOPICS.map(t => (
            <div key={t.id} style={S.topicCard} onClick={() => openTopic(t)}

  // ── LESSON ──
  function renderLesson() {
    return (
      <div style={S.page}>
        <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:16}}>
          <button style={S.backBtn} onClick={() => { setPage("home"); setContent(null); }}>‹</button>
          <span style={{fontSize:11, fontWeight:700, padding:"5px 12px", borderRadius:20, letterSpacing:"0.05em", textTransform:"uppercase", background:topic?.glow, color:topic?.color}}>
            {topic?.icon} {topic?.name}
          </span>
        </div>
        <div style={S.modeTabs}>
          {[["lesson","📖 Lesson"],["quiz","🧠 Quiz"],["deep","🔬 Deep Dive"]].map(([m,label]) => (
            <button key={m} style={S.modeTab(mode===m)} onClick={() => changeMode(m)}>{label}</button>
          ))}
        </div>
        <div style={S.subtopicRow}>
          {topic?.subtopics.map(st => (
            <button key={st} style={S.pill(st===subtopic, topic.color)} onClick={() => changeSubtopic(st)}>{st}</button>
          ))}
        </div>
        {loading && <Skeleton/>}
        {error && !loading && (
          <>
            <div style={S.error}>⚠️ {error}</div>
            <button style={S.secondaryBtn} onClick={() => loadContent(topic, subtopic, mode)}>↺ Retry</button>
          </>
        )}
        {!loading && !error && content && (
          mode === "quiz"
            ? <QuizView questions={content.questions} onDone={() => changeMode("lesson")}/>
            : <LessonView data={content} onQuiz={() => changeMode("quiz")} onDeep={() => changeMode("deep")}/>
        )}
      </div>
    );
  }

  // ── EXPLORE ──
  function renderExplore() {
    return (
      <div style={S.page} className="fade-up">
        <div style={S.sectionTitle}>Ask Anything</div>
        <div style={S.searchBox}>
          <span style={{fontSize:18, color:"#606078"}}>🔍</span>
          <input style={S.searchInput} placeholder="Ask about any topic…"
            value={askQ} onChange={e => setAskQ(e.target.value)}
            onKeyDown={e => e.key==="Enter" && doAsk()}/>
          <button style={{padding:"8px 14px", borderRadius:10, border:"none", background:"#7B6EF6", color:"#fff", fontSize:13, fontWeight:700, cursor:"pointer"}} onClick={doAsk}>Ask</button>
        </div>
        {askLoading && (
          <div style={S.card}>
            {[90,75,90,60,80].map((w,i) => <div key={i} style={{...S.skel, height:14, width:`${w}%`, marginBottom:10}}/>)}
          </div>
        )}
        {askResult && !askLoading && (
          <div style={S.card} className="fade-up">
            <div style={{fontSize:16, fontWeight:700, color:"#F0F0F8", marginBottom:14}}>💡 {askResult.title}</div>
            {(askResult.answer||"").split("\n\n").map((p,i) => (
              <div key={i} style={{fontSize:15, lineHeight:1.75, color:"#A0A0B8", marginBottom:12}}>{p}</div>
            ))}
          </div>
        )}
        <div style={{...S.sectionTitle, marginTop:24}}>Browse Topics</div>
        <div style={S.topicGrid}>
          {TOPICS.map(t => (
            <div key={t.id} style={S.topicCard} onClick={() => openTopic(t)}
              onMouseOver={e => e.currentTarget.style.transform="scale(1.02)"}
              onMouseOut={e => e.currentTarget.style.transform="scale(1)"}>
              <div style={{position:"absolute", bottom:-20, right:-20, width:70, height:70, borderRadius:"50%", background:t.glow, pointerEvents:"none"}}/>
              <div style={{fontSize:28, marginBottom:8, lineHeight:1}}>{t.icon}</div>
              <div style={{fontSize:13, fontWeight:700, color:"#F0F0F8", lineHeight:1.3}}>{t.name}</div>
              <div style={{fontSize:11, color:"#606078", marginTop:3}}>{t.subtopics.length} lessons</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── PROFILE ──
  function renderProfile() {
    const scores = stats.scores||[];
    const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+"%" : "—";
    return (
      <div style={S.page} className="fade-up">
        <div style={S.sectionTitle}>Your Progress</div>
        <div style={S.statGrid}>
          {[[stats.lessons||0,"Lessons Done","#A594F9"],[stats.streak||0,"Day Streak 🔥","#FB923C"],[stats.quizzes||0,"Quizzes Taken","#34D399"],[avg,"Avg Score","#F472B6"]].map(([val,label,color]) => (
            <div key={label} style={S.statCard}>
              <div style={{fontSize:32, fontWeight:800, color, lineHeight:1}}>{val}</div>
              <div style={{fontSize:12, color:"#606078", marginTop:6}}>{label}</div>
            </div>
          ))}
        </div>
        <div style={S.sectionTitle}>Recent Activity</div>
        {!(stats.history?.length) && <div style={{color:"#606078", fontSize:14, padding:"8px 0"}}>No lessons yet — start learning!</div>}
        {(stats.history||[]).slice(0,10).map((h,i) => (
          <div key={i} style={S.histItem}>
            <div style={{fontSize:22}}>{h.icon}</div>
            <div style={{flex:1, minWidth:0}}>
              <div style={{fontSize:14, fontWeight:600, color:"#F0F0F8", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{h.title}</div>
              <div style={{fontSize:12, color:"#606078", marginTop:2}}>{h.topic} · {h.date}</div>
            </div>
            <div style={{fontSize:12, fontWeight:700, color:"#34D399", background:"rgba(52,211,153,0.1)", padding:"4px 10px", borderRadius:10}}>
              {h.mode==="quiz"?"Quiz":h.mode==="deep"?"Deep":"Read"}
            </div>
          </div>
        ))}
      </div>
    );
  }

  const pages = {home:renderHome, lesson:renderLesson, explore:renderExplore, profile:renderProfile};

  return (
    <div style={S.app}>
      <div style={{position:"fixed", top:-200, left:-100, width:500, height:500, background:"radial-gradient(circle,rgba(123,110,246,0.08) 0%,transparent 70%)", pointerEvents:"none", zIndex:0}}/>
      <div style={S.header}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={S.appName}>MindFuel ⚡</div>
            <div style={{fontSize:13, color:"#606078", marginTop:3}}>
              {page==="lesson" && topic ? topic.name : "What will you learn today?"}
            </div>
          </div>
          <div style={S.streak}>🔥 {stats.streak||0} day</div>
        </div>
      </div>
      <div style={{position:"relative", zIndex:1}}>
        {pages[page]?.()}
      </div>
      {page !== "lesson" && (
        <div style={S.nav}>
          {[["home","🏠","Home"],["explore","🔍","Explore"],["profile","👤","Profile"]].map(([p,icon,label]) => (
            <button key={p} style={S.navBtn(page===p)} onClick={() => setPage(p)}>
              <span style={{fontSize:22}}>{icon}</span>{label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
