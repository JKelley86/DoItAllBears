<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MindFuel — Learn Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #13131A;
  --surface2: #1C1C26;
  --surface3: #252533;
  --text: #F0F0F8;
  --text2: #A0A0B8;
  --text3: #606078;
  --border: rgba(255,255,255,0.06);
  --accent: #7B6EF6;
  --accent2: #A594F9;
  --accent-glow: rgba(123,110,246,0.25);
  --green: #34D399;
  --green-glow: rgba(52,211,153,0.2);
  --orange: #FB923C;
  --pink: #F472B6;
  --yellow: #FBBF24;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --r: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100%;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  padding-bottom: calc(80px + var(--safe-bottom));
  position: relative;
}

/* ── BG GLOW ── */
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(123,110,246,0.12) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
.header {
  padding: calc(var(--safe-top) + 8px) 20px 16px;
  position: sticky; top: 0; z-index: 50;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.app-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent2), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px;
}
.header-streak {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2);
  padding: 6px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 600; color: var(--orange);
}
.header-sub {
  font-size: 13px; color: var(--text3); margin-top: 4px; font-weight: 400;
}

/* ── TAB BAR ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 430px; margin: 0 auto;
  padding: 10px 16px calc(10px + var(--safe-bottom));
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; gap: 4px;
  z-index: 100;
}
.nav-btn {
  flex: 1; padding: 8px 4px; border-radius: 14px; border: none;
  background: transparent; color: var(--text3);
  font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all 0.2s;
}
.nav-btn .nav-icon { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--accent2); background: rgba(123,110,246,0.1); }

/* ── PAGES ── */
.page { display: none; padding: 16px; animation: fadeUp 0.3s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── HOME PAGE ── */
.daily-card {
  background: linear-gradient(135deg, #1a1535 0%, #1C1C26 100%);
  border: 1px solid rgba(123,110,246,0.2);
  border-radius: var(--r);
  padding: 22px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.daily-card::after {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(123,110,246,0.2), transparent 70%);
  pointer-events: none;
}
.daily-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  color: var(--accent2); text-transform: uppercase; margin-bottom: 8px;
}
.daily-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 700; color: var(--text);
  line-height: 1.3; margin-bottom: 12px;
}
.daily-meta { display: flex; gap: 10px; align-items: center; }
.daily-tag {
  font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
  background: rgba(123,110,246,0.15); color: var(--accent2);
}
.daily-time { font-size: 11px; color: var(--text3); font-weight: 500; }
.daily-btn {
  width: 100%; margin-top: 16px; padding: 14px;
  border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.daily-btn:active { transform: scale(0.97); }

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 700; color: var(--text);
  margin-bottom: 12px; letter-spacing: -0.2px;
}

/* Topic grid */
.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.topic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 16px;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.topic-card:active { transform: scale(0.96); }
.topic-card::before {
  content: '';
  position: absolute; bottom: -20px; right: -20px;
  width: 70px; height: 70px;
  background: radial-gradient(circle, var(--tc-glow, rgba(123,110,246,0.15)), transparent 70%);
}
.topic-icon { font-size: 28px; margin-bottom: 8px; line-height: 1; }
.topic-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3;
}
.topic-count { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 500; }

/* ── LESSON VIEW ── */
.lesson-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.back-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.back-btn:active { transform: scale(0.92); }
.lesson-topic-badge {
  font-size: 11px; font-weight: 700; padding: 5px 12px;
  border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase;
}
.lesson-mode-tabs {
  display: flex; gap: 6px; margin-bottom: 20px;
  background: var(--surface); border-radius: 14px; padding: 4px;
}
.mode-tab {
  flex: 1; padding: 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text3);
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.mode-tab.active { background: var(--surface3); color: var(--text); }

/* Subtopic pills */
.subtopic-row {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  margin-bottom: 16px; scrollbar-width: none;
}
.subtopic-row::-webkit-scrollbar { display: none; }
.subtopic-pill {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.subtopic-pill.active {
  background: var(--accent); border-color: var(--accent);
  color: #fff; box-shadow: 0 0 16px var(--accent-glow);
}
.subtopic-pill:active { transform: scale(0.95); }

/* Lesson content card */
.lesson-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px;
  margin-bottom: 14px;
}
.lesson-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--text); margin-bottom: 14px; line-height: 1.3;
}
.lesson-body {
  font-size: 15px; line-height: 1.75; color: var(--text2);
  font-weight: 400;
}
.lesson-body h3 {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--accent2);
  margin: 18px 0 8px; text-transform: uppercase; letter-spacing: 0.05em;
}
.lesson-body p { margin-bottom: 12px; }
.lesson-body strong { color: var(--text); font-weight: 600; }
.lesson-body ul { padding-left: 18px; margin-bottom: 12px; }
.lesson-body li { margin-bottom: 6px; }
.lesson-body .highlight {
  background: rgba(123,110,246,0.1); border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 10px 10px 0; margin: 14px 0;
  font-style: italic; color: var(--text);
}
.lesson-body .formula {
  background: var(--surface2); border: 1px solid var(--border);
  padding: 12px 16px; border-radius: 10px; margin: 14px 0;
  font-family: 'Courier New', monospace; font-size: 14px;
  color: var(--green); text-align: center; letter-spacing: 0.05em;
}

/* Key takeaways */
.takeaways {
  background: var(--surface2); border-radius: 16px;
  padding: 18px; margin-bottom: 14px;
  border: 1px solid rgba(52,211,153,0.15);
}
.takeaways-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--green);
  letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px;
}
.takeaway-item {
  display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px;
}
.takeaway-item:last-child { margin-bottom: 0; }
.takeaway-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0; margin-top: 7px;
}
.takeaway-text { font-size: 14px; color: var(--text2); line-height: 1.5; }

/* Quiz */
.quiz-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px; margin-bottom: 14px;
}
.quiz-q {
  font-family: 'Syne', sans-serif;
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 20px; line-height: 1.4;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  padding: 14px 16px; border-radius: 14px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--text2); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; text-align: left;
  font-family: 'DM Sans', sans-serif;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.correct { border-color: var(--green); background: rgba(52,211,153,0.1); color: var(--text); }
.quiz-option.wrong { border-color: #EF4444; background: rgba(239,68,68,0.1); color: var(--text); }
.quiz-option.disabled { pointer-events: none; }
.quiz-explain {
  margin-top: 14px; padding: 14px; border-radius: 12px;
  background: var(--surface2); font-size: 14px; color: var(--text2); line-height: 1.6;
  display: none;
}
.quiz-explain.show { display: block; }
.quiz-next {
  width: 100%; margin-top: 14px; padding: 14px;
  border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; display: none; box-shadow: 0 4px 20px var(--accent-glow);
}
.quiz-next.show { display: block; }

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-title { height: 26px; width: 80%; margin-bottom: 16px; }
.skel-line { height: 14px; margin-bottom: 10px; }
.skel-line.w60 { width: 60%; }
.skel-line.w90 { width: 90%; }
.skel-line.w75 { width: 75%; }

/* Action buttons */
.lesson-actions { display: flex; gap: 10px; margin-top: 6px; }
.action-btn {
  flex: 1; padding: 13px; border-radius: 14px; border: none;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
}
.action-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
}
.action-btn.secondary {
  background: var(--surface2); color: var(--text2);
}
.action-btn:active { transform: scale(0.97); }

/* Progress bar */
.progress-bar {
  height: 3px; background: var(--surface2);
  border-radius: 2px; margin-bottom: 20px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
}

/* ── EXPLORE PAGE ── */
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 16px; margin-bottom: 20px;
}
.search-box input {
  flex: 1; background: none; border: none; outline: none;
  font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
}
.search-box input::placeholder { color: var(--text3); }
.search-icon { font-size: 18px; color: var(--text3); }
.ask-btn {
  padding: 8px 14px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}

.ask-result {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
  font-size: 15px; line-height: 1.75; color: var(--text2);
  display: none;
}
.ask-result.show { display: block; }
.ask-result h3 {
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  color: var(--text); margin-bottom: 12px;
}

/* ── PROFILE PAGE ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px; text-align: center;
}
.stat-num {
  font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
  color: var(--accent2); line-height: 1;
}
.stat-label { font-size: 12px; color: var(--text3); margin-top: 6px; font-weight: 500; }

.history-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px; background: var(--surface); border-radius: 14px;
  margin-bottom: 8px; border: 1px solid var(--border);
}
.history-icon { font-size: 22px; flex-shrink: 0; }
.history-info { flex: 1; min-width: 0; }
.history-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.history-score {
  font-size: 13px; font-weight: 700; color: var(--green);
  background: rgba(52,211,153,0.1); padding: 4px 10px; border-radius: 10px;
}

/* Error state */
.error-msg {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 14px; padding: 16px; color: #FCA5A5;
  font-size: 14px; line-height: 1.6; margin-bottom: 14px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div>
      <div class="app-name">MindFuel ⚡</div>
      <div class="header-sub" id="headerSub">What will you learn today?</div>
    </div>
    <div class="header-streak" id="streakBadge">🔥 <span id="streakCount">0</span> day streak</div>
  </div>
</div>

<!-- Pages -->

<!-- HOME -->
<div class="page active" id="page-home">

  <div class="daily-card" id="dailyCard">
    <div class="daily-label">⚡ Today's Pick</div>
    <div class="daily-title" id="dailyTitle">Loading your daily lesson…</div>
    <div class="daily-meta">
      <span class="daily-tag" id="dailyTag">—</span>
      <span class="daily-time" id="dailyTime">~5 min read</span>
    </div>
    <button class="daily-btn" onclick="startDailyLesson()">Start Today's Lesson →</button>
  </div>

  <div class="section-title">Browse Topics</div>
  <div class="topic-grid" id="topicGrid"></div>

</div>

<!-- LESSON -->
<div class="page" id="page-lesson">
  <div class="lesson-header">
    <button class="back-btn" onclick="goBack()">‹</button>
    <span class="lesson-topic-badge" id="lessonBadge">Topic</span>
  </div>
  <div class="lesson-mode-tabs">
    <button class="mode-tab active" id="modeLesson" onclick="setMode('lesson')">📖 Lesson</button>
    <button class="mode-tab" id="modeQuiz" onclick="setMode('quiz')">🧠 Quiz</button>
    <button class="mode-tab" id="modeDeep" onclick="setMode('deep')">🔬 Deep Dive</button>
  </div>
  <div class="subtopic-row" id="subtopicRow"></div>
  <div id="lessonContent"></div>
</div>

<!-- EXPLORE -->
<div class="page" id="page-explore">
  <div class="section-title">Ask Anything</div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="askInput" placeholder="Ask about any topic…" />
    <button class="ask-btn" onclick="askQuestion()">Ask</button>
  </div>
  <div class="ask-result" id="askResult"></div>

  <div class="section-title" style="margin-top:24px">Quick Topics</div>
  <div class="topic-grid" id="exploreGrid"></div>
</div>

<!-- PROFILE -->
<div class="page" id="page-profile">
  <div class="section-title">Your Progress</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num" id="statLessons">0</div><div class="stat-label">Lessons Done</div></div>
    <div class="stat-card"><div class="stat-num" id="statStreak">0</div><div class="stat-label">Day Streak 🔥</div></div>
    <div class="stat-card"><div class="stat-num" id="statQuizzes">0</div><div class="stat-label">Quizzes Taken</div></div>
    <div class="stat-card"><div class="stat-num" id="statScore">—</div><div class="stat-label">Avg Quiz Score</div></div>
  </div>
  <div class="section-title">Recent Activity</div>
  <div id="historyList"><div style="color:var(--text3);font-size:14px">No lessons yet — start learning!</div></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goPage('home')">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-btn" id="nav-explore" onclick="goPage('explore')">
    <span class="nav-icon">🔍</span>Explore
  </button>
  <button class="nav-btn" id="nav-profile" onclick="goPage('profile')">
    <span class="nav-icon">👤</span>Profile
  </button>
</div>

<script>
// ── TOPICS CONFIG ──
const TOPICS = [
  {
    id: "history", name: "History", icon: "🏛️", color: "#FB923C", glow: "rgba(251,146,60,0.2)",

  },
  {

    subtopics: ["Cell Biology", "Evolution", "Genetics", "Ecosystems", "Human Body", "Microbiology", "Chemistry Basics", "Neuroscience"]
  },
  {
    id: "math", name: "Math", icon: "📐", color: "#A594F9", glow: "rgba(165,148,249,0.2)",

  },
  {

  },
  {
    id: "finance", name: "Finance & Business", icon: "📈", color: "#FBBF24", glow: "rgba(251,191,36,0.2)",
    subtopics: ["Investing Basics", "Stock Market", "Personal Finance", "Entrepreneurship", "Economics", "Cryptocurrency", "Real Estate", "Budgeting"]
  },
  {
    id: "philosophy", name: "Philosophy", icon: "🧠", color: "#C084FC", glow: "rgba(192,132,252,0.2)",
    subtopics: ["Ethics", "Epistemology", "Metaphysics", "Stoicism", "Logic", "Eastern Philosophy", "Political Philosophy", "Existentialism"]
  },
  {
    id: "technology", name: "Technology", icon: "💻", color: "#38BDF8", glow: "rgba(56,189,248,0.2)",
    subtopics: ["AI & Machine Learning", "How the Internet Works", "Cybersecurity", "Programming Concepts", "Operating Systems", "Databases", "Networking", "Cloud Computing"]
  },
  {
    id: "physics", name: "Physics — Mechanics", icon: "⚙️", color: "#F97316", glow: "rgba(249,115,22,0.2)",
    subtopics: ["Newton's Laws", "Levers & Torque", "Forces & Motion", "Energy & Work", "Momentum", "Friction", "Simple Machines", "Center of Mass"]
  },
  {
    id: "physics-fluid", name: "Physics — Fluids", icon: "💧", color: "#0EA5E9", glow: "rgba(14,165,233,0.2)",
    subtopics: ["Water Pressure", "Buoyancy", "Flow Rate", "Bernoulli's Principle", "Hydraulics", "Surface Tension", "Viscosity", "Pascal's Law"]
  },
  {
    id: "physics-weight", name: "Physics — Weight & Gravity", icon: "🪨", color: "#94A3B8", glow: "rgba(148,163,184,0.2)",
    subtopics: ["Gravity Basics", "Weight vs Mass", "Free Fall", "Gravitational Fields", "Center of Gravity", "Tipping Points", "Load Distribution", "Structural Load"]
  },
  {
    id: "physics-energy", name: "Physics — Energy & Waves", icon: "⚡", color: "#FBBF24", glow: "rgba(251,191,36,0.2)",
    subtopics: ["Kinetic & Potential Energy", "Conservation of Energy", "Thermodynamics", "Sound Waves", "Light & Optics", "Electromagnetic Spectrum", "Heat Transfer", "Resonance"]
  },
  {
    id: "plc", name: "PLC Coding", icon: "🔧", color: "#34D399", glow: "rgba(52,211,153,0.2)",
    subtopics: ["Ladder Logic Basics", "Inputs & Outputs", "Timers & Counters", "Coils & Contacts", "Program Flow", "HMI Basics", "Safety Systems", "Troubleshooting PLCs"]
  },
  {
    id: "electrical", name: "Electrical", icon: "⚡", color: "#FBBF24", glow: "rgba(251,191,36,0.2)",
    subtopics: ["Ohm's Law", "AC vs DC", "Series & Parallel Circuits", "Reading Wiring Diagrams", "Transformers", "Motors & Relays", "Electrical Safety", "NEC Basics"]
  },
];

const DAILY_ROTATION = [
  { topic: "history", subtopic: "Ancient Rome" },
  { topic: "science", subtopic: "Neuroscience" },
  { topic: "plc", subtopic: "Ladder Logic Basics" },
  { topic: "physics-fluid", subtopic: "Water Pressure" },
  { topic: "electrical", subtopic: "Ohm's Law" },
  { topic: "finance", subtopic: "Investing Basics" },
  { topic: "physics", subtopic: "Levers & Torque" },
];

// ── STATE ──
let currentTopic = null;
let currentSubtopic = null;
let currentMode = "lesson";
let lessonCache = {};
let currentPage = "home";
let prevPage = "home";

// Stats
let stats = JSON.parse(localStorage.getItem("mf_stats") || '{"lessons":0,"streak":0,"quizzes":0,"scores":[],"history":[],"lastDate":""}');
function saveStats() { localStorage.setItem("mf_stats", JSON.stringify(stats)); }

// Streak logic
function updateStreak() {
  const today = new Date().toDateString();
  if (stats.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (stats.lastDate === yesterday) {
      stats.streak = (stats.streak || 0) + 1;
    } else if (stats.lastDate !== today) {
      stats.streak = 1;
    }
    stats.lastDate = today;
    saveStats();
  }
  document.getElementById("streakCount").textContent = stats.streak || 0;
  document.getElementById("statStreak").textContent = stats.streak || 0;
}

// ── NAVIGATION ──
function goPage(name) {
  if (name === currentPage && name !== "home") return;
  prevPage = currentPage;
  currentPage = name;
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  const navEl = document.getElementById("nav-" + name);
  if (navEl) navEl.classList.add("active");
  if (name === "profile") renderProfile();
  if (name === "explore") renderExploreGrid();
}

function goBack() {
  goPage(prevPage === "lesson" ? "home" : prevPage);
  prevPage = "home";
}

// ── BUILD HOME ──
function buildHome() {
  const grid = document.getElementById("topicGrid");
  grid.innerHTML = "";
  TOPICS.forEach(t => {
    const card = document.createElement("div");
    card.className = "topic-card";
    card.style.setProperty("--tc-glow", t.glow);
    card.innerHTML = `
      <div class="topic-icon">${t.icon}</div>
      <div class="topic-name">${t.name}</div>
      <div class="topic-count">${t.subtopics.length} lessons</div>
    `;
    card.addEventListener("click", () => openTopic(t));
    grid.appendChild(card);
  });

  // Daily card
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const daily = DAILY_ROTATION[dayOfYear % DAILY_ROTATION.length];
  const topic = TOPICS.find(t => t.id === daily.topic);
  if (topic) {
    document.getElementById("dailyTitle").textContent = daily.subtopic;
    document.getElementById("dailyTag").textContent = topic.name;
    document.getElementById("dailyTag").style.cssText = `background:${topic.glow};color:${topic.color}`;
  }
}

function startDailyLesson() {
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const daily = DAILY_ROTATION[dayOfYear % DAILY_ROTATION.length];
  const topic = TOPICS.find(t => t.id === daily.topic);
  if (topic) openTopic(topic, daily.subtopic);
}

// ── OPEN TOPIC ──
function openTopic(topic, defaultSubtopic) {
  currentTopic = topic;
  currentSubtopic = defaultSubtopic || topic.subtopics[0];
  currentMode = "lesson";

  prevPage = currentPage;
  currentPage = "lesson";
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-lesson").classList.add("active");

  const badge = document.getElementById("lessonBadge");
  badge.textContent = topic.icon + " " + topic.name;
  badge.style.cssText = `background:${topic.glow};color:${topic.color};padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase`;

  document.getElementById("modeLesson").classList.add("active");
  document.getElementById("modeQuiz").classList.remove("active");
  document.getElementById("modeDeep").classList.remove("active");

  buildSubtopics();
  loadContent();
}

function buildSubtopics() {
  const row = document.getElementById("subtopicRow");
  row.innerHTML = "";
  currentTopic.subtopics.forEach(st => {
    const pill = document.createElement("button");
    pill.className = "subtopic-pill" + (st === currentSubtopic ? " active" : "");
    pill.textContent = st;
    pill.addEventListener("click", () => {
      currentSubtopic = st;
      document.querySelectorAll(".subtopic-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      loadContent();
    });
    row.appendChild(pill);
  });
}

function setMode(mode) {
  currentMode = mode;
  ["lesson","quiz","deep"].forEach(m => {
    document.getElementById("mode" + m.charAt(0).toUpperCase() + m.slice(1))
      .classList.toggle("active", m === mode);
  });
  loadContent();
}

// ── LOAD CONTENT via Claude API ──
async function loadContent() {
  const content = document.getElementById("lessonContent");
  content.innerHTML = `
    <div class="lesson-card">
      <div class="skeleton skel-title"></div>
      <div class="skeleton skel-line w90"></div>
      <div class="skeleton skel-line w75"></div>
      <div class="skeleton skel-line w90"></div>
      <div class="skeleton skel-line w60"></div>
      <div class="skeleton skel-line w90"></div>
      <div class="skeleton skel-line w75"></div>
    </div>`;

  const cacheKey = `${currentTopic.id}__${currentSubtopic}__${currentMode}`;
  if (lessonCache[cacheKey]) {
    renderContent(lessonCache[cacheKey]);
    return;
  }

  const prompt = buildPrompt();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "";
    let parsed;
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      parsed = JSON.parse(clean);
    } catch(e) {
      content.innerHTML = `<div class="error-msg">⚠️ Couldn't parse response. Try again.</div>
        <button class="action-btn secondary" onclick="loadContent()" style="width:100%">↺ Retry</button>`;
      return;
    }
    lessonCache[cacheKey] = parsed;
    renderContent(parsed);
  } catch(e) {
    content.innerHTML = `<div class="error-msg">⚠️ Connection error. Check your internet and try again.</div>
      <button class="action-btn secondary" onclick="loadContent()" style="width:100%">↺ Retry</button>`;
  }
}

function buildPrompt() {
  const topic = currentTopic.name;
  const sub = currentSubtopic;

  if (currentMode === "lesson") {
    return `You are an expert teacher. Create a concise, engaging lesson about "${sub}" within the topic of "${topic}".

Return ONLY valid JSON (no markdown fences) in this exact format:
{
  "title": "lesson title",
  "body": "HTML lesson content using <p>, <strong>, <ul><li>, <h3>, and optionally <div class=\\"highlight\\">callout text</div> or <div class=\\"formula\\">FORMULA</div> for equations. Keep it 300-400 words. Make it practical and interesting.",
  "takeaways": ["key point 1", "key point 2", "key point 3", "key point 4"]
}`;
  }

  if (currentMode === "quiz") {
    return `You are a quiz creator. Make a 3-question multiple choice quiz about "${sub}" in "${topic}".

Return ONLY valid JSON:
{
  "questions": [
    {
      "q": "question text",
      "options": ["A", "B", "C", "D"],
      "answer": 0,
      "explain": "brief explanation of the correct answer"
    }
  ]
}
The "answer" field is the 0-based index of the correct option.`;
  }

  if (currentMode === "deep") {
    return `You are an expert giving a deep-dive lecture on "${sub}" within "${topic}". Go into real depth, mechanisms, history, and nuance.

Return ONLY valid JSON:
{
  "title": "deep dive title",
  "body": "detailed HTML content, 500-600 words, using <p>, <h3>, <strong>, <ul><li>, <div class=\\"highlight\\">, and <div class=\\"formula\\"> where relevant. Cover the real science/mechanics, not just basics.",
  "takeaways": ["advanced insight 1", "advanced insight 2", "advanced insight 3", "advanced insight 4", "advanced insight 5"]
}`;
  }
}

// ── RENDER CONTENT ──
function renderContent(data) {
  if (currentMode === "quiz") {
    renderQuiz(data.questions);
  } else {
    renderLesson(data);
  }

  // Track lesson
  if (currentMode !== "quiz") {
    stats.lessons = (stats.lessons || 0) + 1;
    stats.history = stats.history || [];
    stats.history.unshift({
      title: data.title,
      topic: currentTopic.name,
      icon: currentTopic.icon,
      mode: currentMode,
      date: new Date().toLocaleDateString()
    });
    if (stats.history.length > 20) stats.history.pop();
    saveStats();
    updateStreakDisplay();
  }
}

function renderLesson(data) {
  const content = document.getElementById("lessonContent");
  const tkHtml = (data.takeaways || []).map(t =>
    `<div class="takeaway-item"><div class="takeaway-dot"></div><div class="takeaway-text">${t}</div></div>`
  ).join("");

  content.innerHTML = `
    <div class="lesson-card">
      <div class="lesson-title">${data.title}</div>
      <div class="lesson-body">${data.body}</div>
    </div>
    ${tkHtml ? `<div class="takeaways"><div class="takeaways-title">✅ Key Takeaways</div>${tkHtml}</div>` : ""}
    <div class="lesson-actions">
      <button class="action-btn secondary" onclick="setMode('quiz')">🧠 Test Yourself</button>
      <button class="action-btn primary" onclick="setMode('deep')">🔬 Go Deeper</button>
    </div>
  `;
}

// ── QUIZ RENDERER ──
let quizQuestions = [];
let quizIdx = 0;
let quizCorrect = 0;

function renderQuiz(questions) {
  quizQuestions = questions;
  quizIdx = 0;
  quizCorrect = 0;
  showQuestion();
}

function showQuestion() {
  const content = document.getElementById("lessonContent");
  if (quizIdx >= quizQuestions.length) {
    // Results
    const pct = Math.round((quizCorrect / quizQuestions.length) * 100);
    const grade = pct >= 80 ? "🎉 Excellent!" : pct >= 60 ? "👍 Good job!" : "📚 Keep studying!";
    stats.quizzes = (stats.quizzes || 0) + 1;
    stats.scores = stats.scores || [];
    stats.scores.push(pct);
    saveStats();
    content.innerHTML = `
      <div class="quiz-card" style="text-align:center">
        <div style="font-size:48px;margin-bottom:12px">${pct >= 80 ? "🏆" : pct >= 60 ? "⭐" : "📖"}</div>
        <div class="quiz-q">${grade}</div>
        <div style="font-size:40px;font-family:'Syne',sans-serif;font-weight:800;color:var(--accent2);margin:10px 0">${pct}%</div>
        <div style="color:var(--text3);font-size:14px">${quizCorrect} of ${quizQuestions.length} correct</div>
      </div>
      <div class="lesson-actions">
        <button class="action-btn secondary" onclick="setMode('quiz')">↺ Retake Quiz</button>
        <button class="action-btn primary" onclick="setMode('lesson')">📖 Back to Lesson</button>
      </div>`;
    return;
  }

  const q = quizQuestions[quizIdx];
  const progress = ((quizIdx) / quizQuestions.length) * 100;

  content.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px;font-weight:600">Question ${quizIdx+1} of ${quizQuestions.length}</div>
    <div class="quiz-card">
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-options" id="quizOptions">
        ${q.options.map((opt, i) => `<button class="quiz-option" onclick="answerQuiz(${i})">${opt}</button>`).join("")}
      </div>
      <div class="quiz-explain" id="quizExplain">${q.explain}</div>
      <button class="quiz-next" id="quizNext" onclick="nextQuestion()">
        ${quizIdx + 1 < quizQuestions.length ? "Next Question →" : "See Results →"}
      </button>
    </div>`;
}

function answerQuiz(idx) {
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll(".quiz-option");
  opts.forEach((o, i) => {
    o.classList.add("disabled");
    if (i === q.answer) o.classList.add("correct");
    else if (i === idx && i !== q.answer) o.classList.add("wrong");
  });
  if (idx === q.answer) quizCorrect++;
  document.getElementById("quizExplain").classList.add("show");
  document.getElementById("quizNext").classList.add("show");
}

function nextQuestion() {
  quizIdx++;
  showQuestion();
}

// ── ASK ANYTHING ──
async function askQuestion() {
  const q = document.getElementById("askInput").value.trim();
  if (!q) return;
  const result = document.getElementById("askResult");
  result.className = "ask-result show";
  result.innerHTML = `<div class="skeleton skel-line w90" style="margin:8px 0"></div><div class="skeleton skel-line w75"></div><div class="skeleton skel-line w90"></div>`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: `Answer this learning question concisely and engagingly in 3-5 paragraphs, formatted in simple HTML with <p> and <strong> tags. Don't use markdown. Question: ${q}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || "No response.";
    result.innerHTML = `<h3>💡 ${q}</h3>${text}`;
  } catch(e) {
    result.innerHTML = `<div class="error-msg">Connection error. Try again.</div>`;
  }
}

document.getElementById("askInput").addEventListener("keydown", e => {
  if (e.key === "Enter") askQuestion();
});

// ── EXPLORE GRID ──
function renderExploreGrid() {
  const grid = document.getElementById("exploreGrid");
  if (grid.innerHTML) return;
  grid.innerHTML = "";
  TOPICS.forEach(t => {
    const card = document.createElement("div");
    card.className = "topic-card";
    card.style.setProperty("--tc-glow", t.glow);
    card.innerHTML = `<div class="topic-icon">${t.icon}</div><div class="topic-name">${t.name}</div><div class="topic-count">${t.subtopics.length} lessons</div>`;
    card.addEventListener("click", () => openTopic(t));
    grid.appendChild(card);
  });
}

// ── PROFILE ──
function renderProfile() {
  document.getElementById("statLessons").textContent = stats.lessons || 0;
  document.getElementById("statStreak").textContent = stats.streak || 0;
  document.getElementById("statQuizzes").textContent = stats.quizzes || 0;
  const scores = stats.scores || [];
  document.getElementById("statScore").textContent = scores.length
    ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) + "%" : "—";

  const hist = document.getElementById("historyList");
  if (!stats.history || stats.history.length === 0) {
    hist.innerHTML = `<div style="color:var(--text3);font-size:14px;padding:8px 0">No lessons yet — start learning!</div>`;
    return;
  }
  hist.innerHTML = stats.history.slice(0, 10).map(h => `
    <div class="history-item">
      <div class="history-icon">${h.icon}</div>
      <div class="history-info">
        <div class="history-title">${h.title || h.topic}</div>
        <div class="history-meta">${h.topic} · ${h.date}</div>
      </div>
      <div class="history-score">${h.mode === "quiz" ? "Quiz" : h.mode === "deep" ? "Deep" : "Read"}</div>
    </div>
  `).join("");
}

function updateStreakDisplay() {
  document.getElementById("streakCount").textContent = stats.streak || 0;
}

// ── INIT ──
updateStreak();
buildHome();
</script>
</body>
</html>
