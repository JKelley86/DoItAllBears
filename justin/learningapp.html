          { heading: "What Is the EM Spectrum?", body: "The electromagnetic spectrum is the complete range of electromagnetic radiation ordered by frequency (or wavelength). All EM waves travel at c = 3 × 10⁸ m/s in vacuum and are transverse waves of oscillating electric and magnetic fields requiring no medium. From lowest to highest frequency: radio waves, microwaves, infrared, visible light, ultraviolet, X-rays, gamma rays. Higher frequency means shorter wavelength and higher photon energy. The relationship: c = f × λ, where f is frequency and λ is wavelength." },
          { heading: "Low-Frequency End: Radio to Infrared", body: "Radio waves (kHz-GHz) carry communications — AM/FM radio, WiFi, Bluetooth, cellular, radar. Wavelengths from kilometers to centimeters. Microwaves (GHz) heat food via molecular rotation of water, and enable radar, satellite communications, and WiFi. Infrared (IR) radiation is thermal radiation — all objects above absolute zero emit IR proportional to their temperature. Thermal cameras detect IR emissions to find heat sources — used for electrical panel hot spot detection, building energy audits, and predictive maintenance on rotating machinery." },
          { heading: "Visible and UV: The Middle Range", body: "Visible light occupies a tiny band from ~400nm (violet) to ~700nm (red) — the range human eyes evolved to detect because it matches peak solar output. Ultraviolet (UV, 10-400nm) carries enough energy to damage DNA and cause sunburn. Industrial UV applications: UV curing of adhesives and coatings (photoinitiators harden on UV exposure), UV sterilization of water and air, UV leak detection (fluorescent dye visible under UV), and spectroscopic material analysis. UV-C (100-280nm) is germicidal and used in hospital air treatment systems." },
          { heading: "High-Frequency End: X-Rays and Gamma Rays", body: "X-rays (0.01-10nm wavelength) penetrate soft tissue but are absorbed by dense materials — enabling medical and industrial radiography. Industrial X-ray and gamma-ray radiography inspects welds, castings, and structures for internal defects without disassembly. Gamma rays originate from nuclear decay — higher energy than X-rays, more penetrating. Both are ionizing radiation: high enough photon energy to eject electrons from atoms and damage biological tissue. Exposure is controlled by time, distance (intensity follows inverse-square law), and shielding (lead and dense concrete for X-ray and gamma)." }
        ],
        takeaways: [
          "EM spectrum from low to high frequency: radio, microwave, infrared, visible, UV, X-ray, gamma",
          "c = f × λ — all EM waves travel at 3 × 10⁸ m/s; higher frequency means shorter wavelength",
          "IR cameras detect thermal emissions — used for electrical hot-spot and machinery fault detection",
          "X-ray and gamma radiation are ionizing — control exposure with time, distance, and shielding"
        ]
      },
      quiz: {
        questions: [
          { q: "An infrared thermal camera shows a bright spot on an electrical panel. What does this indicate?", options: ["A cold connection drawing no current", "A high-resistance connection generating excess heat — a potential fire hazard", "Normal operating temperature", "A ground fault"], answer: 1, explain: "A hot spot in an electrical panel indicates a high-resistance connection — loose terminal, corroded contact, or undersized conductor. Excess resistance = excess heat (P = I²R). Thermal imaging finds these faults before they cause fires or failures, making it a standard predictive maintenance tool." },
          { q: "A UV lamp is used to inspect a weld for leaks using fluorescent dye. Which UV band is typically used?", options: ["UV-C (germicidal, 200-280nm)", "UV-A (365nm, near visible, 'black light')", "X-ray wavelengths", "Infrared adjacent to UV"], answer: 1, explain: "UV-A (315-400nm, peak ~365nm) is the 'black light' range used in fluorescent dye penetrant inspection (FPI). The fluorescent dye absorbs UV-A and emits visible light, making cracks visible in darkness. UV-C is used for sterilization, not inspection — and it's more hazardous to skin and eyes." },
          { q: "Why does doubling the distance from an X-ray source reduce radiation intensity to one-quarter?", options: ["X-rays decay over distance", "Radiation follows the inverse-square law — intensity is proportional to 1/r²", "Air absorbs half the radiation per meter", "X-ray machines lose power over longer distances"], answer: 1, explain: "Radiation spreads spherically. The same total energy spreads over a surface area proportional to r². Doubling distance means 4× the surface area, so intensity (power per area) drops to 1/4. This is the inverse-square law — the primary reason distance is the cheapest and most effective radiation protection." }
        ]
      }

    "Resonance": {
      lesson: {
        title: "Resonance: When Frequency Matches and Energy Builds",
        sections: [
          { heading: "What Is Resonance?", body: "Every physical system has one or more natural frequencies at which it vibrates when disturbed. When an external driving force matches a natural frequency, the system is in resonance — each energy input adds to the existing vibration rather than being absorbed. Amplitude builds until it is limited by damping or structural failure. A child pumping a swing at exactly its natural frequency builds large oscillations with small inputs. The same principle destroyed the Tacoma Narrows Bridge in 1940 when wind-induced vortices matched the bridge's torsional natural frequency." },
          { heading: "Natural Frequency", body: "For a simple spring-mass system: natural frequency f_n = (1/2π) × √(k/m), where k is stiffness and m is mass. Higher stiffness = higher natural frequency. Higher mass = lower natural frequency. For a cantilever beam, natural frequency depends on beam stiffness and the ratio of beam mass to tip mass. These calculations identify frequencies to avoid in machine design — if a rotating component runs at a speed matching a structural natural frequency, destructive resonance occurs. This is the basis of critical speed analysis for rotating shafts." },
          { heading: "Damping", body: "Damping dissipates vibration energy, converting it to heat. Without damping, resonance builds without limit until failure. With high damping, resonance amplitude is controlled. Damping ratio ζ (zeta) describes how quickly oscillations decay. Underdamped (ζ < 1): oscillates with decreasing amplitude. Critically damped (ζ = 1): returns to rest in minimum time without oscillating. Overdamped (ζ > 1): returns slowly without oscillating. Shock absorbers are designed for slight underdamping to give both good control and reasonable comfort. Rubber isolation mounts add damping to reduce resonant peaks in machinery." },
          { heading: "Resonance in Industry", body: "Rotating machinery must avoid operating at or near critical speeds — shaft rotation speeds at which the rotational frequency matches a structural natural frequency. Turbochargers, pumps, and motors operating through their critical speed must pass through it quickly during startup, not linger there. Vibration analysis identifies natural frequencies through impact testing or operating data. Piping systems can resonate with pump pulsations — catastrophic piping failures have been caused by acoustic resonance in long piping runs. Tuned mass dampers (weighted pendulums) in tall buildings counteract wind-induced building resonance." }
        ],
        takeaways: [
          "Resonance occurs when driving frequency matches natural frequency — amplitude builds until limited by damping or failure",
          "Natural frequency f_n = (1/2π)√(k/m) — stiffer means higher, heavier means lower",

          { q: "Stiffening a beam (increasing k) while keeping mass constant does what to its natural frequency?", options: ["Lowers it", "Raises it", "Has no effect", "Doubles it regardless of how much k increases"], answer: 1, explain: "f_n = (1/2π)√(k/m). Increasing k increases the value under the square root, raising f_n. This is a design tool — if a structure resonates at a troublesome frequency, stiffening it raises the natural frequency away from the excitation. Alternatively, adding mass lowers the natural frequency." },
          { q: "The Tacoma Narrows Bridge collapsed due to resonance. What was the energy source that drove the oscillation?", options: ["Heavy truck traffic on the bridge", "Wind-induced aerodynamic vortices matching the bridge's torsional natural frequency", "Thermal expansion and contraction cycles", "Seismic activity in the ground"], answer: 1, explain: "The bridge's deck shape caused wind to shed vortices alternately above and below at a frequency matching the bridge's torsional natural frequency. Each vortex added a small twist — resonance built the amplitude over hours until the bridge tore itself apart. It is the most famous engineering resonance failure in history." }
        ]

          { heading: "Feudalism and the Social Order", body: "Medieval society operated under feudalism — a hierarchical system of land grants in exchange for military service and loyalty. The king granted land (fiefs) to nobles (lords), who granted portions to knights, who provided military service. Peasants (serfs) worked the land in exchange for protection, bound to the land and unable to leave without permission. This system provided local security in an era without strong central states but created rigid social stratification. The manor — a lord's estate — was the basic economic unit, largely self-sufficient. By the High Middle Ages (1000-1300), a growing merchant class and expanding trade were already eroding pure feudalism from below." },

        sections: [
          { heading: "What Was the Scientific Revolution?", body: "The Scientific Revolution (roughly 1543-1687) was the emergence of modern science as a methodology — a shift from accepting ancient authority (especially Aristotle) to testing ideas against observation and experiment. Before it, educated Europeans largely accepted Aristotle's physics (which were mostly wrong) and Ptolemy's geocentric astronomy. After it, science was established as a self-correcting process: form hypotheses, test them, revise based on results. This was arguably the most consequential intellectual transformation in human history, eventually producing the technology of the modern world." },
          { heading: "Copernicus, Galileo, and the Heliocentric Revolution", body: "Nicolaus Copernicus published his heliocentric model (Sun at center) in 1543, the same year he died — having sat on the work for decades fearing Church reaction. Galileo Galilei (1564-1642) used his telescope (1609) to observe Jupiter's moons, Venus's phases, and lunar craters — all contradicting geocentric models. His mechanics work established that falling objects accelerate uniformly regardless of mass (contradicting Aristotle) and invented the concept of inertia. Galileo was tried by the Inquisition in 1633 and forced to recant heliocentrism, spending his last years under house arrest — illustrating the conflict between emerging science and religious authority." },
          { heading: "Kepler, Newton, and the Laws of Nature", body: "Johannes Kepler (1571-1630) analyzed Tycho Brahe's precise astronomical data and discovered that planets move in ellipses (not circles), with mathematical laws governing their speeds. Isaac Newton (1643-1727) synthesized everything: his Principia Mathematica (1687) presented the laws of motion and universal gravitation, showing that the same force causing apples to fall governed planetary orbits. Newton invented calculus (simultaneously with Leibniz) to solve the problems. His framework could predict planetary positions, tides, and projectile motion with unprecedented accuracy — demonstrating that nature operates by mathematical laws accessible to human reason." },
          { heading: "Francis Bacon and the Scientific Method", body: "Francis Bacon (1561-1626) articulated the inductive scientific method: accumulate observations, identify patterns, form general principles, then test them. This was a direct challenge to deductive reasoning from first principles (stating what must be true from axioms) that characterized ancient and medieval thought. René Descartes (1596-1650) contributed the framework of systematic doubt — question everything that cannot be demonstrated. Together they established that knowledge must be earned through evidence, not inherited from authority. By 1660, the Royal Society of London was founded for experimental natural philosophy — institutionalizing science as a collaborative, cumulative, self-correcting enterprise." }

        title: "Ecosystems: Life in Its Environment",
        sections: [
          { heading: "What Is an Ecosystem?", body: "An ecosystem is the sum of all living organisms (biotic components) in an area plus the nonliving physical environment (abiotic components — sunlight, temperature, water, soil, nutrients) with which they interact. Ecosystems range from a pond to a coral reef to a tropical rainforest to the entire biosphere. Key concepts: habitat (where an organism lives), niche (an organism's role and resource use within an ecosystem), population (all individuals of one species in an area), community (all populations in an area), ecosystem (community plus abiotic environment). Ecosystems are defined by flows of energy and cycling of matter — these two processes are what make them function." },
          { heading: "Energy Flow: Producers, Consumers, Decomposers", body: "Energy enters most ecosystems through photosynthesis — producers (plants, algae, cyanobacteria) convert sunlight into organic molecules. Primary consumers (herbivores) eat producers. Secondary consumers (carnivores) eat primary consumers. Tertiary consumers eat secondary consumers. Decomposers (fungi, bacteria) break down dead organic matter, returning nutrients to the soil. The 10% rule: only about 10% of energy is transferred between trophic levels — the rest is lost as heat. A food chain with grass → mouse → snake → hawk means the hawk gets only 0.1% of the original solar energy captured by grass. This energy loss is why ecosystems support fewer large predators than prey." },
          { heading: "Nutrient Cycles", body: "Unlike energy (which flows through and is lost as heat), matter cycles. The carbon cycle: CO₂ is fixed by photosynthesis into organic molecules, released by respiration and decomposition, and sequestered in fossil fuels, soils, and oceans. Human fossil fuel burning releases carbon stored over millions of years, rapidly increasing atmospheric CO₂. The nitrogen cycle: nitrogen gas (N₂) is fixed by soil bacteria (Rhizobium in legume roots) into ammonia, converted to nitrates usable by plants, returned to N₂ by denitrifying bacteria. Most plants cannot use atmospheric nitrogen directly — they depend on bacterial nitrogen fixation. Synthetic fertilizers (Haber-Bosch process) produce fixed nitrogen industrially, enabling modern agricultural yields." },
          { heading: "Biodiversity and Ecosystem Stability", body: "Biodiversity — the variety of species in an ecosystem — correlates strongly with ecosystem stability and resilience. Diverse ecosystems have more redundancy: if one species is lost, others can fill its ecological role. Keystone species have disproportionate impact — sea otters control sea urchin populations that would otherwise devastate kelp forests. Trophic cascades occur when changes at one level ripple through the whole food web. The current biodiversity crisis (often called the sixth mass extinction) involves species loss at 100-1,000 times the natural background rate, driven by habitat destruction, pollution, invasive species, overexploitation, and climate change. Ecosystem services — pollination, clean water, climate regulation, soil fertility — have enormous economic value that is rarely priced in markets." }
        ],
        takeaways: [
          "Ecosystems include biotic (living) and abiotic (nonliving) components linked by energy flow and nutrient cycling",
          "10% rule: only ~10% of energy transfers between trophic levels — explains why large predators are rare",
          "Matter cycles (carbon, nitrogen); energy flows through and is lost as heat",
          "Biodiversity increases ecosystem stability — keystone species have outsized impacts on ecosystem structure"
        ]
      },
      quiz: {
        questions: [
          { q: "A grassland ecosystem has grass → rabbit → fox → eagle. If 10,000 kJ of solar energy is captured by grass, how much reaches the eagle?", options: ["1,000 kJ", "100 kJ", "10 kJ", "1 kJ"], answer: 2, explain: "Applying the 10% rule at each step: grass has 10,000 kJ → rabbit gets 1,000 kJ → fox gets 100 kJ → eagle gets 10 kJ. Each transfer loses 90% as heat from metabolism. This is why apex predators like eagles need large territories — they require vast areas of primary production to support the energy cascade up to them." },
          { q: "Why can't most plants use atmospheric nitrogen (N₂) directly, even though air is 78% nitrogen?", options: ["Plants absorb only CO₂ through their leaves", "N₂ is too heavy to enter roots", "The triple bond in N₂ is extremely strong — it requires specialized bacteria to break it and convert it to usable forms", "Nitrogen is toxic to plants"], answer: 2, explain: "N₂ has an extremely strong triple covalent bond requiring 941 kJ/mol to break. Only nitrogen-fixing bacteria (like Rhizobium in legume root nodules) have the enzyme nitrogenase to do this, converting N₂ to ammonia (NH₃). Plants absorb nitrogen as nitrates (NO₃⁻) after further bacterial conversion. This bacterial dependency is why legumes are used in crop rotation to restore soil nitrogen." },
          { q: "Sea otters eat sea urchins, which eat kelp. When sea otters were hunted to near-extinction, what happened to kelp forests?", options: ["Kelp forests thrived without otters disturbing them", "Sea urchin populations exploded and consumed kelp forests, devastating the ecosystem", "Other predators immediately replaced the otters", "Nothing — kelp forests are not affected by sea urchin populations"], answer: 1, explain: "This is a classic trophic cascade. Without otters, urchin populations exploded and grazed kelp to bare rock — 'urchin barrens' replaced productive kelp forests. Reintroducing sea otters has restored kelp forests in some areas. Sea otters are a keystone species — their removal or restoration has disproportionate ecosystem-wide effects." }
        ]
      }
    },

    "Human Body": {
      lesson: {
        title: "Human Body: Eleven Systems Working as One",
        sections: [
          { heading: "Organization and Major Systems", body: "The human body is organized hierarchically: cells → tissues → organs → organ systems → organism. Four tissue types: epithelial (covers surfaces, lines cavities), connective (supports and connects — bone, cartilage, blood, fat), muscle (contracts — skeletal, cardiac, smooth), nervous (transmits electrical signals). The body's eleven major organ systems: skeletal, muscular, cardiovascular, respiratory, digestive, urinary, nervous, endocrine, immune, reproductive, and integumentary (skin). Each system performs specialized functions, but all are interdependent — failure of one affects all others. Homeostasis — maintaining stable internal conditions (temperature, pH, blood glucose, fluid balance) — is the body's overriding operational goal." },
          { heading: "Cardiovascular and Respiratory Systems", body: "The heart is a dual pump: the right side pumps deoxygenated blood to the lungs (pulmonary circulation); the left side pumps oxygenated blood to the body (systemic circulation). The heart beats 60-100 times per minute, pumping about 5 liters per minute at rest — up to 25 liters during intense exercise. Blood pressure (120/80 mmHg normal): systolic (heart contracting) over diastolic (heart relaxing). The respiratory system brings oxygen in and CO₂ out through 300-500 million alveoli providing 70-80 m² of gas exchange surface. Hemoglobin in red blood cells carries oxygen. The body uses about 250 mL of O₂ per minute at rest and up to 5,000 mL during peak exercise." },
          { heading: "Nervous and Endocrine Systems", body: "The nervous system provides rapid, precise communication via electrical signals. The central nervous system (brain and spinal cord) processes information; the peripheral nervous system (all other nerves) carries signals to and from the body. The somatic nervous system controls voluntary movement; the autonomic controls involuntary functions (heart rate, digestion, breathing). The sympathetic division (fight-or-flight) mobilizes the body for action; the parasympathetic (rest-and-digest) conserves energy. The endocrine system communicates more slowly via hormones secreted into the bloodstream. Insulin (pancreas) regulates blood glucose; cortisol (adrenal gland) manages stress; thyroid hormones regulate metabolism; sex hormones drive development and reproduction. Nervous system: milliseconds. Hormones: minutes to hours." },
          { heading: "Immune System and Homeostasis", body: "The immune system has two branches. Innate immunity: immediate, nonspecific — skin barrier, fever, inflammation, natural killer cells, phagocytes that engulf pathogens. Adaptive immunity: slower but specific — B cells produce antibodies targeting specific pathogens; T cells directly kill infected cells. Immunological memory means a second exposure to the same pathogen produces faster, stronger response — the basis of vaccination. Homeostasis is maintained by negative feedback loops: blood glucose rises → pancreas releases insulin → cells absorb glucose → blood glucose falls → insulin release stops. Body temperature: rises → sweat and vasodilation cool it → temperature falls → shivering and vasoconstriction warm it. These feedback loops regulate hundreds of variables simultaneously." }
        ],
        takeaways: [
          "Body organization: cells → tissues → organs → systems; four tissue types underpin all organs",
          "Heart pumps 5L/min at rest via pulmonary and systemic circuits; lungs provide 70-80 m² gas exchange surface",
          "Nervous system: millisecond electrical signals; endocrine: slower hormone signals — both maintain homeostasis",
          "Innate immunity is immediate and nonspecific; adaptive immunity is specific and produces immunological memory"
        ]
      },
      quiz: {
        questions: [
          { q: "What is the difference between systolic and diastolic blood pressure?", options: ["Systolic is arm pressure; diastolic is leg pressure", "Systolic is pressure when the heart contracts; diastolic is pressure when it relaxes between beats", "Systolic measures arterial pressure; diastolic measures venous pressure", "Systolic is measured at rest; diastolic during exercise"], answer: 1, explain: "Blood pressure 120/80 mmHg: 120 is systolic — the peak pressure as the left ventricle contracts and ejects blood into the aorta. 80 is diastolic — the baseline pressure while the heart refills. Both values matter: persistent high diastolic means the arterial walls are under constant elevated pressure even at rest." },
          { q: "How does vaccination create immunity without causing the disease?", options: ["Vaccines contain drugs that kill pathogens before they multiply", "Vaccines introduce antigens (weakened/killed pathogen or pieces of it) that trigger adaptive immune response and memory without full infection", "Vaccines strengthen the innate immune system generally", "Vaccines only work by reducing fever response"], answer: 1, explain: "Vaccines expose the adaptive immune system to pathogen antigens (proteins) without live infection. B cells and T cells respond, and memory cells form. On future exposure to the real pathogen, memory cells mount a rapid, strong response — eliminating the pathogen before disease develops. This is immunological memory applied preventively." },
          { q: "Blood glucose rises after a meal. Which negative feedback response corrects this?", options: ["The liver releases more glucose into the blood", "The pancreas releases glucagon to lower glucose", "The pancreas releases insulin, causing cells to absorb glucose, lowering blood glucose back to normal", "The kidneys filter excess glucose from blood"], answer: 2, explain: "Rising blood glucose triggers pancreatic beta cells to release insulin. Insulin signals muscle, fat, and liver cells to absorb and store glucose — lowering blood glucose back toward the set point (~90 mg/dL). When glucose drops too low, alpha cells release glucagon, which signals the liver to release stored glucose. This insulin-glucagon antagonism is a classic negative feedback homeostatic system." }
        ]
      }
    },

    "Microbiology": {
      lesson: {
        title: "Microbiology: The Invisible World That Runs Everything",
        sections: [
          { heading: "The Microbial World", body: "Microorganisms — bacteria, archaea, viruses, fungi, protozoa, and algae — are invisible to the naked eye but dominate life on Earth by almost every measure. Bacteria alone number approximately 10³⁰ on Earth — more than the number of stars in the observable universe. The human body contains roughly as many microbial cells as human cells, most living in the gut microbiome. Microbes drive global nutrient cycles — without nitrogen-fixing bacteria, soil nitrogen would be depleted within decades. Without decomposing microbes, dead organic matter would accumulate indefinitely. The oceans' photosynthetic cyanobacteria produce approximately 50% of Earth's oxygen." },
          { heading: "Bacteria: Structure and Diversity", body: "Bacteria are prokaryotes — no nucleus, no membrane-bound organelles. Cell walls of peptidoglycan: gram-positive bacteria have thick walls and stain purple with Gram stain; gram-negative bacteria have thin walls plus an outer membrane and stain pink. This distinction guides antibiotic selection. Shapes: cocci (spherical), bacilli (rod-shaped), spirilla (spiral). Reproduction by binary fission — one cell splits into two. Under ideal conditions, E. coli divides every 20 minutes — one cell becomes a billion in 10 hours. Bacteria can exchange DNA horizontally (plasmids) without reproduction, accelerating spread of antibiotic resistance genes across species. Bacterial metabolism is extraordinarily diverse — some thrive in boiling acidic springs, others in Antarctic ice." },
          { heading: "Viruses: Not Quite Alive", body: "Viruses are not cells — they are genetic information (DNA or RNA) enclosed in a protein coat (capsid), sometimes wrapped in a lipid envelope. They cannot reproduce, metabolize, or respond to stimuli independently. They are obligate intracellular parasites — they inject their genetic material into host cells and commandeer the cellular machinery to produce new viruses. HIV attacks CD4+ T cells — disabling the immune system. Influenza mutates rapidly (antigenic drift and shift) — why flu vaccines must be updated annually. Bacteriophages infect bacteria — explored as alternatives to antibiotics. Viruses are the most abundant biological entities on Earth, with an estimated 10³¹ in the oceans alone." },
          { heading: "Antibiotics, Resistance, and the Microbiome", body: "Antibiotics are compounds that kill or inhibit bacteria. Penicillin (discovered by Alexander Fleming 1928) blocks bacterial cell wall synthesis. Different classes target different bacterial processes: fluoroquinolones disrupt DNA replication, macrolides inhibit protein synthesis, rifamycins block RNA synthesis. Antibiotic resistance — bacteria evolving mechanisms to survive antibiotic exposure — is a growing crisis. Overuse and misuse in medicine and agriculture accelerate resistance evolution. MRSA (methicillin-resistant Staphylococcus aureus) and carbapenem-resistant Enterobacteriaceae are life-threatening examples. The gut microbiome — trillions of bacteria in the colon — influences digestion, immune function, mental health, and drug metabolism. Disrupting it with broad-spectrum antibiotics can allow dangerous organisms like Clostridioides difficile to take over." }
        ],
        takeaways: [
          "Microbes drive global nutrient cycles and produce 50% of Earth's oxygen — invisible but essential",
          "Gram stain distinguishes thick-walled (gram+) from thin-walled gram- bacteria — guides antibiotic selection",
          "Viruses are not cells — they are obligate intracellular parasites hijacking host cell machinery",
          "Antibiotic resistance is accelerating; gut microbiome disruption can cause dangerous secondary infections"
        ]
      },
      quiz: {
        questions: [
          { q: "Why does antibiotic resistance spread so rapidly among bacteria?", options: ["Bacteria deliberately evolve to survive antibiotics", "Bacteria can transfer resistance genes horizontally via plasmids — even between different species — without needing reproduction", "Antibiotics cause mutations that create resistance", "Resistant bacteria reproduce faster than susceptible ones"], answer: 1, explain: "Horizontal gene transfer via plasmids (small circular DNA) allows a resistant bacterium to share its resistance gene with millions of other bacteria — even different species — within hours. This is far faster than waiting for resistance mutations to arise spontaneously. A resistance gene that evolved in soil bacteria can end up in a human pathogen with no shared ancestry." },
          { q: "What makes viruses fundamentally different from bacteria?", options: ["Viruses are smaller", "Viruses are not cells and cannot reproduce, metabolize, or function independently — they require a host cell's machinery", "Viruses only infect humans; bacteria infect all organisms", "Viruses have a nucleus; bacteria do not"], answer: 1, explain: "Bacteria are living cells — they metabolize, reproduce independently, and respond to the environment. Viruses are not cells and meet none of the standard criteria for life independently. They are stripped-down genetic packages that can only replicate by hijacking a living cell's machinery. This is why antibiotics (which target bacterial cellular processes) have no effect on viruses." },
          { q: "Alexander Fleming discovered penicillin after observing that mold was killing bacteria on a petri dish. What mechanism does penicillin use?", options: ["It destroys bacterial DNA", "It punctures the bacterial cell membrane", "It blocks synthesis of bacterial cell walls, causing bacteria to burst", "It interferes with bacterial metabolism of oxygen"], answer: 2, explain: "Penicillin inhibits the enzyme that cross-links peptidoglycan strands in bacterial cell walls. Without a complete cell wall, the bacterium cannot withstand osmotic pressure — it takes on water and lyses (bursts). Human cells have no cell walls, so penicillin selectively targets bacteria without harming host cells — explaining its remarkable safety profile." }
        ]
      }
    },

    "Chemistry Basics": {
      lesson: {
        title: "Chemistry Basics: Matter, Atoms, and Reactions",
        sections: [
          { heading: "Atoms and the Periodic Table", body: "All matter is made of atoms — the smallest units of an element that retain its chemical properties. Atoms contain a nucleus of protons (positive charge, determines element identity) and neutrons (no charge, determines isotope), surrounded by electrons (negative charge, determines chemical behavior). The atomic number is the number of protons. Carbon always has 6 protons; oxygen always has 8. The periodic table organizes elements by atomic number into rows (periods) and columns (groups). Elements in the same group have similar chemical properties because they have the same number of outer (valence) electrons. Metals (left side): conduct electricity, malleable, lose electrons in reactions. Nonmetals (right side): poor conductors, gain electrons. Metalloids (diagonal): intermediate properties." },
          { heading: "Chemical Bonds", body: "Atoms bond to achieve stable electron configurations — typically a full outer shell of 8 electrons (octet rule). Ionic bonds: one atom transfers electrons to another, creating oppositely charged ions that attract. Sodium (Na) gives one electron to chlorine (Cl), forming Na⁺ and Cl⁻ — sodium chloride (table salt). Ionic compounds form crystals, dissolve in water, conduct electricity when dissolved. Covalent bonds: atoms share electrons. Nonmetals bond covalently — oxygen gas is O=O (double covalent bond sharing 4 electrons). Water (H₂O): each hydrogen shares one electron pair with oxygen. Polar covalent bonds: electrons shared unequally because atoms have different electronegativities — oxygen pulls electrons more strongly than hydrogen, making water molecules have partial charges." },
          { heading: "Chemical Reactions and Equations", body: "A chemical reaction breaks bonds in reactants and forms new bonds in products, rearranging atoms into new substances. The Law of Conservation of Mass: atoms are neither created nor destroyed — balanced equations must have the same number of each atom on both sides. Exothermic reactions release energy (combustion, explosions, most oxidation reactions). Endothermic reactions absorb energy (photosynthesis, cooking an egg, dissolving ammonium nitrate in water). Reaction rate depends on temperature (higher = faster, roughly doubling every 10°C), concentration, surface area, and catalysts (substances that speed reactions without being consumed). Acids donate protons (H⁺); bases accept protons. pH scale measures hydrogen ion concentration: pH 7 is neutral, below 7 is acidic, above 7 is basic." },
          { heading: "States of Matter and Phase Changes", body: "Matter exists as solid (fixed shape and volume, particles vibrate in place), liquid (fixed volume, takes container shape, particles flow), or gas (no fixed shape or volume, particles move freely). Plasma is a fourth state — ionized gas at extremely high temperatures. Phase changes require energy: melting (solid→liquid), vaporization (liquid→gas), and sublimation (solid→gas) all absorb energy. Freezing and condensation release energy. The energy absorbed during melting without temperature change is the latent heat of fusion — ice absorbs 334 kJ/kg melting at 0°C, which is why ice effectively cools drinks. Pressure affects phase transitions — water boils at lower temperatures at altitude (reduced pressure) and higher temperatures in a pressure cooker (elevated pressure)." }
        ],
        takeaways: [
          "Atomic number = proton count, defines the element; valence electrons determine chemical behavior",
          "Ionic bonds: electron transfer creates ions; covalent bonds: electron sharing between atoms",
          "Conservation of Mass: atoms rearrange in reactions but are never created or destroyed",
          "pH below 7 = acidic; above 7 = basic; phase changes absorb or release energy at constant temperature"
        ]
      },
      quiz: {
        questions: [
          { q: "An element has atomic number 17. How many protons does it have, and what element is it?", options: ["8 protons — oxygen", "17 protons — chlorine", "17 protons — sodium", "35 protons — bromine"], answer: 1, explain: "Atomic number = number of protons, always. Element 17 is chlorine (Cl). Chlorine has 7 valence electrons — one short of a full outer shell — making it highly reactive, readily accepting one electron to form Cl⁻. This reactivity is why chlorine disinfects water and why fluorine (element 9, same group) is even more reactive." },
          { q: "Why does water (H₂O) have unusual properties like high surface tension and a high boiling point for its molecular size?", options: ["Water molecules are unusually large", "Polar covalent bonds create partial charges, enabling hydrogen bonds between water molecules", "Water contains ionic bonds between H and O", "Water's properties come from dissolved minerals"], answer: 1, explain: "Oxygen's higher electronegativity pulls electron density away from hydrogen, creating a partial negative charge on O and partial positive on H. These polar molecules form hydrogen bonds between neighboring water molecules — much stronger than typical intermolecular forces. Hydrogen bonds give water its high boiling point, surface tension, and ability to dissolve many substances — properties essential for life." },
          { q: "A reaction releases heat to its surroundings. What type of reaction is this?", options: ["Endothermic — it absorbs energy", "Exothermic — it releases energy", "A phase change — it stores energy as latent heat", "A nuclear reaction — chemical reactions cannot release heat"], answer: 1, explain: "Exothermic reactions release energy — the products have lower chemical potential energy than the reactants, and the difference is released as heat (and sometimes light). Combustion, respiration, neutralization, and most oxidation reactions are exothermic. Endothermic reactions absorb energy from surroundings — the system feels cold to the touch (like dissolving ammonium nitrate in water, used in instant cold packs)." }
        ]
      }
    },

    "Neuroscience": {
      lesson: {
        title: "Neuroscience: How the Brain Creates Mind and Behavior",
        sections: [
          { heading: "Neurons and Neural Communication", body: "The nervous system's functional unit is the neuron — a specialized cell with dendrites (receive signals), a cell body (processes signals), and an axon (transmits signals to the next neuron). The brain contains approximately 86 billion neurons, each connected to thousands of others — roughly 100 trillion synaptic connections total. Electrical signals (action potentials) travel along axons when the membrane's electrical potential crosses a threshold: the all-or-nothing principle — a neuron fires fully or not at all. Signals cross the synaptic gap between neurons chemically: the presynaptic neuron releases neurotransmitters into the synapse; they bind to receptors on the postsynaptic neuron, either exciting or inhibiting it. Signal speed varies: unmyelinated fibers 0.5-2 m/s; myelinated fibers 70-120 m/s." },
          { heading: "Brain Structure and Function", body: "The brain has three major divisions. Brainstem (oldest evolutionarily): controls vital automatic functions — breathing, heart rate, blood pressure, sleep-wake cycles. Cerebellum: coordinates movement, balance, and fine motor skills — damage causes ataxia (uncoordinated movement). Cerebrum (largest, most human): the wrinkled outer cortex handles higher functions. Lobes: frontal (executive function, decision-making, personality, motor control), parietal (sensory processing, spatial awareness), occipital (visual processing), temporal (hearing, language, memory). The limbic system — hippocampus, amygdala, hypothalamus — handles emotion, memory formation, and drives. The left hemisphere typically handles language and logic; the right handles spatial processing and creativity — though this lateralization is less absolute than popular culture suggests." },
          { heading: "Neuroplasticity and Learning", body: "Neuroplasticity is the brain's ability to reorganize itself by forming new neural connections throughout life. Hebb's rule: 'neurons that fire together wire together' — repeated activation of the same neural pathway strengthens the synaptic connections. This is the cellular basis of learning and memory. Long-term potentiation (LTP) is the molecular process: repeated stimulation increases the sensitivity and number of receptors at synapses, making the connection easier to activate. Exercise, sleep, and novelty promote neuroplasticity; chronic stress, alcohol, and sleep deprivation impair it. The brain retains some plasticity throughout life but is most plastic during childhood — explaining why language acquisition is easiest before age 12." },
          { heading: "Neurotransmitters and Mental Health", body: "Neurotransmitters are the brain's chemical messengers. Dopamine: reward, motivation, motor control (depleted in Parkinson's disease; dysregulated in addiction and schizophrenia). Serotonin: mood, appetite, sleep (targeted by SSRIs in treating depression). Norepinephrine: arousal, attention, fight-or-flight (involved in ADHD and PTSD). GABA: the brain's primary inhibitory neurotransmitter — reduces neural activity (alcohol enhances GABA, causing sedation; benzodiazepines do the same therapeutically). Glutamate: the primary excitatory neurotransmitter — drives learning and memory but excess causes excitotoxicity (cell death after stroke). Most psychiatric drugs work by modifying neurotransmitter levels or receptor sensitivity — either enhancing or blocking specific chemical signals." }
        ],
        takeaways: [
          "Neurons fire via action potentials (all-or-nothing); signals cross synapses via neurotransmitter chemicals",
          "Brain lobes: frontal (decisions/motor), parietal (sensory), occipital (vision), temporal (hearing/language)",
          "Neuroplasticity: repeated activation strengthens connections — the cellular basis of all learning and memory",
          "Dopamine drives reward; serotonin regulates mood; GABA inhibits activity; glutamate excites — targets of most psychiatric drugs"
        ]
      },
      quiz: {
        questions: [
          { q: "What is the 'all-or-nothing principle' of neural firing?", options: ["Neurons either receive all inputs or none", "A neuron fires at full strength once threshold is reached — there is no partial firing", "Neurons either grow or die — no intermediate states", "The brain is either fully conscious or fully unconscious"], answer: 1, explain: "Once a neuron's membrane potential reaches the action potential threshold (approximately -55mV), it fires a full-strength signal regardless of how much the threshold was exceeded. A signal just over threshold produces the same action potential as one far over threshold. The 'graded' information is encoded in firing rate (how many action potentials per second), not individual signal size." },
          { q: "A patient has damage to the hippocampus. What function is most likely impaired?", options: ["Vision", "Formation of new long-term memories", "Control of heart rate and breathing", "Fine motor coordination"], answer: 1, explain: "The hippocampus is critical for consolidating short-term memories into long-term memories. The famous patient H.M., who had both hippocampi removed to treat epilepsy, could not form any new long-term memories for the rest of his life — meeting the same person repeatedly while never recognizing them. Old memories and skills were intact. Heart rate is brainstem; coordination is cerebellum." },
          { q: "SSRIs (selective serotonin reuptake inhibitors) treat depression by:", options: ["Increasing dopamine production in the reward pathway", "Blocking reuptake of serotonin, increasing its availability in synapses", "Stimulating the growth of new neurons in the hippocampus", "Blocking GABA receptors to increase neural activity"], answer: 1, explain: "After a neuron releases serotonin into the synapse, it normally reabsorbs ('reuptakes') excess serotonin to recycle it. SSRIs block this reuptake transporter, leaving more serotonin available in the synapse to bind receptors. This increases serotonergic signaling. Low synaptic serotonin is associated with depression — SSRIs correct this without the side effects of earlier antidepressants." }
        ]
      }
    }
  }, // end science
