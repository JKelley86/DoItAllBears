          { heading: "What Is the EM Spectrum?", body: "The electromagnetic spectrum is the complete range of electromagnetic radiation ordered by frequency (or wavelength). All EM waves travel at c = 3 × 10⁸ m/s in vacuum and are transverse waves of oscillating electric and magnetic fields requiring no medium. From lowest to highest frequency: radio waves, microwaves, infrared, visible light, ultraviolet, X-rays, gamma rays. Higher frequency means shorter wavelength and higher photon energy. The relationship: c = f × λ, where f is frequency and λ is wavelength." },
          { heading: "Low-Frequency End: Radio to Infrared", body: "Radio waves (kHz-GHz) carry communications — AM/FM radio, WiFi, Bluetooth, cellular, radar. Wavelengths from kilometers to centimeters. Microwaves (GHz) heat food via molecular rotation of water, and enable radar, satellite communications, and WiFi. Infrared (IR) radiation is thermal radiation — all objects above absolute zero emit IR proportional to their temperature. Thermal cameras detect IR emissions to find heat sources — used for electrical panel hot spot detection, building energy audits, and predictive maintenance on rotating machinery." },
          { heading: "Visible and UV: The Middle Range", body: "Visible light occupies a tiny band from ~400nm (violet) to ~700nm (red) — the range human eyes evolved to detect because it matches peak solar output. Ultraviolet (UV, 10-400nm) carries enough energy to damage DNA and cause sunburn. Industrial UV applications: UV curing of adhesives and coatings (photoinitiators harden on UV exposure), UV sterilization of water and air, UV leak detection (fluorescent dye visible under UV), and spectroscopic material analysis. UV-C (100-280nm) is germicidal and used in hospital air treatment systems." },
          { heading: "High-Frequency End: X-Rays and Gamma Rays", body: "X-rays (0.01-10nm wavelength) penetrate soft tissue but are absorbed by dense materials — enabling medical and industrial radiography. Industrial X-ray and gamma-ray radiography inspects welds, castings, and structures for internal defects without disassembly. Gamma rays originate from nuclear decay — higher energy than X-rays, more penetrating. Both are ionizing radiation: high enough photon energy to eject electrons from atoms and damage biological tissue. Exposure is controlled by time, distance (intensity follows inverse-square law), and shielding (lead and dense concrete for X-ray and gamma)." }
        ],
        takeaways: [
          "EM spectrum from low to high frequency: radio, microwave, infrared, visible, UV, X-ray, gamma",
          "c = f × λ — all EM waves travel at 3 × 10⁸ m/s; higher frequency means shorter wavelength",
          "IR cameras detect thermal emissions — used for electrical hot-spot and machinery fault detection",
          "X-ray and gamma radiation are ionizing — control exposure with time, distance, and shielding"
        ]
      },
      quiz: {
        questions: [
          { q: "An infrared thermal camera shows a bright spot on an electrical panel. What does this indicate?", options: ["A cold connection drawing no current", "A high-resistance connection generating excess heat — a potential fire hazard", "Normal operating temperature", "A ground fault"], answer: 1, explain: "A hot spot in an electrical panel indicates a high-resistance connection — loose terminal, corroded contact, or undersized conductor. Excess resistance = excess heat (P = I²R). Thermal imaging finds these faults before they cause fires or failures, making it a standard predictive maintenance tool." },
          { q: "A UV lamp is used to inspect a weld for leaks using fluorescent dye. Which UV band is typically used?", options: ["UV-C (germicidal, 200-280nm)", "UV-A (365nm, near visible, 'black light')", "X-ray wavelengths", "Infrared adjacent to UV"], answer: 1, explain: "UV-A (315-400nm, peak ~365nm) is the 'black light' range used in fluorescent dye penetrant inspection (FPI). The fluorescent dye absorbs UV-A and emits visible light, making cracks visible in darkness. UV-C is used for sterilization, not inspection — and it's more hazardous to skin and eyes." },
          { q: "Why does doubling the distance from an X-ray source reduce radiation intensity to one-quarter?", options: ["X-rays decay over distance", "Radiation follows the inverse-square law — intensity is proportional to 1/r²", "Air absorbs half the radiation per meter", "X-ray machines lose power over longer distances"], answer: 1, explain: "Radiation spreads spherically. The same total energy spreads over a surface area proportional to r². Doubling distance means 4× the surface area, so intensity (power per area) drops to 1/4. This is the inverse-square law — the primary reason distance is the cheapest and most effective radiation protection." }
        ]
      }

    "Resonance": {
      lesson: {
        title: "Resonance: When Frequency Matches and Energy Builds",
        sections: [
          { heading: "What Is Resonance?", body: "Every physical system has one or more natural frequencies at which it vibrates when disturbed. When an external driving force matches a natural frequency, the system is in resonance — each energy input adds to the existing vibration rather than being absorbed. Amplitude builds until it is limited by damping or structural failure. A child pumping a swing at exactly its natural frequency builds large oscillations with small inputs. The same principle destroyed the Tacoma Narrows Bridge in 1940 when wind-induced vortices matched the bridge's torsional natural frequency." },
          { heading: "Natural Frequency", body: "For a simple spring-mass system: natural frequency f_n = (1/2π) × √(k/m), where k is stiffness and m is mass. Higher stiffness = higher natural frequency. Higher mass = lower natural frequency. For a cantilever beam, natural frequency depends on beam stiffness and the ratio of beam mass to tip mass. These calculations identify frequencies to avoid in machine design — if a rotating component runs at a speed matching a structural natural frequency, destructive resonance occurs. This is the basis of critical speed analysis for rotating shafts." },
          { heading: "Damping", body: "Damping dissipates vibration energy, converting it to heat. Without damping, resonance builds without limit until failure. With high damping, resonance amplitude is controlled. Damping ratio ζ (zeta) describes how quickly oscillations decay. Underdamped (ζ < 1): oscillates with decreasing amplitude. Critically damped (ζ = 1): returns to rest in minimum time without oscillating. Overdamped (ζ > 1): returns slowly without oscillating. Shock absorbers are designed for slight underdamping to give both good control and reasonable comfort. Rubber isolation mounts add damping to reduce resonant peaks in machinery." },
          { heading: "Resonance in Industry", body: "Rotating machinery must avoid operating at or near critical speeds — shaft rotation speeds at which the rotational frequency matches a structural natural frequency. Turbochargers, pumps, and motors operating through their critical speed must pass through it quickly during startup, not linger there. Vibration analysis identifies natural frequencies through impact testing or operating data. Piping systems can resonate with pump pulsations — catastrophic piping failures have been caused by acoustic resonance in long piping runs. Tuned mass dampers (weighted pendulums) in tall buildings counteract wind-induced building resonance." }
        ],
        takeaways: [
          "Resonance occurs when driving frequency matches natural frequency — amplitude builds until limited by damping or failure",
          "Natural frequency f_n = (1/2π)√(k/m) — stiffer means higher, heavier means lower",

          { q: "Stiffening a beam (increasing k) while keeping mass constant does what to its natural frequency?", options: ["Lowers it", "Raises it", "Has no effect", "Doubles it regardless of how much k increases"], answer: 1, explain: "f_n = (1/2π)√(k/m). Increasing k increases the value under the square root, raising f_n. This is a design tool — if a structure resonates at a troublesome frequency, stiffening it raises the natural frequency away from the excitation. Alternatively, adding mass lowers the natural frequency." },
          { q: "The Tacoma Narrows Bridge collapsed due to resonance. What was the energy source that drove the oscillation?", options: ["Heavy truck traffic on the bridge", "Wind-induced aerodynamic vortices matching the bridge's torsional natural frequency", "Thermal expansion and contraction cycles", "Seismic activity in the ground"], answer: 1, explain: "The bridge's deck shape caused wind to shed vortices alternately above and below at a frequency matching the bridge's torsional natural frequency. Each vortex added a small twist — resonance built the amplitude over hours until the bridge tore itself apart. It is the most famous engineering resonance failure in history." }
        ]

          { heading: "Feudalism and the Social Order", body: "Medieval society operated under feudalism — a hierarchical system of land grants in exchange for military service and loyalty. The king granted land (fiefs) to nobles (lords), who granted portions to knights, who provided military service. Peasants (serfs) worked the land in exchange for protection, bound to the land and unable to leave without permission. This system provided local security in an era without strong central states but created rigid social stratification. The manor — a lord's estate — was the basic economic unit, largely self-sufficient. By the High Middle Ages (1000-1300), a growing merchant class and expanding trade were already eroding pure feudalism from below." },

        sections: [
          { heading: "What Was the Scientific Revolution?", body: "The Scientific Revolution (roughly 1543-1687) was the emergence of modern science as a methodology — a shift from accepting ancient authority (especially Aristotle) to testing ideas against observation and experiment. Before it, educated Europeans largely accepted Aristotle's physics (which were mostly wrong) and Ptolemy's geocentric astronomy. After it, science was established as a self-correcting process: form hypotheses, test them, revise based on results. This was arguably the most consequential intellectual transformation in human history, eventually producing the technology of the modern world." },
          { heading: "Copernicus, Galileo, and the Heliocentric Revolution", body: "Nicolaus Copernicus published his heliocentric model (Sun at center) in 1543, the same year he died — having sat on the work for decades fearing Church reaction. Galileo Galilei (1564-1642) used his telescope (1609) to observe Jupiter's moons, Venus's phases, and lunar craters — all contradicting geocentric models. His mechanics work established that falling objects accelerate uniformly regardless of mass (contradicting Aristotle) and invented the concept of inertia. Galileo was tried by the Inquisition in 1633 and forced to recant heliocentrism, spending his last years under house arrest — illustrating the conflict between emerging science and religious authority." },
          { heading: "Kepler, Newton, and the Laws of Nature", body: "Johannes Kepler (1571-1630) analyzed Tycho Brahe's precise astronomical data and discovered that planets move in ellipses (not circles), with mathematical laws governing their speeds. Isaac Newton (1643-1727) synthesized everything: his Principia Mathematica (1687) presented the laws of motion and universal gravitation, showing that the same force causing apples to fall governed planetary orbits. Newton invented calculus (simultaneously with Leibniz) to solve the problems. His framework could predict planetary positions, tides, and projectile motion with unprecedented accuracy — demonstrating that nature operates by mathematical laws accessible to human reason." },
          { heading: "Francis Bacon and the Scientific Method", body: "Francis Bacon (1561-1626) articulated the inductive scientific method: accumulate observations, identify patterns, form general principles, then test them. This was a direct challenge to deductive reasoning from first principles (stating what must be true from axioms) that characterized ancient and medieval thought. René Descartes (1596-1650) contributed the framework of systematic doubt — question everything that cannot be demonstrated. Together they established that knowledge must be earned through evidence, not inherited from authority. By 1660, the Royal Society of London was founded for experimental natural philosophy — institutionalizing science as a collaborative, cumulative, self-correcting enterprise." }

      quiz: {
        questions: [
          { q: "What specific astronomical observations did Galileo make that contradicted the geocentric model?", options: ["He observed the Sun was much larger than Earth", "He observed Jupiter's moons, Venus's phases, and lunar craters — showing not everything orbited Earth", "He measured the distance to the nearest stars", "He discovered that stars were other suns"], answer: 1, explain: "Jupiter's four large moons (now called Galilean moons) clearly orbited Jupiter, not Earth — proving not everything in the sky circled Earth. Venus showed a full cycle of phases like the Moon, only possible if it orbited the Sun inside Earth's orbit. These directly falsified the Ptolemaic geocentric model." },
          { q: "What made Newton's Principia Mathematica so revolutionary?", options: ["It described atoms for the first time", "It unified terrestrial and celestial motion under the same mathematical laws of gravity", "It proved the heliocentric model using a telescope", "It invented the scientific method"], answer: 1, explain: "Before Newton, separate explanations were needed for why objects fall on Earth and why planets orbit the Sun. Newton showed a single mathematical law (F = Gm1m2/r²) explained both. The same gravity pulling an apple downward kept the Moon in orbit. This unified mathematical description of nature was genuinely unprecedented." },
          { q: "Why was Francis Bacon's inductive method a departure from medieval intellectual tradition?", options: ["He rejected mathematics entirely", "Medieval thought deduced conclusions from accepted authorities; Bacon argued knowledge must come from accumulated observations", "He believed the Church should control science", "He rejected Aristotle's logic completely"], answer: 1, explain: "Medieval scholars largely deduced conclusions by reasoning from accepted texts (Aristotle, Scripture). If Aristotle said heavy objects fall faster, that was accepted without testing. Bacon insisted on gathering actual observations first, then inferring general principles. This reversed the direction of reasoning and made empirical testing the foundation of knowledge." }
        ]
      }
    },

    "Cold War": {
      lesson: {
        title: "The Cold War: Superpower Rivalry Without Direct Combat",
        sections: [
          { heading: "Origins and Division of Europe (1945-1950)", body: "The Cold War began immediately after WWII as the wartime alliance between the US and Soviet Union fractured over Europe's future. The USSR occupied Eastern Europe and installed communist governments; the US and Western allies established democratic governments in Western Europe. Churchill's 1946 speech described an 'iron curtain' dividing the continent. The Truman Doctrine (1947) committed the US to containing Soviet expansion. The Marshall Plan (1948) invested $13 billion to rebuild Western Europe economically — both preventing communist appeal to desperate populations and binding Western Europe to American economic interests. Germany was divided, and Berlin — deep inside Soviet-controlled East Germany — became a flashpoint." },
          { heading: "Nuclear Arms Race and Mutual Assured Destruction", body: "The Soviet Union tested its first atomic bomb in 1949, years ahead of American estimates. Both superpowers rapidly expanded nuclear arsenals. The hydrogen bomb (1952-53) was a thousand times more powerful than the Hiroshima bomb. By the 1960s, both sides had enough nuclear warheads to destroy civilization multiple times over. Mutual Assured Destruction (MAD) emerged as doctrine: any nuclear first strike would guarantee devastating retaliation, so neither side could rationally strike first. This balance of terror was both stabilizing (preventing direct war) and terrifying (the world was always hours from annihilation). The Cuban Missile Crisis (1962) brought the world to the closest it came to nuclear war." },
          { heading: "Proxy Wars and the Space Race", body: "Unable to fight each other directly (nuclear deterrence), the superpowers fought through proxy conflicts. Korea (1950-1953) ended in stalemate at enormous cost. Vietnam (1955-1975) ended in American withdrawal and communist reunification — a profound blow to US prestige and military confidence. The Soviet Union supported independence movements and communist insurgencies across Africa, Asia, and Latin America; the CIA supported right-wing governments and coups. The Space Race was a technological competition with propaganda value: Sputnik (1957), the first satellite, shocked Americans. Yuri Gagarin became the first human in space (1961). The US answered with Apollo 11, landing Neil Armstrong on the Moon on July 20, 1969." },
          { heading: "Détente, Collapse, and Legacy (1970-1991)", body: "The 1970s brought détente — reduced tensions through diplomacy. Nixon's 1972 visit to China was a strategic masterstroke, splitting the communist bloc. SALT treaties limited nuclear arsenals. But Reagan's presidency (1981-1989) escalated competition with massive defense spending, including the Strategic Defense Initiative ('Star Wars'). The Soviet economy struggled to keep up. Mikhail Gorbachev's reforms (glasnost and perestroika) intended to modernize the USSR instead unleashed forces it couldn't control. The Berlin Wall fell November 9, 1989, as East Germans streamed through. By December 25, 1991, the Soviet Union had dissolved into 15 independent states. The Cold War ended not with a bang but with an economic and political collapse." }
        ],
        takeaways: [
          "The Cold War was an ideological and geopolitical rivalry between the US and USSR from 1947-1991",
          "Nuclear MAD doctrine prevented direct superpower war but kept the world perpetually close to annihilation",
          "Proxy wars in Korea, Vietnam, and elsewhere were the Cold War fought at arm's length",
          "The Soviet Union collapsed in 1991 from economic strain and internal reform — not military defeat"
        ]
      },
      quiz: {
        questions: [
          { q: "What was Mutual Assured Destruction (MAD) and why did it prevent direct US-Soviet war?", options: ["A treaty limiting nuclear weapons", "The doctrine that any nuclear first strike guarantees devastating retaliation, making nuclear war irrational for both sides", "A US military strategy for winning a nuclear exchange", "The UN policy for nuclear disarmament"], answer: 1, explain: "With both superpowers having thousands of nuclear warheads and reliable second-strike capability (submarines, dispersed missiles), no first strike could prevent devastating retaliation. Since both sides would be destroyed, neither could rationally start a nuclear war. This 'balance of terror' held for 45 years — the nuclear peace was preserved by mutual fear of annihilation." },
          { q: "Why was the Soviet Union's 1957 Sputnik launch so alarming to Americans?", options: ["It carried nuclear warheads", "It demonstrated the USSR could put objects in orbit — meaning missiles could reach American cities", "It was the first manned spaceflight", "It proved Soviet radar could track American aircraft"], answer: 1, explain: "A satellite in orbit requires the same rocket technology as an intercontinental ballistic missile. Sputnik proved the Soviets had the technology to reach any point on Earth with a nuclear warhead. The psychological impact was enormous — driving massive US investment in science education, NASA, and military technology." },
          { q: "What ultimately caused the Soviet Union to collapse in 1991?", options: ["Military defeat by the United States", "A coup by communist hardliners", "Economic stagnation, the strain of military competition, and political reform unleashing uncontrollable pressures", "A natural disaster affecting Soviet agricultural output"], answer: 2, explain: "The Soviet economy stagnated under central planning while military spending consumed enormous resources. Gorbachev's reforms (glasnost — openness; perestroika — restructuring) were intended to modernize the USSR, but glasnost allowed public criticism and perestroika disrupted the command economy. Nationalist movements in Soviet republics and Eastern Europe accelerated, and the USSR fragmented into 15 states by December 1991." }
        ]
      }
    },

    "Ancient Rome": {
      lesson: {
        title: "Ancient Rome: From City-State to Empire",
        sections: [
          { heading: "The Roman Republic (509-27 BCE)", body: "According to Roman tradition, the Republic was founded in 509 BCE after the last king was expelled. Rome developed a sophisticated system of government: two annually elected consuls sharing executive power, the Senate of elite patricians guiding policy, and assemblies giving plebeians (common citizens) increasing voice through centuries of class struggle. Rome conquered the Italian peninsula through a combination of military superiority and incorporation — conquered peoples often received citizenship rights, making them stakeholders in Rome's success. The Punic Wars against Carthage (264-146 BCE) established Rome as Mediterranean's dominant power, culminating in Carthage's total destruction." },
          { heading: "Julius Caesar and the Republic's Fall", body: "The late Republic was torn by civil wars between powerful generals whose legions were loyal to them personally rather than to the state. Gaius Julius Caesar (100-44 BCE) conquered Gaul (modern France) in eight years (58-50 BCE), making his legions wealthy and devoted. When ordered to disband his army, he crossed the Rubicon river into Italy in 49 BCE — a declaration of civil war. He won, declared himself dictator perpetuo (dictator in perpetuity), and began reforming Rome before being assassinated on the Ides of March (March 15), 44 BCE by senators fearing monarchy. His assassination triggered another round of civil wars, ultimately ending the Republic." },
          { heading: "The Roman Empire (27 BCE - 476 CE)", body: "Caesar's adopted heir Octavian defeated rivals Mark Antony and Cleopatra at the Battle of Actium (31 BCE) and became Augustus Caesar, Rome's first emperor, in 27 BCE. The Pax Romana (Roman Peace, 27 BCE - 180 CE) was a period of relative stability and prosperity across an empire of 70 million people. Roman infrastructure was extraordinary: 80,000 km of roads, aqueducts supplying cities with clean water, concrete construction techniques, and uniform law from Britain to Mesopotamia. At its peak under Trajan (98-117 CE), the empire stretched from Scotland to Iraq. Roman law, Latin language, Christianity (legalized 313 CE, state religion 380 CE), and engineering techniques all profoundly shaped the civilizations that followed." },
          { heading: "Decline and Fall", body: "Rome's decline had multiple causes: military overextension, reliance on foreign mercenary soldiers with weaker loyalty, currency debasement causing inflation, plague, political instability (in the Crisis of the Third Century, 235-284 CE, there were 26 emperors in 50 years), and mounting pressure from Germanic tribes. Emperor Diocletian divided the empire in 285 CE; Constantine moved the capital east to Constantinople in 330 CE. The Western Empire suffered repeated Germanic invasions and in 410 CE Rome itself was sacked by Visigoths for the first time in 800 years — a psychological catastrophe. The last Western Roman Emperor was deposed in 476 CE. The Eastern Empire (Byzantine) continued until 1453 CE, over 1,000 years longer." }
        ],
        takeaways: [
          "The Roman Republic (509-27 BCE) developed checks and balances, annual elections, and incorporated conquered peoples",
          "Julius Caesar's crossing the Rubicon (49 BCE) and assassination (44 BCE) ended the Republic",
          "The Pax Romana (27 BCE-180 CE) brought 200 years of stability to 70 million people across a vast empire",
          "Rome's fall (476 CE) had multiple causes: overextension, weak military loyalty, inflation, and Germanic invasions"
        ]
      },
      quiz: {
        questions: [
          { q: "Why did Rome's practice of extending citizenship to conquered peoples strengthen its empire?", options: ["It reduced the number of enemies Rome had to fight", "Conquered peoples became stakeholders in Rome's success, providing loyal soldiers and taxpayers rather than permanent rebels", "It was required by Roman religious law", "It reduced administrative costs"], answer: 1, explain: "Unlike most ancient empires that ruled conquered peoples as subjects, Rome often extended Latin rights or full citizenship. This gave conquered peoples a stake in Rome's survival — their prosperity was tied to Rome's. This created a snowball effect of loyal incorporation rather than perpetual occupation. Roman allies often fought harder than conscripts because they shared in the benefits of Roman victories." },
          { q: "What made Julius Caesar's crossing of the Rubicon in 49 BCE significant?", options: ["It was the first time a Roman general used cavalry effectively", "Roman law forbade armed commanders from entering Italy — crossing was an act of war against the Roman state", "The Rubicon was the border between Rome and Gaul", "It was the deepest river crossing attempted by a Roman army"], answer: 1, explain: "Roman law explicitly prohibited generals from bringing armed forces south of the Rubicon river into the Italian heartland — designed to prevent military coups. When Caesar crossed with his army, he was declaring war on the Roman Senate and Republic. The phrase 'crossing the Rubicon' entered the language as a metaphor for making an irrevocable, decisive commitment." },
          { q: "When did the Eastern Roman (Byzantine) Empire fall, and what does this reveal about Rome's legacy?", options: ["476 CE, same as the Western Empire", "800 CE when Charlemagne was crowned", "1066 CE with the Norman Conquest", "1453 CE, nearly a thousand years after the Western Empire fell"], answer: 3, explain: "The Eastern Roman Empire, with its capital at Constantinople (modern Istanbul), survived until 1453 CE when it fell to Ottoman Turks. This means Roman imperial government continued in an unbroken line for nearly 2,000 years from 27 BCE. 'Byzantine' is a modern historian's term — they called themselves Romans until the end." }
        ]
      }
    },

    "The Renaissance": {
      lesson: {
        title: "The Renaissance: Rebirth of Human Potential",
        sections: [
          { heading: "What Was the Renaissance?", body: "The Renaissance (French for 'rebirth') was a cultural and intellectual movement beginning in Italian city-states around 1350 and spreading through Europe until roughly 1600. It represented a rediscovery and celebration of classical Greek and Roman art, literature, and philosophy — combined with new humanist ideas placing human beings and their potential at the center of intellectual life rather than God's plan alone. This was not a rejection of Christianity but a broadening of what intellectual life could include. The fall of Constantinople (1453) brought Greek scholars and manuscripts to Italy, accelerating the movement." },
          { heading: "Italian City-States and Patronage", body: "The Renaissance began in wealthy Italian city-states — Florence, Venice, Milan, Rome — because they had the wealth, the merchant class, and the exposure to classical ruins and manuscripts. Florence under the Medici banking family became the epicenter. Lorenzo de' Medici (1449-1492) spent lavishly on artists, architects, and scholars — not merely for piety but for prestige and civic glory. This patronage system funded Leonardo da Vinci, Michelangelo, Botticelli, and Donatello among others. Wealthy patrons competed for association with the greatest artists, driving an extraordinary concentration of talent and production in a small geographic area over roughly 150 years." },
          { heading: "Art, Science, and the Polymath Ideal", body: "Renaissance art developed linear perspective — the mathematical technique for depicting three-dimensional space on a flat surface, pioneered by Filippo Brunelleschi around 1420. Painters and sculptors studied human anatomy by dissecting corpses to depict the body accurately — a radical empiricism for the era. Leonardo da Vinci (1452-1519) embodied the Renaissance ideal of the 'universal man': painter (Mona Lisa, Last Supper), sculptor, architect, engineer, anatomist, mathematician, musician, and inventor. His notebooks contain designs for flying machines, tanks, solar power, and hydraulic machines centuries before their realization. Michelangelo (1475-1564) produced the Sistine Chapel ceiling, the statue of David, and designed the dome of St. Peter's Basilica." },
          { heading: "The Printing Press and Spread of Ideas", body: "Johannes Gutenberg's movable type printing press (c. 1440) was the Renaissance's most transformative technology. Before printing, books were laboriously hand-copied by monks — expensive, slow, and controlled by the Church. Gutenberg's press could produce 3,600 pages per day versus a scribe's few pages. By 1500, over 20 million printed books existed in Europe. This democratized information: humanist ideas, scientific discoveries, and eventually Martin Luther's 95 Theses (1517) spread faster than authorities could suppress them. The Protestant Reformation, the Scientific Revolution, and eventually the Enlightenment all depended on the printing press to spread ideas beyond scholarly elites to broader literate populations." }
        ],
        takeaways: [
          "The Renaissance (1350-1600) revived classical learning and placed human potential at the center of intellectual life",
          "Medici patronage in Florence concentrated an extraordinary generation of artists and thinkers",
          "Linear perspective and anatomical study transformed art; Leonardo embodied the 'universal man' ideal",
          "Gutenberg's printing press (c. 1440) democratized information and enabled the Reformation and Scientific Revolution"
        ]
      },
      quiz: {
        questions: [
          { q: "Why did the Renaissance begin in Italian city-states rather than elsewhere in Europe?", options: ["Italy had the best climate for creative work", "Italian city-states had wealth from trade, merchant classes with disposable income, proximity to classical ruins, and access to Greek manuscripts", "The Pope commanded Italian artists to revive classical styles", "Italy was the only region unaffected by the Black Death"], answer: 1, explain: "Conditions aligned in Italian cities: Mediterranean trade created wealthy merchant families with money to spend on prestige projects; classical Roman ruins were literally everywhere; the fall of Constantinople (1453) brought Greek scholars with manuscripts; and a competitive culture among city-states made artistic patronage a tool of civic rivalry." },
          { q: "What was the significance of Gutenberg's printing press for the spread of Renaissance ideas?", options: ["It made books waterproof for the first time", "It reduced book production costs dramatically, making ideas accessible beyond Church-controlled manuscripts", "It allowed color printing of religious artwork", "It was primarily used for maps and navigation"], answer: 1, explain: "Before the press, books cost roughly as much as a house and were mostly owned by monasteries and universities under Church influence. The press reduced costs 300-fold and increased production dramatically. Within decades, humanist texts, scientific works, and controversial religious ideas spread faster than any authority could suppress — directly enabling the Protestant Reformation." },
          { q: "Leonardo da Vinci's notebooks contained designs for inventions centuries ahead of their time. What does this reveal about Renaissance thinking?", options: ["Renaissance thinkers rejected practical applications of knowledge", "The Renaissance's cross-disciplinary empirical approach — observing nature, testing ideas — generated insights that transcended the era's technology to realize", "Leonardo secretly had access to future technology", "Most Renaissance thinkers had similar prophetic abilities"], answer: 1, explain: "Leonardo's approach — exhaustive observation of nature, anatomical dissection, mathematical analysis of mechanics — was the same methodology that would become modern science. His flying machine designs correctly identified wing principles; his hydraulic pump designs work. The ideas were sound; the materials and manufacturing precision were not yet available. This empirical cross-disciplinary thinking was the Renaissance's most enduring contribution." }
        ]
      }
    }
  }, // end history

    "Design": { lesson: { title: "Design", sections: [{ heading: "Coming Soon", body: "Add your lesson." }], takeaways: ["Takeaway"] }, quiz: { questions: [{ q: "Question?", options: ["A","B","C","D"], answer: 0, explain: "Explanation." }] } },
    "Philosophy of Art": { lesson: { title: "Philosophy of Art", sections: [{ heading: "Coming Soon", body: "Add your lesson." }], takeaways: ["Takeaway"] }, quiz: { questions: [{ q: "Question?", options: ["A","B","C","D"], answer: 0, explain: "Explanation." }] } }

}; // end CONTENT

// ═══════════════════════════════════════════════════════════════════
//  TOPIC CONFIG — display metadata only (no editing needed)
// ═══════════════════════════════════════════════════════════════════
const TOPICS = [
  {id:"plc",       name:"PLC Coding",                 icon:"🔧", color:"#34D399", glow:"rgba(52,211,153,0.15)"},
  {id:"electrical",name:"Electrical",                 icon:"🔌", color:"#FBBF24", glow:"rgba(251,191,36,0.15)"},
  {id:"mechanics", name:"Physics — Mechanics",        icon:"⚙️", color:"#F97316", glow:"rgba(249,115,22,0.15)"},
  {id:"fluids",    name:"Physics — Fluids",           icon:"💧", color:"#0EA5E9", glow:"rgba(14,165,233,0.15)"},
  {id:"gravity",   name:"Physics — Weight & Gravity", icon:"🪨", color:"#94A3B8", glow:"rgba(148,163,184,0.15)"},
  {id:"energy",    name:"Physics — Energy & Waves",   icon:"⚡", color:"#FBBF24", glow:"rgba(251,191,36,0.15)"},
  {id:"history",   name:"History",                    icon:"🏛️", color:"#FB923C", glow:"rgba(251,146,60,0.15)"},
  {id:"science",   name:"Science & Biology",          icon:"🧬", color:"#34D399", glow:"rgba(52,211,153,0.15)"},
  {id:"math",      name:"Math",                       icon:"📐", color:"#A594F9", glow:"rgba(165,148,249,0.15)"},
  {id:"finance",   name:"Finance & Business",         icon:"📈", color:"#FBBF24", glow:"rgba(251,191,36,0.15)"},
  {id:"philosophy",name:"Philosophy",                 icon:"🧠", color:"#C084FC", glow:"rgba(192,132,252,0.15)"},
  {id:"technology",name:"Technology",                 icon:"💻", color:"#38BDF8", glow:"rgba(56,189,248,0.15)"},
  {id:"art",       name:"Art & Culture",              icon:"🎨", color:"#F472B6", glow:"rgba(244,114,182,0.15)"},
];

// ═══════════════════════════════════════════════════════════════════
//  APP STATE + STORAGE
// ═══════════════════════════════════════════════════════════════════
var cT=null,cS=null,cM='lesson';
var qS={idx:0,sel:null,correct:0,done:false};

function ls(){try{return JSON.parse(localStorage.getItem('mf_stats')||'{}');}catch{return{};}}
function ss(d){localStorage.setItem('mf_stats',JSON.stringify(d));}
var stats=ls();

// streak
(function(){
  var today=new Date().toDateString();
  if(stats.lastDate!==today){
    var y=new Date(Date.now()-86400000).toDateString();
    stats.streak=stats.lastDate===y?(stats.streak||0)+1:1;
    stats.lastDate=today; ss(stats);
  }
  document.getElementById('sc').textContent=stats.streak||0;
})();

// ═══════════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function nav(p){
  ['home','lesson','profile'].forEach(function(x){
    var el=document.getElementById('pg-'+x);
    el.classList.toggle('active',x===p);
  });
  document.getElementById('nb-home').classList.toggle('on',p==='home');
  document.getElementById('nb-profile').classList.toggle('on',p==='profile');
  document.getElementById('hsub').textContent=p==='lesson'&&cT?cT.name:'What will you learn today?';
  if(p==='profile')renderProfile();
}

// ═══════════════════════════════════════════════════════════════════
//  HOME
// ═══════════════════════════════════════════════════════════════════
function renderHome(){
  var h='<div class="sec-ttl">Browse Topics</div><div class="tgrid">';
  TOPICS.forEach(function(t){
    var subs=Object.keys(CONTENT[t.id]||{});
    h+='<button class="tcard" onclick="openTopic(\''+t.id+'\')" style="background:#13131A;">'+
      '<div style="position:absolute;bottom:-18px;right:-18px;width:65px;height:65px;border-radius:50%;background:'+t.glow+';pointer-events:none;"></div>'+
      '<div style="font-size:26px;margin-bottom:7px;line-height:1;">'+t.icon+'</div>'+
      '<div style="font-size:13px;font-weight:700;color:#F0F0F8;line-height:1.3;">'+t.name+'</div>'+
      '<div style="font-size:11px;color:#606078;margin-top:3px;">'+subs.length+' lessons</div>'+
      '</button>';
  });
  h+='</div>';
  document.getElementById('pg-home').innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════════
//  LESSON SHELL
// ═══════════════════════════════════════════════════════════════════
function openTopic(tid,sub){
  cT=TOPICS.find(function(t){return t.id===tid;});
  var subs=Object.keys(CONTENT[tid]||{});
  cS=sub||subs[0];
  cM='lesson';
  renderShell();
  nav('lesson');
}

function renderShell(){
  var t=cT, subs=Object.keys(CONTENT[t.id]||{});
  var pills=subs.map(function(st){
    var on=st===cS;
    return '<button class="spill'+(on?' on':'')+'" style="'+(on?'background:'+t.color+';border-color:'+t.color+';':'')+'" onclick="changeSub(\''+st.replace(/'/g,"\\'")+'\')">'+(st.length>18?st.substring(0,16)+'…':st)+'</button>';
  }).join('');
  document.getElementById('pg-lesson').innerHTML=
    '<div style="display:flex;align-items:center;gap:11px;margin-bottom:14px;">'+
    '<button class="back" onclick="nav(\'home\')">&#8249;</button>'+
    '<span style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase;background:'+t.glow+';color:'+t.color+';">'+t.icon+' '+t.name+'</span>'+
    '</div>'+
    '<div class="mtabs">'+
    '<button class="mtab'+(cM==='lesson'?' on':'')+'" onclick="setMode(\'lesson\')">📖 Lesson</button>'+
    '<button class="mtab'+(cM==='quiz'?' on':'')+'" onclick="setMode(\'quiz\')">🧠 Quiz</button>'+
    '</div>'+
    '<div class="srow">'+pills+'</div>'+
    '<div id="lc"></div>';
  renderContent();
}

function changeSub(st){cS=st;renderShell();}
function setMode(m){cM=m;renderShell();}

// ═══════════════════════════════════════════════════════════════════
//  CONTENT RENDERING
// ═══════════════════════════════════════════════════════════════════
function renderContent(){
  if(cM==='lesson') showLesson();
  else showQuiz();
}

function showLesson(){
  var d=(CONTENT[cT.id]||{})[cS];
  var c=document.getElementById('lc');
  if(!d||!d.lesson){c.innerHTML='<div style="text-align:center;padding:30px;color:#606078;">No content yet.</div>';return;}
  var l=d.lesson;
  var secs=(l.sections||[]).map(function(s){
    return s.heading||s.body?'<div class="sh">'+esc(s.heading)+'</div><div class="sb">'+esc(s.body)+'</div>':'';
  }).join('');
  var tks=(l.takeaways||[]).filter(Boolean).map(function(t){
    return '<div class="tkrow"><div class="tkdot"></div><div style="font-size:14px;color:#A0A0B8;line-height:1.5;">'+esc(t)+'</div></div>';
  }).join('');
  c.innerHTML=
    '<div class="card fu"><div class="ls-ttl">'+esc(l.title)+'</div>'+secs+'</div>'+
    (tks?'<div class="tkbox fu"><div style="font-size:11px;font-weight:700;color:#34D399;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:11px;">✅ Key Takeaways</div>'+tks+'</div>':'')+
    '<button class="btn btn-p" onclick="setMode(\'quiz\')">🧠 Test Yourself</button>';
  trackRead(l.title);
}

function showQuiz(){
  var d=(CONTENT[cT.id]||{})[cS];
  var c=document.getElementById('lc');
  if(!d||!d.quiz||!d.quiz.questions||!d.quiz.questions.length){
    c.innerHTML='<div style="text-align:center;padding:30px;color:#606078;">No quiz yet.</div>';return;
  }
  qS={idx:0,sel:null,correct:0,done:false};
  window.__qd=d.quiz;
  showQ();
}

function showQ(){
  var c=document.getElementById('lc');
  var qs=window.__qd.questions;
  if(qS.done||qS.idx>=qs.length){
    var pct=Math.round((qS.correct/qs.length)*100);
    var score={date:new Date().toLocaleDateString(),topic:cT.name,sub:cS,pct:pct};
    stats.scores=[score,...(stats.scores||[])].slice(0,50);
    stats.quizzes=(stats.quizzes||0)+1;
    ss(stats);
    c.innerHTML='<div class="card fu" style="text-align:center;">'+
      '<div style="font-size:46px;margin-bottom:11px;">'+(pct>=80?'🏆':pct>=60?'⭐':'📖')+'</div>'+
      '<div style="font-size:16px;font-weight:700;color:#F0F0F8;margin-bottom:7px;">'+(pct>=80?'Excellent!':pct>=60?'Good job!':'Keep studying!')+'</div>'+
      '<div style="font-size:38px;font-weight:800;color:#A594F9;margin:10px 0;">'+pct+'%</div>'+
      '<div style="color:#606078;font-size:13px;margin-bottom:18px;">'+qS.correct+' of '+qs.length+' correct</div>'+
      '<div class="brow">'+
      '<button class="btn btn-s" onclick="qS={idx:0,sel:null,correct:0,done:false};showQ()">↺ Retry</button>'+
      '<button class="btn btn-p" onclick="setMode(\'lesson\')">📖 Back</button>'+
      '</div></div>';
    return;
  }
  var q=qs[qS.idx];
  var pct=(qS.idx/qs.length)*100;
  var opts=q.options.map(function(o,i){
    return '<button class="qopt" id="o'+i+'" onclick="pickA('+i+','+q.answer+')">'+esc(o)+'</button>';
  }).join('');
  c.innerHTML=
    '<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>'+
    '<div style="font-size:12px;color:#606078;margin-bottom:12px;font-weight:600;">Question '+(qS.idx+1)+' of '+qs.length+'</div>'+
    '<div class="card fu"><div class="qq">'+esc(q.q)+'</div>'+opts+
    '<div id="qexp" style="display:none;" class="qexp"></div>'+
    '<button id="qnxt" style="display:none;margin-top:12px;" class="btn btn-p" onclick="nextQ()">'+
    (qS.idx+1<qs.length?'Next →':'See Results →')+'</button></div>';
}

function pickA(chosen,correct){
  if(qS.sel!==null)return;
  qS.sel=chosen;
  if(chosen===correct)qS.correct++;
  for(var i=0;i<4;i++){var b=document.getElementById('o'+i);if(b){b.style.pointerEvents='none';if(i===correct)b.classList.add('ok');else if(i===chosen)b.classList.add('no');}}
  var q=window.__qd.questions[qS.idx];
  var ex=document.getElementById('qexp');
  if(ex&&q.explain){ex.textContent=q.explain;ex.style.display='';}
  var nx=document.getElementById('qnxt');
  if(nx)nx.style.display='';
}
function nextQ(){qS.idx++;qS.sel=null;showQ();}

// ═══════════════════════════════════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════════════════════════════════
function renderProfile(){
  var scores=stats.scores||[];
  var avg=scores.length?Math.round(scores.reduce(function(a,b){return a+b.pct;},0)/scores.length)+'%':'—';
  var hist=(stats.history||[]);
  var histH=hist.length?hist.slice(0,10).map(function(h){
    return '<div class="hitem"><div style="font-size:20px;">'+h.icon+'</div><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:600;color:#F0F0F8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(h.title)+'</div><div style="font-size:12px;color:#606078;margin-top:2px;">'+esc(h.topic)+' · '+h.date+'</div></div><div style="font-size:12px;font-weight:700;color:#34D399;background:rgba(52,211,153,0.1);padding:4px 10px;border-radius:10px;white-space:nowrap;">'+h.mode+'</div></div>';
  }).join(''):'<div style="color:#606078;font-size:14px;padding:8px 0;">No activity yet.</div>';
  document.getElementById('pg-profile').innerHTML=
    '<div class="sec-ttl">Your Progress</div>'+
    '<div class="sgrid">'+
    '<div class="scard"><div style="font-size:30px;font-weight:800;color:#A594F9;line-height:1;">'+(stats.reads||0)+'</div><div style="font-size:12px;color:#606078;margin-top:5px;">Lessons Read</div></div>'+
    '<div class="scard"><div style="font-size:30px;font-weight:800;color:#FB923C;line-height:1;">'+(stats.streak||0)+' 🔥</div><div style="font-size:12px;color:#606078;margin-top:5px;">Day Streak</div></div>'+
    '<div class="scard"><div style="font-size:30px;font-weight:800;color:#34D399;line-height:1;">'+(stats.quizzes||0)+'</div><div style="font-size:12px;color:#606078;margin-top:5px;">Quizzes Taken</div></div>'+
    '<div class="scard"><div style="font-size:30px;font-weight:800;color:#F472B6;line-height:1;">'+avg+'</div><div style="font-size:12px;color:#606078;margin-top:5px;">Avg Score</div></div>'+
    '</div>'+
    (scores.length?'<div class="sec-ttl">Recent Quiz Scores</div>'+scores.slice(0,5).map(function(s){
      return '<div class="hitem"><div style="font-size:20px;">'+(s.pct>=80?'🏆':s.pct>=60?'⭐':'📖')+'</div><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:600;color:#F0F0F8;">'+esc(s.sub)+'</div><div style="font-size:12px;color:#606078;margin-top:2px;">'+esc(s.topic)+' · '+s.date+'</div></div><div style="font-size:18px;font-weight:800;color:#A594F9;">'+s.pct+'%</div></div>';
    }).join(''):'') +
    '<div class="sec-ttl" style="margin-top:20px;">Recent Activity</div>'+histH;
}

// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function trackRead(title){
  stats.reads=(stats.reads||0)+1;
  stats.history=[{title:title,topic:cT.name,icon:cT.icon,mode:'Read',date:new Date().toLocaleDateString()},...(stats.history||[])].slice(0,30);
  ss(stats);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
renderHome();
</script>
