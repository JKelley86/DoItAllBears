<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MindFuel</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #0A0A0F; color: #F0F0F8; font-family: system-ui,-apple-system,sans-serif; min-height: 100%; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { display: none; }
input, textarea, button { font-family: inherit; }
input::placeholder, textarea::placeholder { color: #404058; }

#app { max-width: 430px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; position: relative; }
.header { padding: 16px 20px 14px; background: rgba(10,10,15,0.94); border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(20px); }
.app-name { font-size: 22px; font-weight: 800; background: linear-gradient(135deg,#A594F9,#F472B6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-sub { font-size: 13px; color: #606078; margin-top: 3px; }
.streak-badge { display: flex; align-items: center; gap: 6px; background: #1C1C26; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #FB923C; }
.page { padding: 16px; }

.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 10px 16px 20px; background: rgba(10,10,15,0.96); border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 4px; z-index: 100; }
.nav-btn { flex: 1; padding: 8px 4px; border-radius: 14px; border: none; background: transparent; color: #606078; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.nav-btn.active { background: rgba(123,110,246,0.15); color: #A594F9; }

.card { background: #13131A; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 22px; margin-bottom: 14px; }
.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.topic-card { background: #13131A; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 16px; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.15s; }
.topic-card:active { transform: scale(0.97); }

.section-title { font-size: 16px; font-weight: 700; color: #F0F0F8; margin-bottom: 12px; }
.lesson-title { font-size: 20px; font-weight: 700; color: #F0F0F8; margin-bottom: 16px; line-height: 1.3; }
.sec-heading { font-size: 11px; font-weight: 700; color: #A594F9; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; margin-top: 18px; }
.sec-body { font-size: 15px; line-height: 1.75; color: #A0A0B8; }
.takeaways-box { background: #13131A; border: 1px solid rgba(52,211,153,0.15); border-radius: 16px; padding: 18px; margin-bottom: 14px; }

.btn-primary { background: linear-gradient(135deg,#7B6EF6,#A594F9); color: #fff; border: none; border-radius: 14px; padding: 13px 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; box-shadow: 0 4px 20px rgba(123,110,246,0.3); }
.btn-secondary { background: #1C1C26; color: #A0A0B8; border: none; border-radius: 14px; padding: 13px 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-row { display: flex; gap: 10px; }
.back-btn { width: 38px; height: 38px; border-radius: 50%; background: #1C1C26; border: none; color: #F0F0F8; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.mode-tabs { display: flex; gap: 6px; background: #13131A; border-radius: 14px; padding: 4px; margin-bottom: 16px; }
.mode-tab { flex: 1; padding: 9px 4px; border-radius: 10px; border: none; background: transparent; color: #606078; font-size: 13px; font-weight: 600; cursor: pointer; }
.mode-tab.active { background: #252533; color: #F0F0F8; }

.subtopic-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.subtopic-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); background: #13131A; color: #A0A0B8; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.subtopic-pill.active { color: #fff; }

.quiz-q { font-size: 17px; font-weight: 700; color: #F0F0F8; margin-bottom: 20px; line-height: 1.4; }
.quiz-opt { padding: 14px 16px; border-radius: 14px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.06); background: #1C1C26; color: #F0F0F8; font-size: 15px; font-weight: 500; width: 100%; text-align: left; margin-bottom: 10px; }
.quiz-opt.correct { border-color: #34D399 !important; background: rgba(52,211,153,0.1) !important; }
.quiz-opt.wrong { border-color: #EF4444 !important; background: rgba(239,68,68,0.1) !important; }
.progress-bar { height: 3px; background: #1C1C26; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#7B6EF6,#A594F9); transition: width 0.4s; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card { background: #13131A; border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 18px; text-align: center; }
.hist-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: #13131A; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; margin-bottom: 8px; }

.edit-banner { background: rgba(123,110,246,0.1); border: 1px solid rgba(123,110,246,0.25); border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
.edit-label { font-size: 11px; font-weight: 700; color: #606078; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.edit-input { width: 100%; background: #13131A; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: #F0F0F8; outline: none; }
.edit-input:focus { border-color: rgba(165,148,249,0.5); }
.edit-textarea { width: 100%; background: #13131A; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: #F0F0F8; outline: none; resize: vertical; min-height: 80px; line-height: 1.6; }
.edit-textarea:focus { border-color: rgba(165,148,249,0.5); }
.ef-group { margin-bottom: 14px; }
.divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 18px 0; }
.q-block { background: #0A0A0F; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
.q-block-label { font-size: 11px; font-weight: 700; color: #F472B6; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; }

.empty-state { text-align: center; padding: 32px 20px; }
.save-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #34D399; color: #0A0A0F; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 20px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.save-toast.show { opacity: 1; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp 0.25s ease; }
</style>
</head>
<body>
<div id="app">
  <div style="position:fixed;top:-200px;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(123,110,246,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div class="app-name">MindFuel ⚡</div>
        <div class="header-sub" id="header-sub">What will you learn today?</div>
      </div>
      <div class="streak-badge">🔥 <span id="streak-count">0</span> day</div>
    </div>
  </div>

  <div id="page-home" class="page" style="position:relative;z-index:1;"></div>
  <div id="page-lesson" class="page" style="display:none;position:relative;z-index:1;"></div>
  <div id="page-profile" class="page" style="display:none;position:relative;z-index:1;"></div>

  <div class="nav">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')"><span style="font-size:22px;">🏠</span>Home</button>
    <button class="nav-btn" id="nav-profile" onclick="showPage('profile')"><span style="font-size:22px;">👤</span>Profile</button>
  </div>

  <div class="save-toast" id="save-toast">✓ Saved!</div>
</div>

<script>
const TOPICS = [
  {id:"mechanics",name:"Physics — Mechanics",icon:"⚙️",color:"#F97316",glow:"rgba(249,115,22,0.15)",subtopics:["Newton's Laws","Levers & Torque","Forces & Motion","Energy & Work","Momentum","Friction","Simple Machines","Center of Mass"]},
  {id:"fluids",name:"Physics — Fluids",icon:"💧",color:"#0EA5E9",glow:"rgba(14,165,233,0.15)",subtopics:["Water Pressure","Buoyancy","Flow Rate","Bernoulli's Principle","Hydraulics","Surface Tension","Viscosity","Pascal's Law"]},
  {id:"gravity",name:"Physics — Weight & Gravity",icon:"🪨",color:"#94A3B8",glow:"rgba(148,163,184,0.15)",subtopics:["Gravity Basics","Weight vs Mass","Free Fall","Center of Gravity","Tipping Points","Load Distribution","Gravitational Fields","Structural Load"]},
  {id:"energy",name:"Physics — Energy & Waves",icon:"⚡",color:"#FBBF24",glow:"rgba(251,191,36,0.15)",subtopics:["Kinetic & Potential Energy","Conservation of Energy","Thermodynamics","Sound Waves","Light & Optics","Heat Transfer","Electromagnetic Spectrum","Resonance"]},
  {id:"plc",name:"PLC Coding",icon:"🔧",color:"#34D399",glow:"rgba(52,211,153,0.15)",subtopics:["Ladder Logic Basics","Inputs & Outputs","Timers & Counters","Coils & Contacts","Program Flow","HMI Basics","Safety Systems","Troubleshooting PLCs"]},
  {id:"electrical",name:"Electrical",icon:"🔌",color:"#FBBF24",glow:"rgba(251,191,36,0.15)",subtopics:["Ohm's Law","AC vs DC","Series & Parallel Circuits","Reading Wiring Diagrams","Transformers","Motors & Relays","Electrical Safety","NEC Basics"]},
  {id:"history",name:"History",icon:"🏛️",color:"#FB923C",glow:"rgba(251,146,60,0.15)",subtopics:["Ancient Civilizations","World Wars","American History","Medieval Period","Scientific Revolution","Cold War","Ancient Rome","The Renaissance"]},
  {id:"science",name:"Science & Biology",icon:"🧬",color:"#34D399",glow:"rgba(52,211,153,0.15)",subtopics:["Cell Biology","Evolution","Genetics","Ecosystems","Human Body","Microbiology","Chemistry Basics","Neuroscience"]},
  {id:"math",name:"Math",icon:"📐",color:"#A594F9",glow:"rgba(165,148,249,0.15)",subtopics:["Algebra","Geometry","Calculus","Statistics","Number Theory","Trigonometry","Probability","Linear Algebra"]},
  {id:"finance",name:"Finance & Business",icon:"📈",color:"#FBBF24",glow:"rgba(251,191,36,0.15)",subtopics:["Investing Basics","Stock Market","Personal Finance","Entrepreneurship","Economics","Cryptocurrency","Real Estate","Budgeting"]},
  {id:"philosophy",name:"Philosophy",icon:"🧠",color:"#C084FC",glow:"rgba(192,132,252,0.15)",subtopics:["Ethics","Stoicism","Logic","Epistemology","Existentialism","Eastern Philosophy","Political Philosophy","Metaphysics"]},
  {id:"technology",name:"Technology",icon:"💻",color:"#38BDF8",glow:"rgba(56,189,248,0.15)",subtopics:["AI & Machine Learning","How the Internet Works","Cybersecurity","Programming Concepts","Operating Systems","Databases","Networking","Cloud Computing"]},
  {id:"art",name:"Art & Culture",icon:"🎨",color:"#F472B6",glow:"rgba(244,114,182,0.15)",subtopics:["Art History","Music Theory","Architecture","Film","Literature","Cultural Movements","Design","Philosophy of Art"]},
];

function skey(tid,st,type){ return 'mf_'+tid+'__'+st.replace(/\W+/g,'_')+'__'+type; }
function loadL(tid,st){ try{var r=localStorage.getItem(skey(tid,st,'lesson'));return r?JSON.parse(r):null;}catch{return null;} }
function saveL(tid,st,d){ localStorage.setItem(skey(tid,st,'lesson'),JSON.stringify(d)); }
function loadQ(tid,st){ try{var r=localStorage.getItem(skey(tid,st,'quiz'));return r?JSON.parse(r):null;}catch{return null;} }
function saveQ(tid,st,d){ localStorage.setItem(skey(tid,st,'quiz'),JSON.stringify(d)); }
function loadStats(){ try{return JSON.parse(localStorage.getItem('mf_stats')||'{}');}catch{return{};} }
function saveStats(s){ localStorage.setItem('mf_stats',JSON.stringify(s)); }

var stats=loadStats(), curTopic=null, curSub=null, curMode='lesson';
var qState={idx:0,sel:null,correct:0,done:false};

// streak
(function(){
  var today=new Date().toDateString();
  if(stats.lastDate!==today){
    var yest=new Date(Date.now()-86400000).toDateString();
    stats.streak=stats.lastDate===yest?(stats.streak||0)+1:1;
    stats.lastDate=today; saveStats(stats);
  }
  document.getElementById('streak-count').textContent=stats.streak||0;
})();

function showPage(p){
  ['home','lesson','profile'].forEach(function(x){
    document.getElementById('page-'+x).style.display=x===p?'':'none';
  });
  document.getElementById('nav-home').className='nav-btn'+(p==='home'?' active':'');
  document.getElementById('nav-profile').className='nav-btn'+(p==='profile'?' active':'');
  document.getElementById('header-sub').textContent=p==='lesson'&&curTopic?curTopic.name:'What will you learn today?';
}

function renderHome(){
  var h='<div class="section-title">Browse Topics</div><div class="topic-grid">';
  TOPICS.forEach(function(t){
    h+='<div class="topic-card" onclick="openTopic(\''+t.id+'\')"><div style="position:absolute;bottom:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:'+t.glow+';pointer-events:none;"></div><div style="font-size:28px;margin-bottom:8px;line-height:1;">'+t.icon+'</div><div style="font-size:13px;font-weight:700;color:#F0F0F8;line-height:1.3;">'+t.name+'</div><div style="font-size:11px;color:#606078;margin-top:3px;">'+t.subtopics.length+' lessons</div></div>';
  });
  h+='</div>';
  document.getElementById('page-home').innerHTML=h;
}

function openTopic(tid,st){
  curTopic=TOPICS.find(function(t){return t.id===tid;});
  curSub=st||curTopic.subtopics[0];
  curMode='lesson';
  renderLessonShell();
  showPage('lesson');
}

function renderLessonShell(){
  var t=curTopic;
  var pills=t.subtopics.map(function(st){
    var active=st===curSub;
    var style=active?'background:'+t.color+';border-color:'+t.color+';color:#fff;':'';
    return '<button class="subtopic-pill'+(active?' active':'')+'" style="'+style+'" onclick="changeSub(\''+st.replace(/'/g,"\\'")+'\')">' +st+'</button>';
  }).join('');
  document.getElementById('page-lesson').innerHTML=
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">'+
    '<button class="back-btn" onclick="showPage(\'home\')">&#8249;</button>'+
    '<span style="display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase;background:'+t.glow+';color:'+t.color+';">'+t.icon+' '+t.name+'</span>'+
    '</div>'+
    '<div class="mode-tabs">'+
    '<button class="mode-tab'+(curMode==='lesson'?' active':'')+'" onclick="setMode(\'lesson\')">📖 Lesson</button>'+
    '<button class="mode-tab'+(curMode==='quiz'?' active':'')+'" onclick="setMode(\'quiz\')">🧠 Quiz</button>'+
    '</div>'+
    '<div class="subtopic-row">'+pills+'</div>'+
    '<div id="lc"></div>';
  renderContent();
}

function changeSub(st){ curSub=st; renderLessonShell(); }
function setMode(m){ curMode=m; renderLessonShell(); }

function renderContent(){
  if(curMode==='lesson') renderLesson();
  else if(curMode==='quiz') renderQuiz();
  else if(curMode==='edit-lesson') renderEditLesson();
  else if(curMode==='edit-quiz') renderEditQuiz();
}

function renderLesson(){
  var d=loadL(curTopic.id,curSub);
  var c=document.getElementById('lc');
  if(!d){
    c.innerHTML='<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">📝</div><div style="font-size:16px;font-weight:600;color:#606078;margin-bottom:8px;">No lesson yet</div><div style="font-size:14px;color:#404058;margin-bottom:24px;">Write your lesson for <strong style="color:#A594F9;">'+curSub+'</strong></div></div><button class="btn-primary" onclick="setMode(\'edit-lesson\')">✏️ Write This Lesson</button>';
    return;
  }
  var secs=(d.sections||[]).map(function(s){return s.heading||s.body?'<div class="sec-heading">'+esc(s.heading)+'</div><div class="sec-body">'+esc(s.body)+'</div>':''}).join('');
  var tks=(d.takeaways||[]).filter(function(x){return x.trim();}).map(function(t){return '<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;"><div style="width:6px;height:6px;border-radius:50%;background:#34D399;flex-shrink:0;margin-top:8px;"></div><div style="font-size:14px;color:#A0A0B8;line-height:1.5;">'+esc(t)+'</div></div>';}).join('');
  c.innerHTML='<div class="card fade-up"><div class="lesson-title">'+esc(d.title||curSub)+'</div>'+secs+'</div>'+(tks?'<div class="takeaways-box fade-up"><div style="font-size:11px;font-weight:700;color:#34D399;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">✅ Key Takeaways</div>'+tks+'</div>':'')+'<div class="btn-row"><button class="btn-secondary" onclick="setMode(\'quiz\')">🧠 Take Quiz</button><button class="btn-primary" onclick="setMode(\'edit-lesson\')">✏️ Edit</button></div>';
  trackRead(d.title||curSub);
}

function renderQuiz(){
  var d=loadQ(curTopic.id,curSub);
  var c=document.getElementById('lc');
  if(!d||!d.questions||!d.questions.length){
    c.innerHTML='<div class="empty-state"><div style="font-size:48px;margin-bottom:12px;">🧠</div><div style="font-size:16px;font-weight:600;color:#606078;margin-bottom:8px;">No quiz yet</div><div style="font-size:14px;color:#404058;margin-bottom:24px;">Write quiz questions for <strong style="color:#A594F9;">'+curSub+'</strong></div></div><button class="btn-primary" onclick="setMode(\'edit-quiz\')">✏️ Write Quiz</button>';
    return;
  }
  qState={idx:0,sel:null,correct:0,done:false};
  showQuizQ(d);
}

function showQuizQ(d){
  var c=document.getElementById('lc');
  var qs=d.questions;
  if(qState.done||qState.idx>=qs.length){
    var pct=Math.round((qState.correct/qs.length)*100);
    c.innerHTML='<div class="card fade-up" style="text-align:center;"><div style="font-size:48px;margin-bottom:12px;">'+(pct>=80?'🏆':pct>=60?'⭐':'📖')+'</div><div style="font-size:17px;font-weight:700;color:#F0F0F8;margin-bottom:8px;">'+(pct>=80?'Excellent!':pct>=60?'Good job!':'Keep studying!')+'</div><div style="font-size:40px;font-weight:800;color:#A594F9;margin:12px 0;">'+pct+'%</div><div style="color:#606078;font-size:14px;margin-bottom:20px;">'+qState.correct+' of '+qs.length+' correct</div><div class="btn-row"><button class="btn-secondary" onclick="qState={idx:0,sel:null,correct:0,done:false};showQuizQ(window.__qd)">↺ Retry</button><button class="btn-primary" onclick="setMode(\'lesson\')">📖 Back</button></div></div>';
    return;
  }
  window.__qd=d;
  var q=qs[qState.idx];
  var pct=(qState.idx/qs.length)*100;
  var opts=q.options.map(function(o,i){return '<button class="quiz-opt" id="qo'+i+'" onclick="pickA('+i+','+q.answer+')">'+esc(o)+'</button>';}).join('');
  c.innerHTML='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div style="font-size:12px;color:#606078;margin-bottom:14px;font-weight:600;">Question '+(qState.idx+1)+' of '+qs.length+'</div><div class="card fade-up"><div class="quiz-q">'+esc(q.q)+'</div>'+opts+'<div id="qexp" style="display:none;margin-top:12px;padding:14px;background:#1C1C26;border-radius:12px;font-size:14px;color:#A0A0B8;line-height:1.6;"></div><button id="qnxt" style="display:none;margin-top:14px;" class="btn-primary" onclick="nextQ()">'+((qState.idx+1)<qs.length?'Next →':'See Results →')+'</button></div>';
}

function pickA(chosen,correct){
  if(qState.sel!==null)return;
  qState.sel=chosen;
  if(chosen===correct)qState.correct++;
  for(var i=0;i<4;i++){var b=document.getElementById('qo'+i);if(!b)continue;b.style.pointerEvents='none';if(i===correct)b.classList.add('correct');else if(i===chosen)b.classList.add('wrong');}
  var q=window.__qd.questions[qState.idx];
  var ex=document.getElementById('qexp');
  if(ex&&q.explain){ex.textContent=q.explain;ex.style.display='';}
  var nx=document.getElementById('qnxt');
  if(nx)nx.style.display='';
}

function nextQ(){qState.idx++;qState.sel=null;showQuizQ(window.__qd);}

function renderEditLesson(){
  var ex=loadL(curTopic.id,curSub)||{title:curSub,sections:[{heading:'',body:''},{heading:'',body:''},{heading:'',body:''},{heading:'',body:''}],takeaways:['','','','']};
  var secs=[0,1,2,3].map(function(i){
    return '<hr class="divider"><div style="font-size:12px;font-weight:700;color:#A594F9;margin-bottom:12px;">SECTION '+(i+1)+'</div><div class="ef-group"><div class="edit-label">Heading</div><input class="edit-input" id="es'+i+'" placeholder="Section heading..." value="'+esc2((ex.sections[i]||{}).heading||'')+'"></div><div class="ef-group"><div class="edit-label">Content</div><textarea class="edit-textarea" id="eb'+i+'" placeholder="Write lesson content here...">'+esc2((ex.sections[i]||{}).body||'')+'</textarea></div>';
  }).join('');
  var tks=[0,1,2,3].map(function(i){
    return '<div class="ef-group"><div class="edit-label">Takeaway '+(i+1)+'</div><input class="edit-input" id="et'+i+'" placeholder="One key thing to remember..." value="'+esc2((ex.takeaways||[])[i]||'')+'"></div>';
  }).join('');
  document.getElementById('lc').innerHTML=
    '<div class="edit-banner"><span style="font-size:20px;flex-shrink:0;">✏️</span><div style="font-size:13px;color:#A594F9;line-height:1.5;">Fill in your lesson for <strong>'+curSub+'</strong>. Saves to this device.</div></div>'+
    '<div class="ef-group"><div class="edit-label">Lesson Title</div><input class="edit-input" id="etitle" value="'+esc2(ex.title||curSub)+'" placeholder="Lesson title..."></div>'+
    secs+
    '<hr class="divider"><div style="font-size:12px;font-weight:700;color:#34D399;margin-bottom:12px;">KEY TAKEAWAYS</div>'+tks+
    '<div class="btn-row" style="margin-top:8px;"><button class="btn-secondary" onclick="setMode(\'lesson\')">Cancel</button><button class="btn-primary" onclick="doSaveLesson()">💾 Save Lesson</button></div>';
}

function doSaveLesson(){
  var d={
    title:document.getElementById('etitle').value.trim()||curSub,
    sections:[0,1,2,3].map(function(i){return{heading:document.getElementById('es'+i).value.trim(),body:document.getElementById('eb'+i).value.trim()};}).filter(function(s){return s.heading||s.body;}),
    takeaways:[0,1,2,3].map(function(i){return document.getElementById('et'+i).value.trim();}).filter(Boolean)
  };
  saveL(curTopic.id,curSub,d);
  toast(); curMode='lesson'; renderLessonShell();
}

function renderEditQuiz(){
  var ex=loadQ(curTopic.id,curSub)||{questions:[{q:'',options:['','','',''],answer:0,explain:''},{q:'',options:['','','',''],answer:0,explain:''},{q:'',options:['','','',''],answer:0,explain:''}]};
  var blocks=[0,1,2].map(function(i){
    var q=ex.questions[i]||{q:'',options:['','','',''],answer:0,explain:''};
    var opts=['A','B','C','D'].map(function(ltr,j){
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span style="font-size:13px;font-weight:700;color:#606078;width:16px;flex-shrink:0;">'+ltr+'</span><input class="edit-input" style="flex:1;" id="qo'+i+'_'+j+'" placeholder="Option '+ltr+'..." value="'+esc2((q.options||[])[j]||'')+'"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;"><input type="radio" name="ca'+i+'" value="'+j+'"'+(q.answer===j?' checked':'')+' style="accent-color:#A594F9;"><span style="font-size:11px;color:#34D399;font-weight:600;white-space:nowrap;">Correct</span></label></div>';
    }).join('');
    return '<div class="q-block"><div class="q-block-label">Question '+(i+1)+'</div><div class="ef-group"><div class="edit-label">Question</div><textarea class="edit-textarea" id="qq'+i+'" style="min-height:60px;" placeholder="Write your question...">'+esc2(q.q)+'</textarea></div>'+opts+'<div class="ef-group"><div class="edit-label">Explanation</div><textarea class="edit-textarea" id="qe'+i+'" style="min-height:60px;" placeholder="Why is this the right answer?">'+esc2(q.explain)+'</textarea></div></div>';
  }).join('');
  document.getElementById('lc').innerHTML=
    '<div class="edit-banner"><span style="font-size:20px;flex-shrink:0;">🧠</span><div style="font-size:13px;color:#A594F9;line-height:1.5;">Write 3 questions for <strong>'+curSub+'</strong>. Pick the correct answer with the radio button.</div></div>'+
    blocks+
    '<div class="btn-row" style="margin-top:8px;"><button class="btn-secondary" onclick="setMode(\'quiz\')">Cancel</button><button class="btn-primary" onclick="doSaveQuiz()">💾 Save Quiz</button></div>';
}

function doSaveQuiz(){
  var qs=[0,1,2].map(function(i){
    var radios=document.querySelectorAll('input[name="ca'+i+'"]');
    var ans=0; radios.forEach(function(r,j){if(r.checked)ans=j;});
    return{q:document.getElementById('qq'+i).value.trim(),options:[0,1,2,3].map(function(j){return document.getElementById('qo'+i+'_'+j).value.trim();}),answer:ans,explain:document.getElementById('qe'+i).value.trim()};
  }).filter(function(q){return q.q;});
  saveQ(curTopic.id,curSub,{questions:qs});
  toast(); curMode='quiz'; renderLessonShell();
}

function renderProfile(){
  var filled=0,total=0;
  TOPICS.forEach(function(t){t.subtopics.forEach(function(st){total++;if(loadL(t.id,st))filled++;});});
  var hist=(stats.history||[]);
  var histHTML=hist.length?hist.slice(0,10).map(function(h){return'<div class="hist-item"><div style="font-size:22px;">'+h.icon+'</div><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:600;color:#F0F0F8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(h.title)+'</div><div style="font-size:12px;color:#606078;margin-top:2px;">'+esc(h.topic)+' · '+h.date+'</div></div><div style="font-size:12px;font-weight:700;color:#34D399;background:rgba(52,211,153,0.1);padding:4px 10px;border-radius:10px;">Read</div></div>';}).join(''):'<div style="color:#606078;font-size:14px;padding:8px 0;">No activity yet.</div>';
  document.getElementById('page-profile').innerHTML=
    '<div class="section-title">Your Progress</div>'+
    '<div class="stat-grid">'+
    '<div class="stat-card"><div style="font-size:32px;font-weight:800;color:#A594F9;line-height:1;">'+filled+'</div><div style="font-size:12px;color:#606078;margin-top:6px;">Lessons Written</div></div>'+
    '<div class="stat-card"><div style="font-size:32px;font-weight:800;color:#FB923C;line-height:1;">'+(stats.streak||0)+' 🔥</div><div style="font-size:12px;color:#606078;margin-top:6px;">Day Streak</div></div>'+
    '<div class="stat-card"><div style="font-size:32px;font-weight:800;color:#34D399;line-height:1;">'+(stats.reads||0)+'</div><div style="font-size:12px;color:#606078;margin-top:6px;">Lessons Read</div></div>'+
    '<div class="stat-card"><div style="font-size:32px;font-weight:800;color:#38BDF8;line-height:1;">'+filled+'/'+total+'</div><div style="font-size:12px;color:#606078;margin-top:6px;">Content Filled</div></div>'+
    '</div>'+
    '<div class="section-title">Recent Activity</div>'+histHTML;
}

function trackRead(title){
  stats.reads=(stats.reads||0)+1;
  stats.history=[{title:title,topic:curTopic.name,icon:curTopic.icon,date:new Date().toLocaleDateString()},...(stats.history||[])].slice(0,20);
  saveStats(stats);
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc2(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toast(){var t=document.getElementById('save-toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

renderHome();
renderProfile();
</script>
</body>
</html>
