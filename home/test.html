<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>House 3D Viewer</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#1b1d22; touch-action:none; }
  #canvas-wrap { position:absolute; inset:0; }
  canvas { display:block; }

  #topbar {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    padding:14px 16px; box-sizing:border-box;
    pointer-events:none; z-index:2;
  }
  #topbar > * { pointer-events:auto; }

  #floorToggle {
    display:flex; background:#26292f; border:1px solid #383c44; border-radius:10px;
    overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,0.35);
  }
  #floorToggle button {
    border:none; background:transparent; color:#9aa0aa; font-size:13px; font-weight:600;
    padding:10px 14px; cursor:pointer; transition:background .15s, color .15s; white-space:nowrap;
  }
  #floorToggle button.active { background:#4f7cff; color:#fff; }
  #floorToggle button:hover:not(.active) { background:#2f333b; color:#fff; }

  #rightStack { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }

  #stats {
    color:#c9cdd4; font-size:12px; font-weight:700; background:#26292f; border:1px solid #383c44;
    padding:7px 12px; border-radius:8px; white-space:nowrap;
  }

  #hint {
    color:#7a808c; font-size:12px; background:#26292f; border:1px solid #383c44;
    padding:8px 12px; border-radius:10px; max-width:40vw; text-align:right;
  }
  @media (max-width: 640px) { #hint { display:none; } }

  #tooltip {
    position:absolute; pointer-events:none; background:#0f1013; color:#fff;
    padding:6px 10px; border-radius:6px; font-size:13px; display:none; z-index:5;
    border:1px solid #383c44;
  }

  #overlay {
    position:absolute; inset:0; background:rgba(10,11,13,0.55);
    display:none; align-items:center; justify-content:center; z-index:10;
    backdrop-filter: blur(2px);
  }
  #panel {
    width:380px; max-width:90vw; max-height:80vh; overflow-y:auto;
    background:#1f2126; border:1px solid #383c44; border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5); color:#e7e9ec;
  }
  #panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px; border-bottom:1px solid #33363d;
  }
  #panel-header h2 { margin:0; font-size:18px; }
  #panel-close {
    background:#2c2f36; border:1px solid #3a3e46; color:#c9cdd4; width:34px; height:34px;
    border-radius:8px; cursor:pointer; font-size:16px; line-height:1;
  }
  #panel-close:hover { background:#3a3e46; color:#fff; }
  #panel-body { padding:16px 20px 20px; }
  .section-title {
    font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#7a808c;
    margin:16px 0 8px; font-weight:700;
  }
  .section-title:first-child { margin-top:0; }
  .dim-row {
    display:flex; justify-content:space-between; padding:7px 0;
    border-bottom:1px solid #2a2d33; font-size:14px; gap:12px;
  }
  .dim-row:last-child { border-bottom:none; }
  .dim-label { color:#c9cdd4; }
  .dim-value { color:#8fb0ff; font-weight:600; text-align:right; }

  .room-label {
    background: rgba(15,16,19,0.85);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    white-space: nowrap;
  }
  .room-label.small-label {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    opacity: 0.85;
  }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="topbar">
  <div id="floorToggle"></div>
  <div id="rightStack">
    <div id="stats"></div>
    <div id="hint">Tap/click a room, window, door, or building for details · drag to orbit · pinch/scroll to zoom</div>
  </div>
</div>

<div id="tooltip"></div>

<div id="overlay">
  <div id="panel">
    <div id="panel-header">
      <h2 id="panel-title">Room</h2>
      <button id="panel-close">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script>
/* =====================================================================
   1) HOUSE DATA — EDIT THIS SECTION WITH YOUR REAL HOUSE INFO
   =====================================================================
   All dimensions are in FEET. Coordinates: x = left/right, z = front/back.
   (0,0) can be anywhere you like — it's just the corner you measure from.

   ROOMS (per floor):
     x, z, width, depth  → footprint, bottom-left corner at (x,z)
     color               → wall tint
     floor.type          → 'hardwood' | 'carpet' | 'tile' | 'concrete' | 'vinyl'
                            (leave "floor" out entirely for a plain gray floor)
     windows / doors     → OPTIONAL arrays. Each one is placed on a real wall
                            (and doors actually cut a gap in the wall), so it
                            shows up in the right spot and can be tapped
                            individually. Name windows by wall + landmark
                            instead of "Window 1 / Window 2":
        {
          wall: 'south' | 'north' | 'east' | 'west',
          offset: 4,     // feet from the wall's start corner to the window's edge
          width: 4, height: 5, sill: 3,   // sill = height of window bottom off floor
          label: 'Window 1 — south wall, faces backyard'
        }
     doors are the same shape but no "sill" (they start at the floor):
        { wall:'west', offset:2, width:3, height:6.8, label:'Closet door' }

     Wall offset direction (so you know which way to measure):
       south/north walls → offset measured along X, starting at the room's x
       east/west walls   → offset measured along Z, starting at the room's z

     dims → the general room-level info shown when you click the room itself.
            (Floor area is now calculated automatically from width/depth and
            shown at the top of the popup — no need to type it in manually.)
*/
const HOUSE = {
  floors: [
    {

      wallHeight: 9,
      rooms: [
        {
          id: "living",
          label: "Living Room",
          x: 0, z: 0, width: 18, depth: 14,

          windows: [
            { wall: "south", offset: 5, width: 6, height: 5, sill: 2, label: "Window 1 — south wall, faces street" }
          ],
          doors: [
            { wall: "east", offset: 0, width: 3.5, height: 7, label: "Doorway to kitchen" }
          ],

        },
        {
          id: "kitchen",

            { wall: "north", offset: 4, width: 3, height: 4, sill: 3, label: "Window 1 — north wall, over the sink" }
          ],
          dims: { "Ceiling height": "9'", "Island": "6' x 3'", "Flooring": "Tile" }
        },

        }
      ]
    },
    {

      wallHeight: 9,
      rooms: [
        {
          id: "master",
          label: "Master Bedroom",
          x: 0, z: 0, width: 16, depth: 14,
          color: 0xff8f4f,
          floor: { type: "hardwood" },
          windows: [
            { wall: "south", offset: 3, width: 4, height: 5, sill: 2.5, label: "Window 1 — south wall, over the bed" },
            { wall: "west",  offset: 4, width: 3, height: 5, sill: 2.5, label: "Window 2 — west wall, faces backyard" }
          ],

            { wall: "east", offset: 1, width: 3, height: 7, label: "Bedroom door" }
          ],

            "Ceiling height": "9'",
            "Closet 1 (walk-in)": "6' x 5'",

          }
        },
        {

          x: 16, z: 0, width: 12, depth: 12,
          color: 0xff4f88,

          windows: [
            { wall: "north", offset: 4, width: 3, height: 4, sill: 3, label: "Window 1 — north wall" }
          ],

        },
        {
          id: "bath",
          label: "Bathroom",
          x: 16, z: 12, width: 8, depth: 8,
          color: 0x4fd0ff,
          floor: { type: "tile" },
          windows: [
            { wall: "east", offset: 2, width: 2, height: 2, sill: 4.5, label: "Window 1 — east wall, over the tub" }
          ],
          dims: { "Vanity": "5' x 2'", "Flooring": "Tile" }
        }
      ]
    }
  ],

  /* ---------------------------------------------------------------
     OUTSIDE / PROPERTY VIEW
     Same coordinate system as the floors above (feet, same origin).
     structures  → buildings (get real siding texture + a gable roof
                   automatically). color = default siding tint for all 4
                   sides. Optionally override individual sides with
                   faceColors, e.g. if a gable end or accent wall is a
                   different color:
                     faceColors: { north: 0xffffff, south: 0x8a4a2f }
                   (any side you don't list falls back to "color")
                   Set roof:false to skip the roof, or roofHeight/roofColor
                   to tweak it.
     surfaces    → flat ground features: driveway, walkway, patio, grass
                   type: 'driveway' | 'walkway' | 'patio' | 'grass'
  ----------------------------------------------------------------*/
  exterior: {
    name: "Outside",
    structures: [
      {
        id: "house",
        label: "House (footprint)",
        x: 0, z: 0, width: 32, depth: 22, height: 20,

      },
      {
        id: "barn",
        label: "Barn",
        x: 70, z: 40, width: 30, depth: 24, height: 18,

        roofHeight: 8, roofColor: 0x39342f,

      }
    ],
    surfaces: [
      {

        type: "driveway",
        x: -22, z: 4, width: 20, depth: 12,
        dims: { "Surface": "Asphalt" }
      },
      {
        id: "walkway",
        label: "Front Walkway",
        type: "walkway",
        x: -2, z: 22, width: 4, depth: 8,

      },
      {
        id: "yard",

        x: -10, z: -10, width: 110, depth: 90,

      }
    ]
  }
};
/* ===================================================================== */


// ---------- Sanity check: make sure libraries actually loaded ----------
if (typeof THREE === 'undefined' || typeof THREE.OrbitControls === 'undefined' || typeof THREE.CSS2DRenderer === 'undefined') {
  document.getElementById('canvas-wrap').innerHTML =
    '<div style="color:#fff;padding:40px;font-family:sans-serif;max-width:500px">' +
    '<h2>Could not load 3D libraries</h2>' +
    '<p>A required script failed to load from the CDN. Check your internet connection, ' +
    'or that the &lt;script&gt; tag URLs in this file are reachable, then reload the page.</p></div>';
  throw new Error('A required THREE.js library failed to load');
}

// ---------- Three.js setup ----------
const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b1d22);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
wrap.appendChild(renderer.domElement);

const labelRenderer = new THREE.CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.left = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
wrap.appendChild(labelRenderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2 - 0.02;

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(60, 90, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -150;
sun.shadow.camera.right = 150;
sun.shadow.camera.top = 150;
sun.shadow.camera.bottom = -150;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
sun.shadow.bias = -0.0015;
scene.add(sun);

const grid = new THREE.GridHelper(240, 60, 0x333844, 0x2a2d33);
grid.position.y = 0.01;
scene.add(grid);

// Ground plane so buildings/rooms cast a real shadow onto something
const groundGeo = new THREE.PlaneGeometry(600, 600);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e2025, roughness: 1 });
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.position.y = -0.02;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Procedural floor / ground textures (no external image files) ----------
function makeCanvasTexture(drawFn, size = 256) {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawFn(ctx, size);
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

const BASE_TEXTURES = {
  hardwood: makeCanvasTexture((ctx, s) => {
    const planks = 6, plankH = s / planks;
    for (let i = 0; i < planks; i++) {
      const shade = 118 + Math.floor(Math.random() * 26) - 13;
      ctx.fillStyle = `rgb(${shade + 42},${shade},${shade - 48})`;
      ctx.fillRect(0, i * plankH, s, plankH);
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      for (let g = 0; g < 4; g++) {
        const y = i * plankH + Math.random() * plankH;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(s, y + (Math.random() * 4 - 2)); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath(); ctx.moveTo(0, i * plankH); ctx.lineTo(s, i * plankH); ctx.stroke();
    }
  }),
  carpet: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#8f8478'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 3500; i++) {
      ctx.fillStyle = `rgba(0,0,0,${0.02 + Math.random() * 0.05})`;
      ctx.fillRect(Math.random() * s, Math.random() * s, 1.5, 1.5);
    }
  }),
  tile: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#d8d3c8'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 3;
    const grid2 = 4;
    for (let i = 0; i <= grid2; i++) {
      const p = i * s / grid2;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(s, p); ctx.stroke();
    }
  }),
  concrete: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#9a9a95'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 2200; i++) {
      ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.06})`;
      ctx.fillRect(Math.random() * s, Math.random() * s, 2, 2);
    }
  }),
  vinyl: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#cfc9bd'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    for (let i = 0; i < 6; i++) { const p = i * s / 6; ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, s); ctx.stroke(); }
  }),
  driveway: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#2b2b2e'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 3200; i++) {
      ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
      ctx.fillRect(Math.random() * s, Math.random() * s, 1.5, 1.5);
    }
  }),
  walkway: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#b7b2a6'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    const grid3 = 3;
    for (let i = 0; i <= grid3; i++) {
      const p = i * s / grid3;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(s, p); ctx.stroke();
    }
  }),
  patio: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#a89f8f'; ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    const grid4 = 4;
    for (let i = 0; i <= grid4; i++) {
      const p = i * s / grid4;
      ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(s, p); ctx.stroke();
    }
  }),
  grass: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#4c7a3d'; ctx.fillRect(0, 0, s, s);
    for (let i = 0; i < 4500; i++) {
      ctx.fillStyle = `rgba(${20 + Math.random() * 40},${60 + Math.random() * 50},${20 + Math.random() * 30},0.5)`;
      ctx.fillRect(Math.random() * s, Math.random() * s, 2, 3);
    }
  }),
  siding: makeCanvasTexture((ctx, s) => {
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, s, s);
    const rows = 10, rowH = s / rows;
    for (let i = 0; i < rows; i++) {
      const y = i * rowH;
      ctx.fillStyle = i % 2 === 0 ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.05)';
      ctx.fillRect(0, y, s, rowH);
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(0, y + rowH - 2, s, 2);
    }
  })
};

function getTiledTexture(type, width, depth, tileSize = 4) {
  const base = BASE_TEXTURES[type] || BASE_TEXTURES.concrete;
  const tex = base.clone();
  tex.needsUpdate = true;
  tex.repeat.set(Math.max(1, width / tileSize), Math.max(1, depth / tileSize));
  return tex;
}

function getSidingMaterial(faceWidth, wallHeight, tintColor) {
  const tex = BASE_TEXTURES.siding.clone();
  tex.needsUpdate = true;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(Math.max(1, faceWidth / 6), Math.max(1, wallHeight / 1.1));
  return new THREE.MeshStandardMaterial({ map: tex, color: tintColor, roughness: 0.85, metalness: 0.02 });
}

// ---------- Shared state ----------
const views = [];
const clickableFeatures = []; // { mesh, item, group } — windows & doors (checked first)
const clickableBoxes = [];    // { mesh, item, group } — rooms, buildings, ground surfaces
const labels = [];            // { cssObj, group }

function addLabel(text, x, y, z, group, small = false) {
  const div = document.createElement('div');
  div.className = small ? 'room-label small-label' : 'room-label';
  div.textContent = text;
  const obj = new THREE.CSS2DObject(div);
  obj.position.set(x, y, z);
  group.add(obj);
  labels.push({ cssObj: obj, group });
}

// ---------- Wall-mounted windows & doors ----------
function addWallFeature(room, feature, kind, group) {
  const w = feature.width, h = feature.height;
  const bottom = kind === 'window' ? (feature.sill || 0) : 0;
  const centerY = bottom + h / 2;
  let px, pz, rotY, nx, nz;

  switch (feature.wall) {
    case 'south': px = room.x + feature.offset + w/2; pz = room.z;              rotY = 0;          nx = 0;  nz = -1; break;
    case 'north': px = room.x + feature.offset + w/2; pz = room.z + room.depth; rotY = 0;          nx = 0;  nz = 1;  break;
    case 'west':  px = room.x;                         pz = room.z + feature.offset + w/2; rotY = Math.PI/2; nx = -1; nz = 0;  break;
    case 'east':  px = room.x + room.width;             pz = room.z + feature.offset + w/2; rotY = Math.PI/2; nx = 1;  nz = 0;  break;
    default: return;
  }

  const eps = 0.3;
  const geo = new THREE.PlaneGeometry(w, h);
  const color = kind === 'window' ? 0x9fd8ff : 0x6b4a30;
  const opacity = kind === 'window' ? 0.75 : 0.95;
  const mat = new THREE.MeshStandardMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(px + nx * eps, centerY, pz + nz * eps);
  mesh.rotation.y = rotY;
  group.add(mesh);

  const dims = Object.assign(
    { "Size": `${w}' x ${h}'`, "Wall": feature.wall.charAt(0).toUpperCase() + feature.wall.slice(1) },
    kind === 'window' ? { "Sill height": `${bottom}'` } : {},
    feature.extra || {}
  );
  const itemData = { label: feature.label || (kind === 'window' ? 'Window' : 'Door'), dims };
  mesh.userData.item = itemData;
  clickableFeatures.push({ mesh, item: itemData, group });

  addLabel(kind === 'window' ? 'W' : 'D', px, centerY, pz, group, true);
}

// ---------- Interior rooms: thin walls (with real door gaps) + textured floor ----------
function buildWallsForRoom(room, wallHeight, group) {
  const thickness = 0.35;
  const wallDefs = [
    { wall: 'south', axis: 'x', length: room.width, fixed: room.z },
    { wall: 'north', axis: 'x', length: room.width, fixed: room.z + room.depth },
    { wall: 'west',  axis: 'z', length: room.depth, fixed: room.x },
    { wall: 'east',  axis: 'z', length: room.depth, fixed: room.x + room.width }
  ];

  wallDefs.forEach(def => {
    const gaps = (room.doors || [])
      .filter(d => d.wall === def.wall)
      .map(d => ({ start: d.offset, end: d.offset + d.width }))
      .sort((a, b) => a.start - b.start);

    let segments = [];
    let cursor = 0;
    gaps.forEach(g => {
      if (g.start > cursor) segments.push([cursor, g.start]);
      cursor = Math.max(cursor, g.end);
    });
    if (cursor < def.length) segments.push([cursor, def.length]);

    segments.forEach(([s, e]) => {
      const segLen = e - s;
      if (segLen < 0.05) return;
      const w = def.axis === 'x' ? segLen : thickness;
      const d = def.axis === 'x' ? thickness : segLen;
      const geo = new THREE.BoxGeometry(w, wallHeight, d);
      const mat = new THREE.MeshStandardMaterial({ color: room.color, roughness: 0.85, metalness: 0.05 });
      const mesh = new THREE.Mesh(geo, mat);

      let cx, cz;
      if (def.axis === 'x') { cx = room.x + s + segLen/2; cz = def.fixed; }
      else { cx = def.fixed; cz = room.z + s + segLen/2; }
      mesh.position.set(cx, wallHeight/2, cz);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.item = room;
      group.add(mesh);
      clickableBoxes.push({ mesh, item: room, group });

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 })
      );
      edges.position.copy(mesh.position);
      group.add(edges);
    });
  });
}

function buildRoom(room, wallHeight, group) {
  const slabGeo = new THREE.BoxGeometry(room.width, 0.2, room.depth);
  let slabMat;
  if (room.floor && room.floor.type) {
    const tex = getTiledTexture(room.floor.type, room.width, room.depth, room.floor.tileSize || 4);
    slabMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.9 });
  } else {
    slabMat = new THREE.MeshStandardMaterial({ color: 0x2a2d33 });
  }
  const slab = new THREE.Mesh(slabGeo, slabMat);
  slab.position.set(room.x + room.width/2, 0, room.z + room.depth/2);
  slab.receiveShadow = true;
  slab.userData.item = room;
  group.add(slab);
  clickableBoxes.push({ mesh: slab, item: room, group });

  buildWallsForRoom(room, wallHeight, group);
  addLabel(room.label, room.x + room.width/2, wallHeight + 1.5, room.z + room.depth/2, group);

  (room.windows || []).forEach(w => addWallFeature(room, w, 'window', group));
  (room.doors || []).forEach(d => addWallFeature(room, d, 'door', group));
}

// ---------- Exterior buildings: solid box + automatic gable roof ----------
function buildGableRoofGeometry(width, depth, ridgeHeight) {
  let geo;
  if (width >= depth) {
    const half = depth / 2;
    const shape = new THREE.Shape();
    shape.moveTo(-half, 0); shape.lineTo(0, ridgeHeight); shape.lineTo(half, 0); shape.lineTo(-half, 0);
    geo = new THREE.ExtrudeGeometry(shape, { depth: width, bevelEnabled: false, steps: 1 });
    geo.rotateY(Math.PI / 2);
    geo.translate(-width / 2, 0, 0);
  } else {
    const half = width / 2;
    const shape = new THREE.Shape();
    shape.moveTo(-half, 0); shape.lineTo(0, ridgeHeight); shape.lineTo(half, 0); shape.lineTo(-half, 0);
    geo = new THREE.ExtrudeGeometry(shape, { depth: depth, bevelEnabled: false, steps: 1 });
    geo.translate(0, 0, -depth / 2);
  }
  return geo;
}

function faceColor(item, face) {
  return (item.faceColors && item.faceColors[face] !== undefined) ? item.faceColors[face] : item.color;
}

function buildStructure(item, group) {
  const height = item.height;
  const geo = new THREE.BoxGeometry(item.width, height, item.depth);

  // Box face order for a material array: +x, -x, +y, -y, +z, -z
  // In our coordinate system: +x = east, -x = west, +z = north, -z = south
  const matEast  = getSidingMaterial(item.depth,  height, faceColor(item, 'east'));
  const matWest  = getSidingMaterial(item.depth,  height, faceColor(item, 'west'));
  const matNorth = getSidingMaterial(item.width,  height, faceColor(item, 'north'));
  const matSouth = getSidingMaterial(item.width,  height, faceColor(item, 'south'));
  const capMat   = new THREE.MeshStandardMaterial({ color: 0x33363c, roughness: 0.9 });   // top, hidden under roof
  const baseMat  = new THREE.MeshStandardMaterial({ color: 0x2a2d33, roughness: 1 });      // foundation, mostly hidden

  const mesh = new THREE.Mesh(geo, [matEast, matWest, capMat, baseMat, matNorth, matSouth]);
  mesh.position.set(item.x + item.width/2, height/2, item.z + item.depth/2);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.item = item;
  group.add(mesh);
  clickableBoxes.push({ mesh, item, group });

  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 })
  );
  edges.position.copy(mesh.position);
  group.add(edges);

  let ridgeHeight = 0;
  if (item.roof !== false) {
    ridgeHeight = item.roofHeight || Math.max(4, Math.min(10, Math.max(item.width, item.depth) * 0.25));
    const roofGeo = buildGableRoofGeometry(item.width, item.depth, ridgeHeight);
    const roofMat = new THREE.MeshStandardMaterial({ color: item.roofColor || 0x54463f, roughness: 0.75 });
    const roofMesh = new THREE.Mesh(roofGeo, roofMat);
    roofMesh.position.set(item.x + item.width/2, height, item.z + item.depth/2);
    roofMesh.castShadow = true;
    roofMesh.receiveShadow = true;
    group.add(roofMesh);
  }

  addLabel(item.label, item.x + item.width/2, height + ridgeHeight + 1.5, item.z + item.depth/2, group);
}

// ---------- Flat ground surfaces (driveway, walkway, patio, grass) ----------
function buildSurface(surface, group) {
  const height = 0.15;
  const geo = new THREE.BoxGeometry(surface.width, height, surface.depth);
  const tex = getTiledTexture(surface.type, surface.width, surface.depth, surface.tileSize || 6);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(surface.x + surface.width/2, height/2, surface.z + surface.depth/2);
  mesh.receiveShadow = true;
  mesh.userData.item = surface;
  group.add(mesh);
  clickableBoxes.push({ mesh, item: surface, group });
  addLabel(surface.label, surface.x + surface.width/2, height + 1, surface.z + surface.depth/2, group, true);
}

// ---------- Square footage math ----------
const floorAreas = HOUSE.floors.map(f => f.rooms.reduce((sum, r) => sum + r.width * r.depth, 0));
const totalHouseArea = floorAreas.reduce((a, b) => a + b, 0);
const structuresArea = HOUSE.exterior.structures.reduce((sum, s) => sum + s.width * s.depth, 0);

// Floors
HOUSE.floors.forEach((floorData, idx) => {
  const group = new THREE.Group();
  group.visible = false;
  floorData.rooms.forEach(room => buildRoom(room, floorData.wallHeight, group));
  scene.add(group);

  let maxX = 0, maxZ = 0;
  floorData.rooms.forEach(r => { maxX = Math.max(maxX, r.x + r.width); maxZ = Math.max(maxZ, r.z + r.depth); });

  views.push({
    label: floorData.name,
    group,
    camPos: new THREE.Vector3(maxX*0.9 + 10, Math.max(maxX,maxZ)*0.9 + 10, maxZ*0.9 + 20),
    camTarget: new THREE.Vector3(maxX/2, 0, maxZ/2),
    statsText: `${Math.round(floorAreas[idx])} sq ft this floor · ${Math.round(totalHouseArea)} sq ft total`
  });
});

// Exterior (buildings + ground surfaces)
{
  const group = new THREE.Group();
  group.visible = false;
  const ext = HOUSE.exterior;

  (ext.surfaces || []).forEach(s => buildSurface(s, group));
  ext.structures.forEach(s => buildStructure(s, group));
  scene.add(group);

  let minX = 0, minZ = 0, maxX = 0, maxZ = 0;
  const allFootprints = [...ext.structures, ...(ext.surfaces || [])];
  allFootprints.forEach(s => {
    minX = Math.min(minX, s.x); minZ = Math.min(minZ, s.z);
    maxX = Math.max(maxX, s.x + s.width); maxZ = Math.max(maxZ, s.z + s.depth);
  });
  const spanX = maxX - minX, spanZ = maxZ - minZ;
  const span = Math.max(spanX, spanZ);

  views.push({
    label: ext.name,
    group,
    camPos: new THREE.Vector3(minX + spanX*0.7 + span*0.5, span*0.9, minZ + spanZ*0.4 + span*0.9),
    camTarget: new THREE.Vector3(minX + spanX/2, 0, minZ + spanZ/2),
    statsText: `${Math.round(structuresArea)} sq ft under roof`
  });
}

// ---------- View toggle buttons ----------
const toggleBar = document.getElementById('floorToggle');
const statsEl = document.getElementById('stats');
views.forEach((v, i) => {
  const b = document.createElement('button');
  b.textContent = v.label;
  if (i === 0) b.classList.add('active');
  b.addEventListener('click', () => setView(i));
  toggleBar.appendChild(b);
});

// Smooth camera transition between views
let camTransition = null;
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2; }

function setView(index) {
  views.forEach((v, i) => v.group.visible = (i === index));
  Array.from(toggleBar.children).forEach((btn, i) => btn.classList.toggle('active', i === index));
  labels.forEach(l => { l.cssObj.visible = l.group.visible; });
  statsEl.textContent = views[index].statsText;

  const v = views[index];
  camTransition = {
    fromPos: camera.position.clone(),
    fromTarget: controls.target.clone(),
    toPos: v.camPos.clone(),
    toTarget: v.camTarget.clone(),
    start: performance.now(),
    duration: 900
  };
}
setView(0);

// ---------- Raycasting / interaction (mouse + touch) ----------
const raycaster = new THREE.Raycaster();
const tooltip = document.getElementById('tooltip');

function activeMeshes(list) {
  return list.filter(c => c.group.visible).map(c => c.mesh);
}

function ndcFromClient(clientX, clientY) {
  return new THREE.Vector2((clientX / window.innerWidth) * 2 - 1, -(clientY / window.innerHeight) * 2 + 1);
}

// Windows/doors are checked first — otherwise the room's own wall
// (which the tap ray also passes through) would win the hit test
// even when the user is clearly tapping a window or door.
function raycastPick(clientX, clientY) {
  raycaster.setFromCamera(ndcFromClient(clientX, clientY), camera);
  let hits = raycaster.intersectObjects(activeMeshes(clickableFeatures));
  if (hits.length > 0) return hits[0];
  hits = raycaster.intersectObjects(activeMeshes(clickableBoxes));
  if (hits.length > 0) return hits[0];
  return null;
}

function trySelect(clientX, clientY) {
  const hit = raycastPick(clientX, clientY);
  if (hit) { openPanel(hit.object.userData.item); return true; }
  return false;
}

renderer.domElement.addEventListener('mousemove', (e) => {
  const hit = raycastPick(e.clientX, e.clientY);
  if (hit) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.textContent = hit.object.userData.item.label;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', (e) => trySelect(e.clientX, e.clientY));

let touchStart = null;
renderer.domElement.addEventListener('touchstart', (e) => {
  touchStart = (e.touches.length === 1) ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : null;
}, { passive: true });

renderer.domElement.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const moved = Math.hypot(t.clientX - touchStart.x, t.clientY - touchStart.y);
  touchStart = null;
  if (moved < 12) trySelect(t.clientX, t.clientY);
}, { passive: true });

// ---------- Popup panel ----------
const overlay = document.getElementById('overlay');
const panelTitle = document.getElementById('panel-title');
const panelBody = document.getElementById('panel-body');
const panelClose = document.getElementById('panel-close');

function dimsForDisplay(item) {
  if (item.width && item.depth) {
    const area = Math.round(item.width * item.depth);
    return Object.assign({ "Area": `${area} sq ft` }, item.dims);
  }
  return item.dims;
}

function openPanel(item) {
  labelRenderer.domElement.style.display = 'none';
  panelTitle.textContent = item.label;
  panelBody.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'Dimensions & details';
  panelBody.appendChild(title);
  Object.entries(dimsForDisplay(item)).forEach(([label, value]) => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `<span class="dim-label">${label}</span><span class="dim-value">${value}</span>`;
    panelBody.appendChild(row);
  });
  overlay.style.display = 'flex';
}
function closePanel() {
  overlay.style.display = 'none';
  labelRenderer.domElement.style.display = '';
}
panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

// ---------- Render loop ----------
function animate() {
  requestAnimationFrame(animate);

  if (camTransition) {
    const now = performance.now();
    const t = Math.min(1, (now - camTransition.start) / camTransition.duration);
    const e = easeInOutCubic(t);
    camera.position.lerpVectors(camTransition.fromPos, camTransition.toPos, e);
    controls.target.lerpVectors(camTransition.fromTarget, camTransition.toTarget, e);
    if (t >= 1) camTransition = null;
  }

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
