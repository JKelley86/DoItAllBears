<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>House 3D Viewer</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#1b1d22; touch-action:none; }
  #canvas-wrap { position:absolute; inset:0; }
  canvas { display:block; }

  #topbar {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; box-sizing:border-box;
    pointer-events:none;
  }
  #topbar > * { pointer-events:auto; }

  #floorToggle {
    display:flex; background:#26292f; border:1px solid #383c44; border-radius:10px;
    overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,0.35);
  }
  #floorToggle button {
    border:none; background:transparent; color:#9aa0aa; font-size:13px; font-weight:600;
    padding:10px 14px; cursor:pointer; transition:background .15s, color .15s; white-space:nowrap;
  }
  #floorToggle button.active { background:#4f7cff; color:#fff; }
  #floorToggle button:hover:not(.active) { background:#2f333b; color:#fff; }

  #hint {
    color:#7a808c; font-size:12px; background:#26292f; border:1px solid #383c44;
    padding:8px 12px; border-radius:10px; max-width:40vw;
  }
  @media (max-width: 640px) {
    #hint { display:none; }
  }

  #tooltip {
    position:absolute; pointer-events:none; background:#0f1013; color:#fff;
    padding:6px 10px; border-radius:6px; font-size:13px; display:none; z-index:5;
    border:1px solid #383c44;
  }

  /* Popup */
  #overlay {
    position:absolute; inset:0; background:rgba(10,11,13,0.55);
    display:none; align-items:center; justify-content:center; z-index:10;
    backdrop-filter: blur(2px);
  }
  #panel {
    width:380px; max-width:90vw; max-height:80vh; overflow-y:auto;
    background:#1f2126; border:1px solid #383c44; border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5); color:#e7e9ec;
  }
  #panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px; border-bottom:1px solid #33363d;
  }
  #panel-header h2 { margin:0; font-size:18px; }
  #panel-close {
    background:#2c2f36; border:1px solid #3a3e46; color:#c9cdd4; width:34px; height:34px;
    border-radius:8px; cursor:pointer; font-size:16px; line-height:1;
  }
  #panel-close:hover { background:#3a3e46; color:#fff; }
  #panel-body { padding:16px 20px 20px; }
  .section-title {
    font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#7a808c;
    margin:16px 0 8px; font-weight:700;
  }
  .section-title:first-child { margin-top:0; }
  .dim-row {
    display:flex; justify-content:space-between; padding:7px 0;
    border-bottom:1px solid #2a2d33; font-size:14px; gap:12px;
  }
  .dim-row:last-child { border-bottom:none; }
  .dim-label { color:#c9cdd4; }
  .dim-value { color:#8fb0ff; font-weight:600; text-align:right; }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="topbar">
  <div id="floorToggle"></div>
  <div id="hint">Tap/click a room or building for details · drag to orbit · pinch/scroll to zoom</div>
</div>

<div id="tooltip"></div>

<div id="overlay">
  <div id="panel">
    <div id="panel-header">
      <h2 id="panel-title">Room</h2>
      <button id="panel-close">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
/* =====================================================================
   1) HOUSE DATA — EDIT THIS SECTION WITH YOUR REAL HOUSE INFO
   =====================================================================
   All dimensions are in FEET. Coordinates: x = left/right, z = front/back.
   (0,0) can be anywhere you like — it's just the corner you measure from.
   Each room/structure is a rectangle: x, z (bottom-left corner), width, depth.
   Add as many "dims" lines as you want per room (closets, windows, notes...).
*/
const HOUSE = {
  floors: [
    {
      name: "1st Floor",
      wallHeight: 9,
      rooms: [
        {
          id: "living",
          label: "Living Room",
          x: 0, z: 0, width: 18, depth: 14,
          color: 0x4f7cff,
          dims: {
            "Room size": "18' x 14'",
            "Ceiling height": "9'",
            "Windows": "2x (4' x 5')",
            "Flooring": "Hardwood"
          }
        },
        {
          id: "kitchen",
          label: "Kitchen",
          x: 18, z: 0, width: 14, depth: 14,
          color: 0x4fd88c,
          dims: {
            "Room size": "14' x 14'",
            "Ceiling height": "9'",
            "Window": "1x (3' x 4')",
            "Island": "6' x 3'"
          }
        },
        {
          id: "entry",
          label: "Entryway",
          x: 0, z: 14, width: 8, depth: 8,
          color: 0xd8c04f,
          dims: {
            "Room size": "8' x 8'",
            "Closet": "3' x 2'"
          }
        }
      ]
    },
    {
      name: "2nd Floor",
      wallHeight: 9,
      rooms: [
        {
          id: "master",
          label: "Master Bedroom",
          x: 0, z: 0, width: 16, depth: 14,
          color: 0xff8f4f,
          dims: {
            "Room size": "16' x 14'",
            "Ceiling height": "9'",
            "Closet 1 (walk-in)": "6' x 5'",
            "Closet 2": "4' x 2'",
            "Window 1": "4' x 5'",
            "Window 2": "3' x 5'",
            "Flooring": "Carpet"
          }
        },
        {
          id: "bed2",
          label: "Bedroom 2",
          x: 16, z: 0, width: 12, depth: 12,
          color: 0xff4f88,
          dims: {
            "Room size": "12' x 12'",
            "Closet": "5' x 2'",
            "Window": "3' x 4'"
          }
        },
        {
          id: "bath",
          label: "Bathroom",
          x: 16, z: 12, width: 8, depth: 8,
          color: 0x4fd0ff,
          dims: {
            "Room size": "8' x 8'",
            "Window": "2' x 2'",
            "Vanity": "5' x 2'"
          }
        }
      ]
    }
  ],

  /* ---------------------------------------------------------------
     OUTSIDE / PROPERTY VIEW
     Same coordinate system as the floors above (feet, same origin),
     so a structure's x/z is its real position relative to the house.
     Add as many outbuildings as you want (barn, garage, shed...).
     "height" here is just for the 3D box, not a formal ceiling height.
  ----------------------------------------------------------------*/
  exterior: {
    name: "Outside",
    structures: [
      {
        id: "house",
        label: "House (footprint)",
        x: 0, z: 0, width: 32, depth: 22, height: 20,
        color: 0x8a8f99,
        dims: {
          "Footprint": "32' x 22'",
          "Stories": "2",
          "Approx. total height": "20'"
        }
      },
      {
        id: "barn",
        label: "Barn",
        x: 70, z: 40, width: 30, depth: 24, height: 18,
        color: 0x8a4a2f,
        dims: {
          "Footprint": "30' x 24'",
          "Approx. height": "18' at peak",
          "Bay doors": "2x (10' x 10')",
          "Distance from house": "~85'"
        }
      }
    ]
  }
};
/* ===================================================================== */


// ---------- Sanity check: make sure libraries actually loaded ----------
if (typeof THREE === 'undefined' || typeof THREE.OrbitControls === 'undefined') {
  document.getElementById('canvas-wrap').innerHTML =
    '<div style="color:#fff;padding:40px;font-family:sans-serif;max-width:500px">' +
    '<h2>Could not load 3D libraries</h2>' +
    '<p>The three.js or OrbitControls script failed to load from the CDN. ' +
    'Check your internet connection, or that the &lt;script&gt; tag URLs in this file are reachable, then reload the page.</p></div>';
  throw new Error('THREE or THREE.OrbitControls failed to load');
}

// ---------- Three.js setup ----------
const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b1d22);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
wrap.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2 - 0.02;

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(25, 40, 15);
scene.add(sun);

const grid = new THREE.GridHelper(240, 60, 0x333844, 0x2a2d33);
scene.add(grid);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Build one "view" (a floor, or the exterior) ----------
// Each entry has: { label, group, camPos, camTarget }
const views = [];
const clickable = []; // { mesh, item, group } — item = room or structure data

function buildBoxItem(item, height, group, opacity) {
  const geo = new THREE.BoxGeometry(item.width, height, item.depth);
  const mat = new THREE.MeshStandardMaterial({
    color: item.color, transparent: true, opacity: opacity,
    metalness: 0.1, roughness: 0.7
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(item.x + item.width/2, height/2, item.z + item.depth/2);
  mesh.userData.item = item;
  group.add(mesh);

  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent:true, opacity:0.25 })
  );
  edges.position.copy(mesh.position);
  group.add(edges);

  const slabGeo = new THREE.BoxGeometry(item.width, 0.2, item.depth);
  const slabMat = new THREE.MeshStandardMaterial({ color: 0x2a2d33 });
  const slab = new THREE.Mesh(slabGeo, slabMat);
  slab.position.set(item.x + item.width/2, 0, item.z + item.depth/2);
  group.add(slab);

  clickable.push({ mesh, item, group });
}

// Floors
HOUSE.floors.forEach((floorData) => {
  const group = new THREE.Group();
  group.visible = false;
  floorData.rooms.forEach(room => buildBoxItem(room, floorData.wallHeight, group, 0.55));
  scene.add(group);

  // frame the rooms on this floor
  let maxX = 0, maxZ = 0;
  floorData.rooms.forEach(r => { maxX = Math.max(maxX, r.x+r.width); maxZ = Math.max(maxZ, r.z+r.depth); });

  views.push({
    label: floorData.name,
    group,
    camPos: new THREE.Vector3(maxX*0.9 + 10, Math.max(maxX,maxZ)*0.9 + 10, maxZ*0.9 + 20),
    camTarget: new THREE.Vector3(maxX/2, 0, maxZ/2)
  });
});

// Exterior (house + outbuildings), zoomed out further
{
  const group = new THREE.Group();
  group.visible = false;
  const ext = HOUSE.exterior;
  ext.structures.forEach(s => buildBoxItem(s, s.height, group, 0.7));
  scene.add(group);

  let minX=0, minZ=0, maxX=0, maxZ=0;
  ext.structures.forEach(s => {
    minX = Math.min(minX, s.x); minZ = Math.min(minZ, s.z);
    maxX = Math.max(maxX, s.x+s.width); maxZ = Math.max(maxZ, s.z+s.depth);
  });
  const spanX = maxX-minX, spanZ = maxZ-minZ;
  const span = Math.max(spanX, spanZ);

  views.push({
    label: ext.name,
    group,
    camPos: new THREE.Vector3(minX + spanX*0.7 + span*0.5, span*0.9, minZ + spanZ*0.4 + span*0.9),
    camTarget: new THREE.Vector3(minX + spanX/2, 0, minZ + spanZ/2)
  });
}

// ---------- View toggle buttons ----------
const toggleBar = document.getElementById('floorToggle');
let currentView = 0;

views.forEach((v, i) => {
  const b = document.createElement('button');
  b.textContent = v.label;
  if (i === 0) b.classList.add('active');
  b.addEventListener('click', () => setView(i));
  toggleBar.appendChild(b);
});

function setView(index) {
  currentView = index;
  views.forEach((v, i) => v.group.visible = (i === index));
  Array.from(toggleBar.children).forEach((btn, i) => btn.classList.toggle('active', i === index));

  const v = views[index];
  camera.position.copy(v.camPos);
  controls.target.copy(v.camTarget);
  controls.update();
}
setView(0);

// ---------- Raycasting / interaction (mouse + touch) ----------
const raycaster = new THREE.Raycaster();
const tooltip = document.getElementById('tooltip');

function getActiveMeshes() {
  return clickable.filter(c => c.group.visible).map(c => c.mesh);
}

function ndcFromClient(clientX, clientY) {
  return new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
}

function trySelect(clientX, clientY) {
  raycaster.setFromCamera(ndcFromClient(clientX, clientY), camera);
  const hits = raycaster.intersectObjects(getActiveMeshes());
  if (hits.length > 0) {
    openPanel(hits[0].object.userData.item);
    return true;
  }
  return false;
}

// Desktop hover tooltip
renderer.domElement.addEventListener('mousemove', (e) => {
  raycaster.setFromCamera(ndcFromClient(e.clientX, e.clientY), camera);
  const hits = raycaster.intersectObjects(getActiveMeshes());
  if (hits.length > 0) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.textContent = hits[0].object.userData.item.label;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

// Desktop click
renderer.domElement.addEventListener('click', (e) => {
  trySelect(e.clientX, e.clientY);
});

// Mobile tap — distinguished from a drag/orbit gesture by movement distance
let touchStart = null;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else {
    touchStart = null; // multi-touch = pinch zoom, not a tap
  }
}, { passive: true });

renderer.domElement.addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const moved = Math.sqrt(dx*dx + dy*dy);
  touchStart = null;
  if (moved < 12) { // it was a tap, not a drag-to-orbit
    trySelect(t.clientX, t.clientY);
  }
}, { passive: true });

// ---------- Popup panel ----------
const overlay = document.getElementById('overlay');
const panelTitle = document.getElementById('panel-title');
const panelBody = document.getElementById('panel-body');
const panelClose = document.getElementById('panel-close');

function openPanel(item) {
  panelTitle.textContent = item.label;
  panelBody.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = 'Dimensions & details';
  panelBody.appendChild(title);

  Object.entries(item.dims).forEach(([label, value]) => {
    const row = document.createElement('div');
    row.className = 'dim-row';
    row.innerHTML = `<span class="dim-label">${label}</span><span class="dim-value">${value}</span>`;
    panelBody.appendChild(row);
  });

  overlay.style.display = 'flex';
}

function closePanel() {
  overlay.style.display = 'none';
}
panelClose.addEventListener('click', closePanel);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closePanel();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePanel();
});

// ---------- Render loop ----------
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
