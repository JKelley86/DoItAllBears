<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Family Grocery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --card2: #F9F9FB;
  --text: #1C1C1E;
  --text2: #3A3A3C;
  --muted: #8E8E93;
  --border: rgba(0,0,0,0.08);
  --accent: #34C759;
  --accent-dark: #248A3D;
  --accent-light: #E8F9EC;
  --danger: #FF3B30;
  --danger-light: #FFF1F0;
  --blue: #007AFF;
  --blue-light: #EBF4FF;
  --orange: #FF9500;
  --orange-light: #FFF5E6;
  --purple: #AF52DE;
  --purple-light: #F5EDFB;
  --teal: #5AC8FA;
  --teal-light: #EAF7FE;
  --pink: #FF2D55;
  --pink-light: #FFF0F3;
  --yellow: #FFCC00;
  --yellow-light: #FFFBE6;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', -apple-system, sans-serif;
  height: 100%;
  overflow-x: hidden;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

body {
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: calc(100px + var(--safe-bottom));
}

/* ── HEADER ── */
.header {
  padding: calc(var(--safe-top) + 8px) 20px 12px;
  background: rgba(242,242,247,0.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.header-title {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--text);
}

.header-subtitle {
  font-size: 13px;
  color: var(--muted);
  font-weight: 600;
  margin-top: 1px;
}

.header-btns { display: flex; gap: 8px; }

.theme-btn, .map-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--card);
  border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.15s;
}
.theme-btn:active, .map-btn:active { transform: scale(0.92); }

/* Search bar */
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 16px; pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border-radius: 12px; border: none;
  background: rgba(142,142,147,0.12);
  font-family: 'Nunito', sans-serif; font-size: 15px;
  color: var(--text); outline: none;
}
.search-input::placeholder { color: var(--muted); }

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  padding: 8px 14px 0;
  gap: 6px;
}
.tab-btn {
  flex: 1;
  padding: 8px 4px;
  border-radius: 10px;
  border: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab-btn.active {
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.tab-btn:active { transform: scale(0.96); }

/* ── STORE FILTER PILLS ── */
.store-filter {
  padding: 10px 0 4px 14px;
  display: flex; gap: 8px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.store-filter::-webkit-scrollbar { display: none; }

.store-pill {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px; border: none;
  background: var(--card);
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  color: var(--text);
}
.store-pill.active { background: var(--text); color: #fff; }
.store-pill:active { transform: scale(0.95); }
.store-pill .pill-icon { font-size: 15px; }

/* ── CONTENT ── */
.content { padding: 8px 14px 0; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── SUMMARY STRIP ── */
.summary { display: flex; gap: 10px; margin-bottom: 16px; }
.summary-card {
  flex: 1; background: var(--card);
  border-radius: 14px; padding: 12px 14px;
  box-shadow: var(--shadow-sm); text-align: center;
}
.summary-num { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1; }
.summary-label { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
.summary-card.done .summary-num { color: var(--accent); }
.summary-card.remaining .summary-num { color: var(--blue); }

/* ── CATEGORY SECTION ── */
.category-section {
  margin-bottom: 12px; border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow-sm); background: var(--card);
}
.category-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; cursor: pointer; user-select: none;
  transition: background 0.15s; -webkit-tap-highlight-color: transparent;
}
.category-header:active { background: rgba(0,0,0,0.03); }
.cat-emoji {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 15px; font-weight: 800; color: var(--text); line-height: 1.2; }
.cat-count { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 1px; }
.cat-badge {
  min-width: 22px; height: 22px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; padding: 0 6px; flex-shrink: 0;
}
.cat-chevron {
  color: var(--muted); font-size: 12px; font-weight: 800;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0;
}
.category-section.open .cat-chevron { transform: rotate(90deg); }

.items-list { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.category-section.open .items-list { max-height: 2000px; }
.items-inner {
  padding: 10px 12px 12px; display: flex; flex-direction: column;
  gap: 8px; border-top: 1px solid var(--border);
}

/* ── ITEM ROW ── */
.item-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 10px 12px 14px;
  background: var(--card2); border-radius: 12px;
  position: relative; user-select: none; -webkit-user-select: none;
  transition: opacity 0.2s, transform 0.2s;
}
.item-row.deleting { opacity: 0; transform: scale(0.95); }

.item-check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border); background: transparent;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  color: transparent; font-size: 13px;
}
.item-row.checked .item-check { background: var(--accent); border-color: var(--accent); color: white; }

.item-body { flex: 1; min-width: 0; }
.item-name {
  font-size: 15px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s;
}
.item-row.checked .item-name { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--muted); }

.item-meta {
  display: flex; align-items: center; gap: 5px; margin-top: 3px; flex-wrap: wrap;
}

/* Store icon badge */
.store-icon {
  width: 20px; height: 20px; border-radius: 5px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; flex-shrink: 0;
}

/* Aisle chip */
.aisle-chip {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 6px; border-radius: 20px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.02em;
  white-space: nowrap; flex-shrink: 0;
}

.item-del-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--danger-light); border: none;
  color: var(--danger); font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; -webkit-tap-highlight-color: transparent;
}

/* ── RECIPE SECTION ── */
.recipe-header-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.recipe-section-title {
  font-size: 20px; font-weight: 900; color: var(--text);
}
.new-recipe-btn {
  padding: 8px 14px; border-radius: 20px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all 0.15s;
}
.new-recipe-btn:active { transform: scale(0.95); }

.recipe-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); margin-bottom: 12px; overflow: hidden;
}
.recipe-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.recipe-emoji {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--orange-light);
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.recipe-info { flex: 1; min-width: 0; }
.recipe-name { font-size: 15px; font-weight: 800; color: var(--text); }
.recipe-count { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 1px; }
.recipe-chevron {
  color: var(--muted); font-size: 12px; font-weight: 800;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.recipe-card.open .recipe-chevron { transform: rotate(90deg); }

.recipe-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.recipe-card.open .recipe-body { max-height: 1000px; }

.recipe-body-inner { padding: 0 14px 14px; border-top: 1px solid var(--border); }

.recipe-ingredient-list { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
.recipe-ing-row {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px; background: var(--card2); border-radius: 10px;
}
.recipe-ing-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--text); }
.recipe-ing-qty { font-size: 12px; color: var(--muted); font-weight: 600; }
.recipe-ing-del {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--danger-light); border: none;
  color: var(--danger); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}

.add-ing-row {
  display: flex; gap: 6px; margin-top: 10px;
}
.add-ing-input {
  flex: 1; padding: 10px 12px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text); outline: none;
}
.add-ing-input:focus { border-color: var(--accent); }
.add-ing-qty {
  width: 72px; padding: 10px 8px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text); outline: none;
}
.add-ing-qty:focus { border-color: var(--accent); }
.add-ing-btn {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--accent); border: none; color: #fff;
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}

.recipe-actions {
  display: flex; gap: 8px; margin-top: 12px;
}
.add-all-btn {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.15s;
  box-shadow: 0 3px 12px rgba(52,199,89,0.3);
}
.add-all-btn:active { transform: scale(0.97); }
.del-recipe-btn {
  padding: 12px 16px; border-radius: 12px; border: none;
  background: var(--danger-light); color: var(--danger);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; transition: all 0.15s;
}
.del-recipe-btn:active { transform: scale(0.97); }

.recipe-empty {
  text-align: center; padding: 40px 20px;
  color: var(--muted); font-size: 14px; font-weight: 600;
}
.recipe-empty .re-emoji { font-size: 40px; margin-bottom: 10px; }

/* ── STORE MAP / AISLE GUIDE ── */
.map-panel {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 400;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  overflow-y: auto;
  max-width: 430px;
  margin: 0 auto;
  padding-bottom: calc(40px + var(--safe-bottom));
}
.map-panel.open { transform: translateX(0); }

.map-header {
  padding: calc(var(--safe-top) + 8px) 20px 16px;
  background: var(--card);
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-sm);
}
.map-back {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; flex-shrink: 0;
}
.map-title { font-size: 20px; font-weight: 900; color: var(--text); flex: 1; }

.map-store-tabs {
  display: flex; gap: 8px; padding: 12px 14px;
  overflow-x: auto; scrollbar-width: none;
}
.map-store-tabs::-webkit-scrollbar { display: none; }
.map-store-tab {
  flex-shrink: 0; padding: 7px 14px;
  border-radius: 20px; border: none;
  background: var(--card); color: var(--muted);
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; box-shadow: var(--shadow-sm);
  display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.map-store-tab.active { background: var(--text); color: #fff; }

.map-content { padding: 0 14px; }

.aisle-section {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); margin-bottom: 10px; overflow: hidden;
}
.aisle-section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer;
}
.aisle-num {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; flex-shrink: 0;
}
.aisle-zone-name { font-size: 14px; font-weight: 800; color: var(--text); flex: 1; }
.aisle-items-preview { font-size: 11px; color: var(--muted); font-weight: 600; }
.aisle-section-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; border-top: 1px solid var(--border); }
.aisle-section.open .aisle-section-body { max-height: 500px; }
.aisle-items-list { padding: 10px 16px 14px; display: flex; flex-wrap: wrap; gap: 6px; }
.aisle-item-tag {
  padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700; color: var(--text);
  background: var(--card2);
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  right: 24px;
  width: 58px; height: 58px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff; font-size: 28px; border: none;
  box-shadow: 0 4px 20px rgba(52,199,89,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 100;
}
.fab:active { transform: scale(0.92); }

/* ── SHEET ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  backdrop-filter: blur(2px);
}
.overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 430px; margin: 0 auto;
  background: var(--card); border-radius: 24px 24px 0 0;
  padding: 0 20px calc(24px + var(--safe-bottom));
  z-index: 300; transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.12); margin: 12px auto 20px; }
.sheet-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; color: var(--text); }
.field-label {
  font-size: 12px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 14px;
}
.field-label:first-of-type { margin-top: 0; }
.sheet-input, .sheet-select {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 600;
  color: var(--text); outline: none; transition: border-color 0.15s;
  appearance: none; -webkit-appearance: none;
}
.sheet-input:focus, .sheet-select:focus { border-color: var(--accent); }
.cat-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
.cat-pick-btn {
  padding: 10px 6px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg); cursor: pointer; text-align: center;
  transition: all 0.15s; font-family: 'Nunito', sans-serif;
}
.cat-pick-btn .cpb-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
.cat-pick-btn .cpb-label { font-size: 11px; font-weight: 800; color: var(--muted); }
.cat-pick-btn.selected { border-color: var(--accent); background: var(--accent-light); }
.cat-pick-btn.selected .cpb-label { color: var(--accent-dark); }
.cat-pick-btn:active { transform: scale(0.95); }
.add-btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
  letter-spacing: 0.02em; margin-top: 20px; cursor: pointer;
  transition: all 0.15s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 4px 16px rgba(52,199,89,0.35);
}
.add-btn:active { transform: scale(0.97); }

/* Clear button */
.clear-row { padding: 8px 14px 4px; }
.clear-btn {
  width: 100%; padding: 13px; border-radius: 12px; border: none;
  background: var(--card); color: var(--danger);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800;
  cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.15s;
}
.clear-btn:active { transform: scale(0.98); opacity: 0.8; }

/* ── DARK MODE ── */
body.dark {
  --bg: #000000; --card: #1C1C1E; --card2: #2C2C2E;
  --text: #FFFFFF; --text2: #EBEBF5; --muted: #8E8E93;
  --border: rgba(255,255,255,0.08);
  --accent-light: rgba(52,199,89,0.15);
  --danger-light: rgba(255,59,48,0.15);
  --blue-light: rgba(0,122,255,0.15);
  --orange-light: rgba(255,149,0,0.15);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
}
body.dark .header { background: rgba(0,0,0,0.92); }
body.dark .search-input { background: rgba(255,255,255,0.08); }
body.dark .sheet-input, body.dark .sheet-select, body.dark .cat-pick-btn { background: #2C2C2E; }
body.dark .map-panel { background: #000; }
body.dark .add-ing-input, body.dark .add-ing-qty { background: #2C2C2E; }

/* Loading */

function smartCategorize(fullName) {
  const name = fullName.trim();
  const savedKey = name.toLowerCase();
  if (mapping[savedKey]) return mapping[savedKey];
  for (const o of CONTEXT_OVERRIDES) {
    if (o.pattern.test(name)) return o.category;
  }
  let bestMatch = null, bestLen = 0;
  for (const e of PHRASE_MAP) {
    const m = name.match(e.phrase);
    if (m && m[0].length > bestLen) { bestLen = m[0].length; bestMatch = e.category; }
  }
  return bestMatch;
}

// ── GET AISLE for an item at a given store ──
function getAisle(itemName, storeName) {
  const data = AISLE_DATA[storeName];
  if (!data) return null;
  const lower = itemName.toLowerCase();
  for (const zone of data) {
    for (const zoneItem of zone.items) {
      if (lower.includes(zoneItem.toLowerCase()) || zoneItem.toLowerCase().includes(lower.split(" ")[0])) {
        return { num: zone.num, zone: zone.zone, color: zone.color, light: zone.light };
      }
    }
  }
  return null;
}

// ── ADD ITEM ──
window.addItem = async function() {
  const name = document.getElementById("itemName").value.trim();
  if (!name) { document.getElementById("itemName").focus(); return; }
  const store = document.getElementById("storeSelect").value;
  const normKey = normalize(name);
  if (items.find(i => normalize(i.name) === normKey && !i.checked)) {
    if (!confirm(`"${name}" is already on your list. Add again?`)) return;
  }
  await setDoc(doc(db, "categoryMappings", normKey), { category: selectedCategory });
  mapping[normKey] = selectedCategory;
  await addDoc(listRef, { name, normalizedName: normKey, category: selectedCategory, store, checked: false, createdAt: Date.now() });
  document.getElementById("itemName").value = "";
  closeSheet();
};

// ── FIREBASE LISTENERS ──
onSnapshot(listRef, snap => {
  items = [];
  snap.forEach(d => items.push({ ...d.data(), id: d.id }));
  document.getElementById("loading").style.display = "none";
  render();
});

onSnapshot(recipesRef, snap => {
  recipes = [];
  snap.forEach(d => recipes.push({ ...d.data(), id: d.id }));
  renderRecipes();
});

// ── RENDER LIST ──
function render() {
  const container = document.getElementById("categories");
  let visible = items;
  if (storeFilter !== "All") visible = visible.filter(i => i.store === storeFilter);
  if (searchQuery) visible = visible.filter(i => i.name.toLowerCase().includes(searchQuery));

  const total = visible.length;
  const done  = visible.filter(i => i.checked).length;
  document.getElementById("sum-remaining").textContent = total - done;
  document.getElementById("sum-done").textContent = done;
  document.getElementById("sum-total").textContent = total;
  document.getElementById("header-sub").textContent =
    total === 0 ? "Nothing on the list" :
    `${total - done} item${total - done !== 1 ? "s" : ""} left to grab`;

  container.innerHTML = "";

  CATEGORIES.forEach(cat => {
    const catItems = visible.filter(i => i.category === cat.id)
      .sort((a, b) => a.checked - b.checked || a.createdAt - b.createdAt);
    if (catItems.length === 0) return;

    const section = document.createElement("div");
    section.className = "category-section";
    section.dataset.cat = cat.id;

    const unchecked = catItems.filter(i => !i.checked).length;
    const countText = catItems.length + " item" + (catItems.length !== 1 ? "s" : "") +
      (unchecked > 0 ? " · " + unchecked + " remaining" : " · all done!");
    const badgeHtml = unchecked > 0
      ? `<div class="cat-badge" style="background:${cat.light};color:${cat.color}">${unchecked}</div>` : "";

    section.innerHTML = `
      <div class="category-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="cat-emoji" style="background:${cat.light}"><span>${cat.emoji}</span></div>
        <div class="cat-info">
          <div class="cat-name">${cat.label}</div>
          <div class="cat-count">${countText}</div>
        </div>
        ${badgeHtml}
        <span class="cat-chevron">›</span>
      </div>
      <div class="items-list"><div class="items-inner" id="items-${cat.id}"></div></div>
    `;
    container.appendChild(section);

    const inner = document.getElementById("items-" + cat.id);
    catItems.forEach(item => {
      const store = STORES[item.store] || { icon: item.store[0], bg: "#8E8E93", fg: "#fff" };
      const aisle = storeFilter !== "All" ? getAisle(item.name, storeFilter) :
                    getAisle(item.name, item.store);

      const row = document.createElement("div");
      row.className = "item-row" + (item.checked ? " checked" : "");
      row.id = "item-" + item.id;

      const check = document.createElement("div");
      check.className = "item-check";
      check.textContent = item.checked ? "✓" : "";

      const body = document.createElement("div");
      body.className = "item-body";

      const aisleHtml = aisle
        ? `<span class="aisle-chip" style="background:${aisle.light};color:${aisle.color}">📍 ${aisle.num}</span>`
        : "";

      body.innerHTML = `
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          <span class="store-icon" style="background:${store.bg};color:${store.fg}">${store.icon}</span>
          ${aisleHtml}
        </div>`;

      const delBtn = document.createElement("button");
      delBtn.className = "item-del-btn";
      delBtn.textContent = "✕";
      delBtn.addEventListener("touchend", e => { e.stopPropagation(); e.preventDefault(); confirmDelete(item.id); }, { passive: false });
      delBtn.addEventListener("click", e => { e.stopPropagation(); confirmDelete(item.id); });

      row.appendChild(check);
      row.appendChild(body);
      row.appendChild(delBtn);

      row.addEventListener("click", e => {
        if (e.target === delBtn || delBtn.contains(e.target)) return;
        toggleItem(item.id, item.checked);
      });

      inner.appendChild(row);
    });
  });
}

// ── RENDER RECIPES ──
function renderRecipes() {
  const container = document.getElementById("recipeList");
  container.innerHTML = "";

  if (recipes.length === 0) {
    container.innerHTML = `<div class="recipe-empty"><div class="re-emoji">👨‍🍳</div>No recipes yet.<br>Tap "+ New Recipe" to add one!</div>`;
    return;
  }

  recipes.forEach(recipe => {
    const ingredients = recipe.ingredients || [];
    const card = document.createElement("div");
    card.className = "recipe-card";
    card.id = "recipe-" + recipe.id;

    card.innerHTML = `
      <div class="recipe-card-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="recipe-emoji">🍽️</div>
        <div class="recipe-info">
          <div class="recipe-name">${recipe.name}</div>
          <div class="recipe-count">${ingredients.length} ingredient${ingredients.length !== 1 ? "s" : ""}</div>
        </div>
        <span class="recipe-chevron">›</span>
      </div>
      <div class="recipe-body">
        <div class="recipe-body-inner">
          <div class="recipe-ingredient-list" id="ings-${recipe.id}"></div>
          <div class="add-ing-row">
            <input class="add-ing-input" id="ing-name-${recipe.id}" placeholder="Ingredient…" autocomplete="off" />
            <input class="add-ing-qty" id="ing-qty-${recipe.id}" placeholder="Qty" autocomplete="off" />
            <button class="add-ing-btn" onclick="addIngredient('${recipe.id}')">+</button>
          </div>
          <div class="recipe-actions">
            <button class="add-all-btn" onclick="addAllToList('${recipe.id}')">🛒 Add All to List</button>
            <button class="del-recipe-btn" onclick="deleteRecipe('${recipe.id}')">🗑</button>
          </div>
        </div>
      </div>
    `;

    container.appendChild(card);

    // Populate ingredients
    const ingList = document.getElementById("ings-" + recipe.id);
    if (ingredients.length === 0) {
      ingList.innerHTML = `<div style="color:var(--muted);font-size:13px;font-weight:600;padding:8px 0">No ingredients yet</div>`;
    } else {
      ingredients.forEach((ing, idx) => {
        const row = document.createElement("div");
        row.className = "recipe-ing-row";
        row.innerHTML = `
          <div class="recipe-ing-name">${ing.name}</div>
          ${ing.qty ? `<div class="recipe-ing-qty">${ing.qty}</div>` : ""}
          <button class="recipe-ing-del" onclick="removeIngredient('${recipe.id}', ${idx})">✕</button>
        `;
        ingList.appendChild(row);
      });
    }

    // Enter key on ingredient name
    document.getElementById("ing-name-" + recipe.id).addEventListener("keydown", e => {
      if (e.key === "Enter") addIngredient(recipe.id);
    });
  });
}

// ── RECIPE ACTIONS ──
window.promptNewRecipe = function() {
  const name = prompt("Recipe name:");
  if (!name || !name.trim()) return;
  addDoc(recipesRef, { name: name.trim(), ingredients: [], createdAt: Date.now() });
};

window.addIngredient = async function(recipeId) {
  const nameEl = document.getElementById("ing-name-" + recipeId);
  const qtyEl  = document.getElementById("ing-qty-" + recipeId);
  const name = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const qty = qtyEl.value.trim();
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  const updated = [...(recipe.ingredients || []), { name, qty }];
  await updateDoc(doc(db, "recipes", recipeId), { ingredients: updated });
  nameEl.value = "";
  qtyEl.value = "";
  nameEl.focus();
};

window.removeIngredient = async function(recipeId, idx) {
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe) return;
  const updated = recipe.ingredients.filter((_, i) => i !== idx);
  await updateDoc(doc(db, "recipes", recipeId), { ingredients: updated });
};

window.addAllToList = async function(recipeId) {
  const recipe = recipes.find(r => r.id === recipeId);
  if (!recipe || !recipe.ingredients.length) { showToast("No ingredients to add!"); return; }

  const store = "Walmart"; // default store for recipe items
  let added = 0;

  for (const ing of recipe.ingredients) {
    const normKey = normalize(ing.name);
    const already = items.find(i => normalize(i.name) === normKey && !i.checked);
    if (already) continue; // skip if already on list unchecked

    const cat = smartCategorize(ing.name) || "Other";
    await setDoc(doc(db, "categoryMappings", normKey), { category: cat });
    mapping[normKey] = cat;
    await addDoc(listRef, {
      name: ing.qty ? `${ing.name} (${ing.qty})` : ing.name,
      normalizedName: normKey,
      category: cat,
      store,
      checked: false,
      createdAt: Date.now()
    });
    added++;
  }

  showToast(added > 0 ? `Added ${added} item${added !== 1 ? "s" : ""} to list!` : "All items already on list");
  // Switch to list tab
  switchTab("list");
};

window.deleteRecipe = async function(recipeId) {
  if (!confirm("Delete this recipe?")) return;
  await deleteDoc(doc(db, "recipes", recipeId));
};

// ── STORE MAP ──
window.openMap = function() {
  document.getElementById("mapPanel").classList.add("open");
  buildMapStoreTabs();
  renderMapContent(activeMapStore);
};

window.closeMap = function() {
  document.getElementById("mapPanel").classList.remove("open");
};

function buildMapStoreTabs() {
  const tabBar = document.getElementById("mapStoreTabs");
  tabBar.innerHTML = "";
  Object.keys(AISLE_DATA).forEach(storeName => {
    const s = STORES[storeName] || {};
    const btn = document.createElement("button");
    btn.className = "map-store-tab" + (storeName === activeMapStore ? " active" : "");
    btn.innerHTML = `<span style="display:inline-flex;width:18px;height:18px;border-radius:4px;background:${s.bg||"#8E8E93"};color:${s.fg||"#fff"};align-items:center;justify-content:center;font-size:10px;font-weight:900">${s.icon||storeName[0]}</span> ${storeName}`;
    btn.addEventListener("click", () => {
      activeMapStore = storeName;
      document.querySelectorAll(".map-store-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderMapContent(storeName);
    });
    tabBar.appendChild(btn);
  });
}

function renderMapContent(storeName) {
  const content = document.getElementById("mapContent");
  const zones = AISLE_DATA[storeName] || [];
  content.innerHTML = "";

  zones.forEach(zone => {
    const sec = document.createElement("div");
    sec.className = "aisle-section";

    // Check if we have items on the list in this zone
    const myItemsHere = items.filter(i => {
      if (i.store !== storeName && storeFilter !== "All") return false;
      const a = getAisle(i.name, storeName);
      return a && a.num === zone.num && !i.checked;
    });
    const myCount = myItemsHere.length;

    sec.innerHTML = `
      <div class="aisle-section-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="aisle-num" style="background:${zone.light};color:${zone.color}">${zone.num}</div>
        <div style="flex:1;min-width:0">
          <div class="aisle-zone-name">${zone.zone}</div>
          ${myCount > 0 ? `<div style="font-size:11px;color:${zone.color};font-weight:700;margin-top:1px">📋 ${myCount} on your list</div>` : ""}
        </div>
        <span class="cat-chevron" style="color:var(--muted);font-size:12px;font-weight:800;transition:transform 0.25s">›</span>
      </div>
      <div class="aisle-section-body">
        <div class="aisle-items-list">
          ${zone.items.map(item => `<span class="aisle-item-tag">${item}</span>`).join("")}
          ${myCount > 0 ? myItemsHere.map(i => `<span class="aisle-item-tag" style="background:${zone.light};color:${zone.color};font-weight:800">✓ ${i.name}</span>`).join("") : ""}
        </div>
      </div>
    `;

    // chevron rotate on open
    sec.querySelector(".aisle-section-header").addEventListener("click", () => {
      const chevron = sec.querySelector(".cat-chevron");
      chevron.style.transform = sec.classList.contains("open") ? "rotate(90deg)" : "";
    });

    content.appendChild(sec);
  });
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── ITEM ACTIONS ──
window.toggleItem = async function(id, checked) {
  await updateDoc(doc(db, "items", id), { checked: !checked });
};

window.confirmDelete = async function(id) {
  const row = document.getElementById("item-" + id);
  if (row) row.classList.add("deleting");
  setTimeout(async () => { await deleteDoc(doc(db, "items", id)); }, 200);
};

window.clearCompleted = function() {
  if (!items.some(i => i.checked)) return;
  if (confirm("Remove all completed items?")) {
    items.filter(i => i.checked).forEach(i => deleteDoc(doc(db, "items", i.id)));
  }
};

// ── SHEET ──
window.openSheet = function() {
  document.getElementById("itemName").value = "";
  document.getElementById("sheet").classList.add("open");
  document.getElementById("overlay").classList.add("open");
  setTimeout(() => document.getElementById("itemName").focus(), 400);
};

window.closeSheet = function() {
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
};

document.getElementById("itemName").addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

document.getElementById("itemName").addEventListener("input", function() {
  const val = this.value.trim();
  if (!val) return;
  const cat = smartCategorize(val);
  if (cat) {
    selectedCategory = cat;
    document.querySelectorAll(".cat-pick-btn").forEach(b => {
      b.classList.toggle("selected", b.dataset.catId === cat);
    });
  }
});

// ── BUILD CATEGORY PICKER ──
function buildCategoryPicker() {
  const picker = document.getElementById("catPicker");
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-pick-btn" + (cat.id === "Other" ? " selected" : "");
    btn.dataset.catId = cat.id;
    btn.innerHTML = `<span class="cpb-emoji">${cat.emoji}</span><span class="cpb-label">${cat.label}</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".cat-pick-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedCategory = cat.id;
    };
    picker.appendChild(btn);
  });
}
