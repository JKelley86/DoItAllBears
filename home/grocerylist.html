<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Family Grocery</title>

<style>
:root{
 --bg:#111;
 --card:#1c1c1e;
 --text:#fff;
 --muted:#666;
 --accent:#4ade80;
}
.light{
 --bg:#f5f5f5;
 --card:#fff;
 --text:#111;
 --muted:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
 background:var(--bg);
 color:var(--text);
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 height:100%;
 overflow-x:hidden;
 overscroll-behavior-x:none;
}
body{max-width:500px;margin:auto}
header{
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}
h1{font-size:20px}
.section{
 margin:10px;
 background:var(--card);
 border-radius:16px;
 overflow:hidden;
}
.section h2{
 padding:12px;
 font-size:15px;
 cursor:pointer;
 display:flex;
 justify-content:space-between;
}
.section.empty h2{opacity:.3}
.items{padding:10px;display:none}
.section.open .items{display:block}
.item{
 padding:12px;
 background:rgba(255,255,255,0.05);
 border-radius:12px;
 margin-bottom:6px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 transition:.2s;
 position:relative;
}
.item.checked{opacity:.4}
.store{font-size:12px;opacity:.6;margin-left:6px}
.fab{
 position:fixed;
 bottom:20px;
 right:20px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:var(--accent);
 color:#000;
 font-size:30px;
 border:none;
}
.panel{
 position:fixed;
 bottom:-100%;
 left:0;
 width:100%;
 background:var(--card);
 padding:20px;
 border-radius:20px 20px 0 0;
 transition:.3s;
}
.panel.open{bottom:0}
input,select{
 width:100%;
 padding:12px;
 margin-bottom:10px;
 border-radius:12px;
 border:none;
}
.clear{
 text-align:center;
 padding:15px;
 opacity:.5;
}
.delete-bg{
 position:absolute;
 right:10px;
 top:0;
 bottom:0;
 display:flex;
 align-items:center;
 color:red;
}
</style>
</head>

<body>

<header>
  <h1>Family Grocery</h1>
  <div onclick="toggleTheme()">🌓</div>
</header>

<div id="list"></div>

<div class="clear">
  <button onclick="clearCompleted()">Clear Completed</button>
</div>

<button class="fab" onclick="openPanel()">+</button>

<div class="panel" id="panel">
  <input id="itemName" placeholder="Add item..." />
  <select id="store">
    <option>Costco</option>
    <option>Cub</option>
    <option>Target</option>
    <option>Walmart</option>
    <Option>County Market</Option>
    <Option>Jerry's</Option>
  </select>
  <button onclick="addItem()">Add</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
 getFirestore,collection,addDoc,onSnapshot,doc,
 updateDoc,deleteDoc,getDocs,setDoc,
 enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
 apiKey:"AIzaSyABD9vjdzX62oxEf8hLePjVRfu_YxGgcQ0",
 authDomain:"grocerylist-e4b7c.firebaseapp.com",
 projectId:"grocerylist-e4b7c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
enableIndexedDbPersistence(db);

const listRef=collection(db,"items");
const mapRef=collection(db,"categoryMappings");

const categories=["Produce","Dairy","Bread","Drinks","Other"];
let items=[];
let mapping={};

async function loadMappings(){
 const snap=await getDocs(mapRef);
 snap.forEach(d=>mapping[d.id]=d.data().category);
}
loadMappings();

function normalize(text){
 return text.toLowerCase().split(" ")[0];
}

async function getCategory(word){
 if(mapping[word]) return mapping[word];
 return "Other";
}

window.addItem=async function(){
 const name=document.getElementById("itemName").value;
 if(!name) return;
 const norm=normalize(name);

 if(items.find(i=>i.normalizedName===norm && !i.checked)){
  if(!confirm("Item already exists. Add anyway?")) return;
 }

 let category=await getCategory(norm);

 if(category==="Other"){
  let pick=prompt("Assign category: Produce, Dairy, Bread, Drinks, Other");
  if(pick){
   category=pick;
   await setDoc(doc(db,"categoryMappings",norm),{category:pick});
   mapping[norm]=pick;
  }
 }

 await addDoc(listRef,{
  name,
  normalizedName:norm,
  category,
  store:document.getElementById("store").value,
  checked:false,
  createdAt:Date.now()
 });

 document.getElementById("itemName").value="";
 closePanel();
};

onSnapshot(listRef,snap=>{
 items=[];
 snap.forEach(d=>items.push({...d.data(),id:d.id}));
 render();
});

function render(){
 const container=document.getElementById("list");
 container.innerHTML="";

 categories.forEach(cat=>{
  const section=document.createElement("div");
  section.className="section open";

  const header=document.createElement("h2");
  header.innerHTML=`${cat} <span>${items.filter(i=>i.category===cat).length}</span>`;
  header.onclick=()=>section.classList.toggle("open");
  section.appendChild(header);

  const wrapper=document.createElement("div");
  wrapper.className="items";

  const catItems=items.filter(i=>i.category===cat);
  if(catItems.length===0) section.classList.add("empty");

  catItems.sort((a,b)=>a.checked-b.checked)
  .forEach(i=>{
   const div=document.createElement("div");
   div.className="item"+(i.checked?" checked":"");
   div.innerHTML=`
    <span>${i.name}<span class="store">(${i.store})</span></span>
    <div class="delete-bg">Delete</div>
   `;

   let startX=0;
   div.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
   div.addEventListener("touchmove",e=>{
    let diff=e.touches[0].clientX-startX;
    if(diff<-50) deleteItem(i.id);
   });

   div.onclick=()=>toggleItem(i.id,i.checked);

   wrapper.appendChild(div);
  });

  section.appendChild(wrapper);
  container.appendChild(section);
 });
}

window.toggleItem=async function(id,checked){
 await updateDoc(doc(db,"items",id),{checked:!checked});
};

window.deleteItem=async function(id){
 await deleteDoc(doc(db,"items",id));
};

window.clearCompleted=function(){
 items.filter(i=>i.checked).forEach(i=>deleteItem(i.id));
};

window.openPanel=()=>document.getElementById("panel").classList.add("open");
window.closePanel=()=>document.getElementById("panel").classList.remove("open");
window.toggleTheme=()=>document.body.classList.toggle("light");
</script>

</body>
</html>
