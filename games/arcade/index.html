<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Arcade</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/three@0.164/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.164/examples/js/controls/PointerLockControls.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>

<div id="ui">

  <div id="topBar">
    <div class="logo">NEON ARCADE</div>

    <div class="stats">
      <div>Tickets: <span id="tickets">500</span></div>
      <div>Tokens: <span id="tokens">50</span></div>
    </div>
  </div>

  <div id="gameOverlay">

    <div id="gameHeader">
      <h2 id="gameTitle">Game</h2>

      <button id="exitBtn">EXIT GAME</button>
    </div>

    <canvas id="gameCanvas"></canvas>

  </div>

  <div id="instructions">
    WASD = Move | Mouse = Look | Click Cabinet To Play
  </div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
