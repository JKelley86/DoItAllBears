
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Arcade</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: radial-gradient(circle at center, #1a0033 0%, #050010 70%);
    font-family: 'Orbitron', sans-serif;
    color: white;
    height: 100vh;
}

canvas {
    display: block;
}

#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
}

#crt {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03),
            rgba(255,255,255,0.03) 2px,
            transparent 2px,
            transparent 4px
        );
    mix-blend-mode: overlay;
}

#arcade {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid #ff00ff;
    box-shadow: 0 0 30px #ff00ff;
}

header h1 {
    font-size: 2rem;
    color: #00ffff;
    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

#ticketDisplay {
    font-size: 1rem;
    color: gold;
}

#cabinetGrid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    padding: 30px;
}

.cabinet {
    position: relative;
    height: 320px;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    background: linear-gradient(145deg, #111, #222);
    border: 3px solid rgba(255,255,255,0.2);
    transition: 0.3s;
    box-shadow:
        0 0 15px rgba(0,255,255,0.4),
        0 0 35px rgba(255,0,255,0.2);
}

.cabinet:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:
        0 0 25px rgba(0,255,255,0.8),
        0 0 60px rgba(255,0,255,0.6);
}

.cabinetGlow {
    position: absolute;
    inset: 0;
    background: linear-gradient(
        45deg,
        rgba(0,255,255,0.15),
        rgba(255,0,255,0.15)
    );
}

.cabinetScreen {
    position: absolute;
    top: 25px;
    left: 25px;
    right: 25px;
    height: 150px;
    border-radius: 10px;
    overflow: hidden;
    background: black;
    border: 2px solid #00ffff;
}

.cabinetScreen canvas {
    width: 100%;
    height: 100%;
}

.cabinetTitle {
    position: absolute;
    bottom: 80px;
    width: 100%;
    text-align: center;
    font-size: 1.1rem;
    color: white;
    text-shadow: 0 0 10px cyan;
}

.playButton {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 25px;
    border-radius: 999px;
    border: none;
    background: linear-gradient(90deg, #00ffff, #ff00ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 20px cyan;
}

#gameOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 500;
    display: none;
    flex-direction: column;
}

#gameHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(0,0,0,0.7);
    border-bottom: 2px solid cyan;
}

#gameCanvas {
    flex: 1;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #111 0%, #000 100%);
}

.arcadeBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(90deg, cyan, magenta);
    color: white;
    font-weight: bold;
    box-shadow: 0 0 15px cyan;
}

.floatingParticle {
    position: fixed;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: cyan;
    pointer-events: none;
    opacity: 0.7;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 0;
    }

    10% {
        opacity: 1;
    }

    to {
        transform: translateY(-100vh);
        opacity: 0;
    }
}

@keyframes pulse {
    0%,100% {
        transform: scale(1);
    }

    50% {
        transform: scale(1.05);
    }
}

.neonPulse {
    animation: pulse 2s infinite;
}

::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-thumb {
    background: linear-gradient(cyan, magenta);
    border-radius: 999px;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="crt"></div>

<div id="arcade">

<header>
    <h1>NEON ARCADE</h1>

    <div id="ticketDisplay">
        Tickets: <span id="tickets">0</span>
    </div>
</header>

<div id="cabinetGrid"></div>

</div>

<div id="gameOverlay">

<div id="gameHeader">
    <h2 id="gameTitle">Game</h2>

    <div>
        <button class="arcadeBtn" onclick="closeGame()">Exit</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

</div>

<script>
//////////////////////////////////////////////////////////
// GLOBALS
//////////////////////////////////////////////////////////

const cabinetGrid = document.getElementById('cabinetGrid');
const overlay = document.getElementById('gameOverlay');
const gameCanvas = document.getElementById('gameCanvas');
const ctx = gameCanvas.getContext('2d');
const ticketsEl = document.getElementById('tickets');
const gameTitle = document.getElementById('gameTitle');

let tickets = 0;
let activeGame = null;
let animationId = null;

const games = [
    {
        name: 'Spin The Wheel',
        color: '#00ffff',
        action: startWheelGame
    },
    {
        name: 'Pinball',
        color: '#ff00ff',
        action: startPinball
    },
    {
        name: 'Skee Ball',
        color: '#00ff88',
        action: startSkeeBall
    },
    {
        name: 'Air Hockey',
        color: '#ffaa00',
        action: startAirHockey
    },
    {
        name: 'Coin Pusher',
        color: '#ff4444',
        action: startCoinPusher
    },
    {
        name: 'Claw Machine',
        color: '#66ccff',
        action: startClawMachine
    },
    {
        name: 'Rhythm Rush',
        color: '#ff66ff',
        action: startRhythmGame
    },
    {
        name: 'Retro Racer',
        color: '#44ffcc',
        action: startRetroRacer
    }
];

//////////////////////////////////////////////////////////
// CREATE CABINETS
//////////////////////////////////////////////////////////

function createCabinets() {

    games.forEach(game => {

        const cabinet = document.createElement('div');
        cabinet.className = 'cabinet';

        cabinet.innerHTML = `
            <div class="cabinetGlow"></div>

            <div class="cabinetScreen">
                <canvas width="300" height="150"></canvas>
            </div>

            <div class="cabinetTitle">
                ${game.name}
            </div>

            <button class="playButton neonPulse">
                PLAY
            </button>
        `;

        cabinet.onclick = () => game.action();

        cabinetGrid.appendChild(cabinet);

        animatePreview(cabinet.querySelector('canvas'), game.color);
    });
}

//////////////////////////////////////////////////////////
// PREVIEW ANIMATION
//////////////////////////////////////////////////////////

function animatePreview(canvas, color) {

    const c = canvas.getContext('2d');

    let t = 0;

    function draw() {

        c.clearRect(0,0,canvas.width,canvas.height);

        for(let i = 0; i < 20; i++) {

            const x = Math.sin((t + i) * 0.05) * 120 + 150;
            const y = (i * 10 + t * 2) % 180;

            c.beginPath();
            c.arc(x, y, 5 + Math.sin(t*0.02+i)*4, 0, Math.PI * 2);
            c.fillStyle = color;
            c.shadowBlur = 20;
            c.shadowColor = color;
            c.fill();
        }

        t++;
        requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// BACKGROUND EFFECT
//////////////////////////////////////////////////////////

const bg = document.getElementById('bg');
const bgCtx = bg.getContext('2d');

function resize() {
    bg.width = window.innerWidth;
    bg.height = window.innerHeight;

    gameCanvas.width = window.innerWidth;
    gameCanvas.height = window.innerHeight - 80;
}

window.addEventListener('resize', resize);
resize();

const stars = [];

for(let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        size: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.2
    });
}

function animateBackground() {

    bgCtx.clearRect(0,0,bg.width,bg.height);

    stars.forEach(star => {

        star.y += star.speed;

        if(star.y > innerHeight) {
            star.y = 0;
        }

        bgCtx.beginPath();
        bgCtx.arc(star.x, star.y, star.size, 0, Math.PI*2);
        bgCtx.fillStyle = 'rgba(0,255,255,0.8)';
        bgCtx.shadowBlur = 20;
        bgCtx.shadowColor = 'cyan';
        bgCtx.fill();
    });

    requestAnimationFrame(animateBackground);
}

animateBackground();

//////////////////////////////////////////////////////////
// FLOATING PARTICLES
//////////////////////////////////////////////////////////

function spawnParticle() {

    const p = document.createElement('div');
    p.className = 'floatingParticle';

    p.style.left = Math.random() * innerWidth + 'px';
    p.style.animationDuration = (Math.random()*6+4)+'s';
    p.style.opacity = Math.random();

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 10000);
}

setInterval(spawnParticle, 150);

//////////////////////////////////////////////////////////
// TICKETS
//////////////////////////////////////////////////////////

function addTickets(amount) {

    tickets += amount;
    ticketsEl.textContent = tickets;

    confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
    });
}

//////////////////////////////////////////////////////////
// OPEN / CLOSE
//////////////////////////////////////////////////////////

function openGame(name) {
    overlay.style.display = 'flex';
    gameTitle.textContent = name;
}

function closeGame() {

    overlay.style.display = 'none';

    cancelAnimationFrame(animationId);

    ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);
}

//////////////////////////////////////////////////////////
// SPIN THE WHEEL
//////////////////////////////////////////////////////////

function startWheelGame() {

    openGame('Spin The Wheel');

    const prizes = [50,100,150,200,500,1000];

    let angle = 0;
    let spinning = false;
    let velocity = 0;

    gameCanvas.onclick = () => {

        if(spinning) return;

        spinning = true;
        velocity = Math.random() * 0.4 + 0.35;
    };

    function draw() {

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        const cx = gameCanvas.width/2;
        const cy = gameCanvas.height/2;
        const radius = 250;

        ctx.save();
        ctx.translate(cx,cy);
        ctx.rotate(angle);

        for(let i = 0; i < prizes.length; i++) {

            const slice = Math.PI*2/prizes.length;

            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.arc(0,0,radius,i*slice,(i+1)*slice);
            ctx.closePath();

            ctx.fillStyle = i%2 ? '#00ffff' : '#ff00ff';
            ctx.shadowBlur = 40;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fill();

            ctx.save();
            ctx.rotate(i*slice + slice/2);
            ctx.fillStyle = 'white';
            ctx.font = '24px Orbitron';
            ctx.fillText(prizes[i], 120, 10);
            ctx.restore();
        }

        ctx.restore();

        ctx.fillStyle = 'gold';
        ctx.beginPath();
        ctx.moveTo(cx,cy-radius-20);
        ctx.lineTo(cx-20,cy-radius+20);
        ctx.lineTo(cx+20,cy-radius+20);
        ctx.fill();

        if(spinning) {

            angle += velocity;
            velocity *= 0.992;

            if(velocity < 0.002) {

                spinning = false;

                const slice = Math.PI*2/prizes.length;
                const selected = prizes[Math.floor(((Math.PI*2-angle%(Math.PI*2))/slice)%prizes.length)];

                addTickets(selected);
            }
        }

        animationId = requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// PINBALL
//////////////////////////////////////////////////////////

function startPinball() {

    openGame('Pinball');

    const Engine = Matter.Engine;
    const Render = Matter.Render;
    const Runner = Matter.Runner;
    const Bodies = Matter.Bodies;
    const Composite = Matter.Composite;

    const engine = Engine.create();

    const ball = Bodies.circle(300,100,20,{ restitution: 0.95 });

    const ground = Bodies.rectangle(500,700,1000,40,{ isStatic:true });

    const bumper1 = Bodies.circle(400,300,40,{ isStatic:true, restitution: 2 });
    const bumper2 = Bodies.circle(650,400,40,{ isStatic:true, restitution: 2 });

    Composite.add(engine.world,[ball,ground,bumper1,bumper2]);

    function draw() {

        Engine.update(engine);

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        [ball,ground,bumper1,bumper2].forEach(body => {

            ctx.beginPath();

            if(body.circleRadius) {

                ctx.arc(body.position.x, body.position.y, body.circleRadius, 0, Math.PI*2);

                ctx.fillStyle = '#00ffff';
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ffff';
                ctx.fill();

            } else {

                ctx.rect(
                    body.position.x-500,
                    body.position.y-20,
                    1000,
                    40
                );

                ctx.fillStyle = '#ff00ff';
                ctx.fill();
            }
        });

        animationId = requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// SKEE BALL
//////////////////////////////////////////////////////////

function startSkeeBall() {

    openGame('Skee Ball');

    let balls = [];

    gameCanvas.onclick = e => {

        balls.push({
            x: gameCanvas.width/2,
            y: gameCanvas.height-100,
            vx: (Math.random()-0.5)*6,
            vy: -12,
            radius: 14
        });
    };

    function draw() {

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.strokeStyle = 'cyan';
        ctx.lineWidth = 10;

        [100,250,500].forEach((score,i)=>{

            ctx.beginPath();
            ctx.arc(gameCanvas.width/2,150+i*90,50,0,Math.PI*2);
            ctx.stroke();

            ctx.fillStyle='white';
            ctx.font='24px Orbitron';
            ctx.fillText(score,gameCanvas.width/2-25,160+i*90);
        });

        balls.forEach(ball=>{

            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vy += 0.2;

            ctx.beginPath();
            ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
            ctx.fillStyle='orange';
            ctx.shadowBlur=25;
            ctx.shadowColor='orange';
            ctx.fill();

            if(ball.y < 250) {
                addTickets(10);
            }
        });

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// AIR HOCKEY
//////////////////////////////////////////////////////////

function startAirHockey() {

    openGame('Air Hockey');

    let puck = {
        x: gameCanvas.width/2,
        y: gameCanvas.height/2,
        vx: 8,
        vy: 5,
        radius: 20
    };

    function draw() {

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.strokeStyle='cyan';
        ctx.lineWidth=6;
        ctx.strokeRect(50,50,gameCanvas.width-100,gameCanvas.height-100);

        puck.x += puck.vx;
        puck.y += puck.vy;

        if(puck.x<70 || puck.x>gameCanvas.width-70) puck.vx*=-1;
        if(puck.y<70 || puck.y>gameCanvas.height-70) puck.vy*=-1;

        ctx.beginPath();
        ctx.arc(puck.x,puck.y,puck.radius,0,Math.PI*2);
        ctx.fillStyle='#00ffff';
        ctx.shadowBlur=40;
        ctx.shadowColor='#00ffff';
        ctx.fill();

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// COIN PUSHER
//////////////////////////////////////////////////////////

function startCoinPusher() {

    openGame('Coin Pusher');

    let coins=[];

    gameCanvas.onclick=e=>{

        coins.push({
            x:e.clientX,
            y:0,
            vy:3+Math.random()*3,
            radius:15
        });
    };

    function draw(){

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.fillStyle='gold';

        coins.forEach(c=>{

            c.y+=c.vy;

            ctx.beginPath();
            ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);
            ctx.fill();

            if(c.y>gameCanvas.height-80){
                addTickets(5);
                c.y=-999;
            }
        });

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// CLAW MACHINE
//////////////////////////////////////////////////////////

function startClawMachine(){

    openGame('Claw Machine');

    let clawX=gameCanvas.width/2;

    window.onmousemove=e=>{
        clawX=e.clientX;
    };

    function draw(){

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.strokeStyle='silver';
        ctx.lineWidth=6;

        ctx.beginPath();
        ctx.moveTo(clawX,0);
        ctx.lineTo(clawX,250);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(clawX-30,250);
        ctx.lineTo(clawX,320);
        ctx.lineTo(clawX+30,250);
        ctx.stroke();

        for(let i=0;i<10;i++){

            ctx.beginPath();
            ctx.arc(100+i*120,gameCanvas.height-100,35,0,Math.PI*2);
            ctx.fillStyle=i%2?'#ff00ff':'#00ffff';
            ctx.fill();
        }

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// RHYTHM GAME
//////////////////////////////////////////////////////////

function startRhythmGame(){

    openGame('Rhythm Rush');

    let notes=[];

    setInterval(()=>{

        notes.push({
            x:Math.random()*gameCanvas.width,
            y:-20,
            speed:4+Math.random()*4
        });

    },400);

    gameCanvas.onclick=e=>{

        notes.forEach(n=>{

            const d=Math.hypot(e.clientX-n.x,e.clientY-n.y);

            if(d<50){
                addTickets(20);
                n.y=9999;
            }
        });
    };

    function draw(){

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        notes.forEach(n=>{

            n.y+=n.speed;

            ctx.beginPath();
            ctx.arc(n.x,n.y,25,0,Math.PI*2);
            ctx.fillStyle='#ff00ff';
            ctx.shadowBlur=30;
            ctx.shadowColor='#ff00ff';
            ctx.fill();
        });

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// RETRO RACER
//////////////////////////////////////////////////////////

function startRetroRacer(){

    openGame('Retro Racer');

    let roadOffset=0;

    function draw(){

        ctx.clearRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.fillStyle='#111';
        ctx.fillRect(0,0,gameCanvas.width,gameCanvas.height);

        ctx.strokeStyle='#00ffff';
        ctx.lineWidth=6;

        for(let i=0;i<20;i++){

            ctx.beginPath();
            ctx.moveTo(gameCanvas.width/2, i*80+roadOffset);
            ctx.lineTo(gameCanvas.width/2, i*80+40+roadOffset);
            ctx.stroke();
        }

        roadOffset+=10;

        if(roadOffset>80) roadOffset=0;

        ctx.fillStyle='#ff00ff';
        ctx.fillRect(gameCanvas.width/2-40,gameCanvas.height-140,80,140);

        animationId=requestAnimationFrame(draw);
    }

    draw();
}

//////////////////////////////////////////////////////////
// START
//////////////////////////////////////////////////////////

createCabinets();

</script>

</body>
</html>
